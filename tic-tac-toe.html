<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>Wael — Tic-Tac-Toe AI</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { padding: 60px 5vw; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card { max-width: 450px; text-align: center; position: relative; z-index: 10; }
        select { width: 100%; padding: 10px; border-radius: 8px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,.18); background: rgba(0,0,0,.3); color: #fff; outline: none; font-size: 16px; font-weight: bold; text-align: center;}
        select option { background: #111; color: #fff; }
        #statusText { font-size: 20px; font-weight: bold; margin-bottom: 20px; height: 24px; color: #4ade80; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .cell { aspect-ratio: 1; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: 900; cursor: pointer; transition: 0.2s; user-select: none; }
        .cell:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.02); }
        .cell.x { color: #fff; }
        .cell.o { color: #ff6b6b; }
        .navBtn { display: inline-flex; align-items: center; gap: 6px; z-index: 50;}
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .lucide { width: 1.2em; height: 1.2em; vertical-align: -0.125em; }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="index"><i data-lucide="home"></i> Home</a>
    
    <div class="card">
        <h1 style="display: flex; align-items: center; justify-content: center; gap: 10px;"><i data-lucide="gamepad-2"></i> Tic-Tac-Toe</h1>
        <select id="difficulty" onchange="resetGame()">
            <option value="easy">Difficulty: Easy</option>
            <option value="medium">Difficulty: Medium</option>
            <option value="hard" selected>Difficulty: Unbeatable (AI)</option>
        </select>
        <div id="statusText"><i data-lucide="user"></i> Your turn! (You are X)</div>
        <div class="board" id="board">
            <div class="cell" onclick="makeMove(0)"></div>
            <div class="cell" onclick="makeMove(1)"></div>
            <div class="cell" onclick="makeMove(2)"></div>
            <div class="cell" onclick="makeMove(3)"></div>
            <div class="cell" onclick="makeMove(4)"></div>
            <div class="cell" onclick="makeMove(5)"></div>
            <div class="cell" onclick="makeMove(6)"></div>
            <div class="cell" onclick="makeMove(7)"></div>
            <div class="cell" onclick="makeMove(8)"></div>
        </div>
        <button class="btn" onclick="resetGame()"><i data-lucide="rotate-ccw"></i> Restart Game</button>
    </div>

    <script src="js/config.js"></script>
    <script src="js/achievements.js"></script>
    <script>
        // Dynamic Back Button Logic
        window.addEventListener('DOMContentLoaded', () => {
            const backBtn = document.getElementById('dynamicBackBtn');
            const referrer = document.referrer.toLowerCase();
            
            if (referrer.includes('shortcuts')) {
                backBtn.href = 'shortcuts';
                backBtn.innerHTML = '<i data-lucide="zap"></i> Shortcuts';
            } else if (referrer.includes('redeem')) {
                backBtn.href = 'redeem';
                backBtn.innerHTML = '<i data-lucide="ticket"></i> Redeem';
            } else {
                backBtn.href = 'index';
                backBtn.innerHTML = '<i data-lucide="home"></i> Home';
            }
            lucide.createIcons();
        });

        let origBoard;
        const huPlayer = 'X'; const aiPlayer = 'O';
        const winCombos = [ [0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [6,4,2] ];
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('statusText');
        let gameActive = true;

        startGame();

        function startGame() {
            gameActive = true;
            statusText.innerHTML = `<i data-lucide="user"></i> Your turn! (You are X)`;
            statusText.style.color = "#4ade80";
            lucide.createIcons();
            origBoard = Array.from(Array(9).keys());
            for (let i = 0; i < cells.length; i++) {
                cells[i].innerText = ''; cells[i].classList.remove('x', 'o'); cells[i].style.cursor = 'pointer';
            }
        }

        function makeMove(squareId) {
            if (gameActive && typeof origBoard[squareId] == 'number') {
                turn(squareId, huPlayer);
                
                if (gameActive) {
                    statusText.innerHTML = `<i data-lucide="cpu"></i> AI is thinking...`; 
                    statusText.style.color = "#fff";
                    lucide.createIcons();
                    setTimeout(() => { turn(bestSpot(), aiPlayer); }, 300);
                }
            }
        }

        function turn(squareId, player) {
            origBoard[squareId] = player;
            cells[squareId].innerText = player; cells[squareId].classList.add(player.toLowerCase()); cells[squareId].style.cursor = 'default';
            
            let gameWon = checkWin(origBoard, player);
            if (gameWon) {
                gameOver(gameWon);
            } else if (checkTie()) {
                return;
            } else if (player === aiPlayer && gameActive) { 
                statusText.innerHTML = `<i data-lucide="user"></i> Your turn! (You are X)`; 
                statusText.style.color = "#4ade80"; 
                lucide.createIcons();
            }
        }

        function checkWin(board, player) {
            let plays = board.reduce((a, e, i) => (e === player) ? a.concat(i) : a, []);
            let gameWon = null;
            for (let [index, win] of winCombos.entries()) {
                if (win.every(elem => plays.indexOf(elem) > -1)) { gameWon = { index: index, player: player }; break; }
            }
            return gameWon;
        }

        function gameOver(gameWon) {
            gameActive = false;
            if (gameWon.player == huPlayer) { 
                statusText.innerHTML = `<i data-lucide="trophy"></i> You Win!`; 
                statusText.style.color = "#4ade80"; 
                
                // BUG FIX 5: Validate difficulty level to unlock the correct achievement
                const currentDiff = document.getElementById('difficulty').value;
                if (currentDiff === 'hard') {
                    window.unlockAchievement('ttt_hack');
                } else {
                    window.unlockAchievement('ttt_win');
                }

            } else { 
                statusText.innerHTML = `<i data-lucide="skull"></i> AI Wins!`; 
                statusText.style.color = "#ff6b6b"; 
            }
            lucide.createIcons();
        }

        function emptySquares() { return origBoard.filter(s => typeof s == 'number'); }

        function bestSpot() {
            const diff = document.getElementById('difficulty').value;
            const avail = emptySquares();
            if (diff === 'easy') return avail[Math.floor(Math.random() * avail.length)];
            else if (diff === 'medium') {
                if (Math.random() > 0.5) return avail[Math.floor(Math.random() * avail.length)];
                else return minimax(origBoard, aiPlayer).index;
            } else return minimax(origBoard, aiPlayer).index;
        }

        function checkTie() {
            if (emptySquares().length == 0) { 
                gameActive = false; 
                statusText.innerHTML = `<i data-lucide="handshake"></i> It's a Tie!`; 
                statusText.style.color = "#f5f7fa"; 
                window.unlockAchievement('ttt_tie');
                lucide.createIcons();
                return true; 
            }
            return false;
        }

        function minimax(newBoard, player) {
            var availSpots = emptySquares();
            if (checkWin(newBoard, huPlayer)) return { score: -10 };
            else if (checkWin(newBoard, aiPlayer)) return { score: 10 };
            else if (availSpots.length === 0) return { score: 0 };
            
            var moves = [];
            for (var i = 0; i < availSpots.length; i++) {
                var move = {};
                move.index = newBoard[availSpots[i]];
                newBoard[availSpots[i]] = player;

                if (player == aiPlayer) move.score = minimax(newBoard, huPlayer).score;
                else move.score = minimax(newBoard, aiPlayer).score;

                newBoard[availSpots[i]] = move.index;
                moves.push(move);
            }

            var bestMove;
            if (player === aiPlayer) {
                var bestScore = -10000;
                for (var i = 0; i < moves.length; i++) { if (moves[i].score > bestScore) { bestScore = moves[i].score; bestMove = i; } }
            } else {
                var bestScore = 10000;
                for (var i = 0; i < moves.length; i++) { if (moves[i].score < bestScore) { bestScore = moves[i].score; bestMove = i; } }
            }
            return moves[bestMove];
        }

        function resetGame() { startGame(); }
    </script>
    <script src="js/context-menu.js"></script>
    <script src="js/core.js"></script>
    <script src="/js/emoji-replacer.js"></script>
</body>
</html>
