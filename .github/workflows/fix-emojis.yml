name: Apple Emoji Fixer
on:
  workflow_dispatch: # This allows you to run it manually with one click

jobs:
  fix-emojis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Injection Script
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python -c "
          import os
          from github import Github
          g = Github(os.getenv('GITHUB_TOKEN'))
          repo = g.get_repo('${{ github.repository }}')
          contents = repo.get_contents('')
          emoji_link = '<link rel=\"stylesheet\" href=\"https://cdn.jsdelivr.net/gh/u-term/apple-emoji-css@master/apple-emoji.css\">'
          
          while contents:
              file_content = contents.pop(0)
              if file_content.type == 'dir':
                  contents.extend(repo.get_contents(file_content.path))
              elif file_content.name.endswith('.html'):
                  data = file_content.decoded_content.decode('utf-8')
                  if 'apple-emoji-css' not in data:
                      new_data = data.replace('<head>', f'<head>\n    {emoji_link}')
                      repo.update_file(file_content.path, f'Fix emojis in {file_content.name}', new_data, file_content.sha)
          "
