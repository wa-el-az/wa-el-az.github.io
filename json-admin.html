<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WaelOS — JSON Editor</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .wrapper { position: relative; z-index: 10; padding: 60px 5vw; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .top-nav { position: absolute; top: 20px; right: 20px; z-index: 20; display: flex; gap: 12px; }
        .card { width: 100%; max-width: 600px; margin: 0 auto; text-align: center; }
        .navBtn { display: flex; align-items: center; gap: 6px; }
        #json-editor { 
            width: 100%; font-family: monospace; white-space: pre; margin-top: 15px; display: none; background: rgba(0, 0, 0, 0.4); color: #4ade80; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 15px; resize: vertical; font-size: 14px;
        }
        .lucide { width: 1.2em; height: 1.2em; vertical-align: -0.125em; }
        @media (max-width:860px){ .top-nav { top: 15px; right: 15px; } }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <div class="top-nav">
        <a class="navBtn" href="admin"><i data-lucide="arrow-left"></i> Back to Hub</a>
    </div>
    
    <div class="wrapper">
        <div class="card" id="editorCard" style="display: none;">
            <h3 style="display: flex; align-items: center; justify-content: center; gap: 8px;"><i data-lucide="wrench"></i> Interactive JSON Editor</h3>
            <p class="sub">Select a database file to edit live.</p>

            <select id="file-selector">
                <option value="codes.json">codes.json (Redeem Codes)</option>
                <option value="projects.json">projects.json (Portfolio)</option>
                <option value="status.json">status.json (System Status)</option>
                <option value="leaderboard.json">leaderboard.json (Tea Clicker)</option>
                <option value="messages.json">messages.json (Inbox)</option>
            </select>
            
            <button class="btn" onclick="loadJsonFile()" style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px;"><i data-lucide="download-cloud"></i> Load File</button>

            <textarea id="json-editor" rows="15" spellcheck="false"></textarea>
            
            <button id="save-btn" class="btn btn-danger" onclick="saveJsonFile()" style="display: none; margin-top: 15px; width: 100%; justify-content: center; gap: 8px;"><i data-lucide="save"></i> Save directly to GitHub</button>
            
            <p id="editor-msg" style="margin-top: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px;"></p>
        </div>
        
        <div class="card" id="errorCard">
            <h3 style="color: #ff4757; display: flex; align-items: center; justify-content: center; gap: 8px;"><i data-lucide="alert-octagon"></i> Access Denied</h3>
            <p>You must be logged in to view this page.</p>
            <a href="admin" class="btn" style="display: inline-flex; align-items: center; justify-content: center; gap: 6px; margin-top: 15px; text-decoration: none;"><i data-lucide="log-in"></i> Go to Login</a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        lucide.createIcons();
        const editorCard = document.getElementById('editorCard');
        const errorCard = document.getElementById('errorCard');
        const msg = document.getElementById('editor-msg');
        const saveBtn = document.getElementById('save-btn');
        let currentFileSha = ""; 

        if (localStorage.getItem('gh_token') === CONFIG.GITHUB_TOKEN) {
            errorCard.style.display = "none";
            editorCard.style.display = "block";
        }

        async function loadJsonFile() {
            const filename = document.getElementById('file-selector').value;
            const editor = document.getElementById('json-editor');
            
            msg.innerHTML = `<i data-lucide="loader-2" class="lucide-spin"></i> Loading ${filename}...`;
            msg.style.color = "var(--text-main)";
            lucide.createIcons();

            try {
                const response = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/${filename}?t=${Date.now()}`, {
                    headers: { 'Authorization': `token ${CONFIG.GITHUB_TOKEN}` }
                });

                if (!response.ok) throw new Error("File not found or connection failed.");

                const data = await response.json();
                currentFileSha = data.sha;
                
                const decodedContent = decodeURIComponent(escape(atob(data.content)));
                const prettyJson = JSON.stringify(JSON.parse(decodedContent), null, 4);
                
                editor.value = prettyJson;
                editor.style.display = "block";
                saveBtn.style.display = "flex";
                
                msg.innerHTML = `<i data-lucide="check-circle-2"></i> Loaded ${filename} successfully.`;
                msg.style.color = "var(--terminal-green)";

            } catch (error) {
                msg.innerHTML = `<i data-lucide="x-circle"></i> Error: ${error.message}`;
                msg.style.color = "var(--moroccan-red)";
            }
            lucide.createIcons();
        }

        async function saveJsonFile() {
            const filename = document.getElementById('file-selector').value;
            const newContent = document.getElementById('json-editor').value;

            try {
                JSON.parse(newContent);
            } catch (e) {
                msg.innerHTML = `<i data-lucide="x-circle"></i> Invalid JSON format! Check commas and brackets.`;
                msg.style.color = "var(--moroccan-red)";
                lucide.createIcons();
                return; 
            }

            msg.innerHTML = `<i data-lucide="loader-2" class="lucide-spin"></i> Saving to GitHub...`;
            msg.style.color = "var(--text-main)";
            saveBtn.disabled = true;
            lucide.createIcons();

            try {
                const b64Content = btoa(unescape(encodeURIComponent(newContent)));
                const response = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/${filename}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${CONFIG.GITHUB_TOKEN}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        message: `Admin Update: ${filename} via JSON Editor`,
                        content: b64Content,
                        sha: currentFileSha,
                        branch: "main"
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    currentFileSha = result.content.sha;
                    msg.innerHTML = `<i data-lucide="check-circle-2"></i> Saved successfully to GitHub!`;
                    msg.style.color = "var(--terminal-green)";
                } else {
                    throw new Error(result.message || "Failed to save.");
                }

            } catch (error) {
                msg.innerHTML = `<i data-lucide="x-circle"></i> Error: ${error.message}`;
                msg.style.color = "var(--moroccan-red)";
            } finally {
                saveBtn.disabled = false;
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
