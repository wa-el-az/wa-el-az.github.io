<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WaelOS — JSON Editor</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/u-term/apple-emoji-css@master/apple-emoji.css">
    <style>
        .wrapper { position: relative; z-index: 10; padding: 60px 5vw; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .top-nav { position: absolute; top: 20px; right: 20px; z-index: 20; display: flex; gap: 12px; }
        .card { width: 100%; max-width: 600px; margin: 0 auto; text-align: center; }
        #json-editor { 
            width: 100%; 
            font-family: monospace; 
            white-space: pre; 
            margin-top: 15px; 
            display: none; 
            background: rgba(0, 0, 0, 0.4); 
            color: #4ade80; 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 8px; 
            padding: 15px; 
            resize: vertical;
            font-size: 14px;
        }
        @media (max-width:860px){ .top-nav { top: 15px; right: 15px; } }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <div class="top-nav">
        <a class="navBtn" href="admin">Back to Dashboard</a>
    </div>
    
    <div class="wrapper">
        <div class="card" id="editorCard" style="display: none;">
            <h3>🛠️ Interactive JSON Editor</h3>
            <p class="sub">Select a database file to edit live.</p>

            <select id="file-selector">
                <option value="codes.json">codes.json (Redeem Codes)</option>
                <option value="projects.json">projects.json (Portfolio)</option>
                <option value="status.json">status.json (System Status)</option>
                <option value="leaderboard.json">leaderboard.json (Tea Clicker)</option>
                <option value="messages.json">messages.json (Inbox)</option>
            </select>
            
            <button class="btn" onclick="loadJsonFile()">Load File</button>

            <textarea id="json-editor" rows="15" spellcheck="false"></textarea>
            
            <button id="save-btn" class="btn btn-danger" onclick="saveJsonFile()" style="display: none; margin-top: 15px;">💾 Save directly to GitHub</button>
            
            <p id="editor-msg" style="margin-top: 15px; font-weight: 600;"></p>
        </div>
        
        <div class="card" id="errorCard">
            <h3 style="color: #ff4757;">Access Denied</h3>
            <p>You must be logged in to view this page.</p>
            <a href="admin" class="btn" style="display: inline-block; margin-top: 15px; text-decoration: none;">Go to Login</a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const editorCard = document.getElementById('editorCard');
        const errorCard = document.getElementById('errorCard');
        const msg = document.getElementById('editor-msg');
        const saveBtn = document.getElementById('save-btn');
        let currentFileSha = ""; 

        // Authentication Check
        if (localStorage.getItem('gh_token') === CONFIG.GITHUB_TOKEN) {
            errorCard.style.display = "none";
            editorCard.style.display = "block";
        }

        async function loadJsonFile() {
            const filename = document.getElementById('file-selector').value;
            const editor = document.getElementById('json-editor');
            
            msg.textContent = "Loading " + filename + "...";
            msg.style.color = "var(--text-main)";

            try {
                // Fetch latest file with a cache-buster to ensure we get the newest SHA
                const response = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/${filename}?t=${Date.now()}`, {
                    headers: { 'Authorization': `token ${CONFIG.GITHUB_TOKEN}` }
                });

                if (!response.ok) throw new Error("File not found or connection failed.");

                const data = await response.json();
                currentFileSha = data.sha;
                
                // Decode Base64 safely for all characters
                const decodedContent = decodeURIComponent(escape(atob(data.content)));
                const prettyJson = JSON.stringify(JSON.parse(decodedContent), null, 4);
                
                editor.value = prettyJson;
                editor.style.display = "block";
                saveBtn.style.display = "block";
                
                msg.textContent = `✅ Loaded ${filename} successfully.`;
                msg.style.color = "var(--terminal-green)";

            } catch (error) {
                msg.textContent = "❌ Error: " + error.message;
                msg.style.color = "var(--moroccan-red)";
            }
        }

        async function saveJsonFile() {
            const filename = document.getElementById('file-selector').value;
            const newContent = document.getElementById('json-editor').value;

            try {
                JSON.parse(newContent); // Check for formatting errors
            } catch (e) {
                msg.textContent = "❌ Invalid JSON format! Check commas and brackets.";
                msg.style.color = "var(--moroccan-red)";
                return; 
            }

            msg.textContent = "Saving to GitHub...";
            msg.style.color = "var(--text-main)";
            saveBtn.disabled = true;

            try {
                // Encode back to Base64 safely
                const b64Content = btoa(unescape(encodeURIComponent(newContent)));

                const response = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/${filename}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${CONFIG.GITHUB_TOKEN}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        message: `Admin Update: ${filename} via JSON Editor`,
                        content: b64Content,
                        sha: currentFileSha,
                        branch: "main"
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    currentFileSha = result.content.sha; // Save new SHA for next edit
                    msg.textContent = "✅ Saved successfully to GitHub!";
                    msg.style.color = "var(--terminal-green)";
                } else {
                    throw new Error(result.message || "Failed to save.");
                }

            } catch (error) {
                msg.textContent = "❌ Error: " + error.message;
                msg.style.color = "var(--moroccan-red)";
            } finally {
                saveBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
