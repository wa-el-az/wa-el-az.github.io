<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael — Status Editor</title>
    <link rel="icon" type="image/svg+xml" href="../assets/icon.svg" />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { max-width: 500px; text-align: center; width: 100%; position: relative; z-index: 10; }
        #apiMsg { margin-top: 15px; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .navBtn { display: inline-flex; align-items: center; gap: 6px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .lucide { width: 1.2em; height: 1.2em; vertical-align: -0.125em; }
    </style>
<style>
/* Morocco flag replacement */
.ma-flag{
  width: 1em;
  height: 1em;
  object-fit: contain;
  display: inline-block;
  vertical-align: -0.14em;
  transition: transform 160ms ease, filter 160ms ease;
  transform-origin: center;
}

.ma-flag:hover{
  transform: translateY(-1px) scale(1.14);
  filter: drop-shadow(0 2px 8px rgba(255,255,255,0.35));
}

.custom-emoji-inline.ma-flag{
  margin: 0 0.08em;
}

.tea-flag{
  width: 140px;
  height: 140px;
  vertical-align: middle;
  filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
}

.tea-flag:hover{
  transform: scale(1.04);
  filter: drop-shadow(0 18px 28px rgba(0,0,0,0.65));
}

.achieve-flag{
  width: 36px;
  height: 36px;
  vertical-align: middle;
}
</style>
</head>
<body>
    <div class="bg-left"></div>
    <div class="bg-right"></div>
    <a class="navBtn" href="hub" style="position: absolute; top: 20px; right: 20px;"><i data-lucide="arrow-left"></i> Back to Hub</a>

    <div class="card">
        <h1 style="display: flex; align-items: center; justify-content: center; gap: 10px;"><i data-lucide="activity"></i> Update Status</h1>
        <p class="sub">This updates the green badge on your Home Page.</p>
        
        <input type="text" id="statusInput" placeholder="e.g. Playing Asphalt 8" autocomplete="off">
        
        <button class="btn" id="pushBtn" style="background: #4ade80;"><i data-lucide="refresh-cw"></i> Update Live Status</button>
        <p id="apiMsg"></p>
    </div>

    <script src="../js/config.js"></script>
    <script>
        lucide.createIcons();
        let fileSha = null;

        window.onload = async () => {
            if (!localStorage.getItem('gh_token')) {
                window.location.href = "hub";
                return;
            }
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/json/status.json`, { headers: { 'Authorization': `Bearer ${CONFIG.GITHUB_TOKEN}` } });
                if (res.ok) {
                    const data = await res.json();
                    fileSha = data.sha;
                    const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    document.getElementById('statusInput').value = content.status;
                }
            } catch (e) {}
        };

        document.getElementById('pushBtn').addEventListener('click', async () => {
            const newStatus = document.getElementById('statusInput').value.trim();
            const msg = document.getElementById('apiMsg');
            
            msg.style.color = "#fff";
            msg.innerHTML = `<i data-lucide="loader-2" class="lucide-spin"></i> Pushing...`;
            lucide.createIcons();

            const payload = {
                message: "Update status",
                content: btoa(unescape(encodeURIComponent(JSON.stringify({ status: newStatus }, null, 2))))
            };
            if (fileSha) payload.sha = fileSha;

            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/json/status.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${CONFIG.GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    const data = await res.json();
                    fileSha = data.content.sha;
                    msg.style.color = "#4ade80";
                    msg.innerHTML = `<i data-lucide="check-circle-2"></i> Status Updated!`;
                } else {
                    throw new Error("API Error");
                }
            } catch (e) {
                msg.style.color = "#ff6b6b";
                msg.innerHTML = `<i data-lucide="x-circle"></i> Failed to update.`;
            }
            lucide.createIcons();
        });
    </script>
    <script src="../js/context-menu.js"></script>
</body>
</html>
