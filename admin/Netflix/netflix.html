<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WaelOS — Netflix DB</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .container { 
            max-width: 1300px; 
            margin: 100px auto 50px; 
            padding: 0 5vw; 
            position: relative; 
            z-index: 10; 
        }
        
        .db-header {
            margin-bottom: 40px;
        }

        .db-header h1 {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #e50914; /* Netflix Red */
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); 
            gap: 25px; 
        }
        
        .account-card { 
            padding: 24px; 
            font-size: 14px; 
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .account-card h3 { 
            margin: 0 0 15px 0; 
            color: var(--terminal-green); 
            font-size: 16px; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            word-break: break-all;
            line-height: 1.3;
        }
        
        .detail-row { 
            display: flex; 
            justify-content: space-between; 
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        .detail-label { 
            color: var(--text-muted); 
            font-weight: 600; 
        }
        
        .detail-value { 
            color: #fff; 
            text-align: right; 
            max-width: 65%; 
            font-weight: 500;
        }
        
        .cookie-box { 
            background: rgba(0, 0, 0, 0.4); 
            padding: 12px; 
            border-radius: 8px; 
            font-family: 'JetBrains Mono', monospace, sans-serif; 
            font-size: 11px; 
            max-height: 80px; 
            overflow-y: auto; 
            margin-top: 10px; 
            color: rgba(255,255,255,0.6); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            word-break: break-all;
        }
        
        .cookie-box::-webkit-scrollbar { width: 6px; }
        .cookie-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        #loading { 
            text-align: center; 
            font-size: 18px; 
            margin-top: 50px; 
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="index.html"><i data-lucide="home"></i> Home</a>
    
    <div class="container">
        <div class="db-header">
            <h1><i data-lucide="database"></i> DB Viewer</h1>
            <p class="sub">Parsing accounts from 666x NETFLIX.txt</p>
        </div>
        
        <div id="loading">Reading data stream... <i data-lucide="loader-2" class="spin"></i></div>
        <div class="grid" id="accountsGrid"></div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            
            try {
                // Fetch the uploaded text file
                const response = await fetch('666x NETFLIX.txt');
                if (!response.ok) throw new Error('Could not load 666x NETFLIX.txt');
                const text = await response.text();
                
                // Split file by new lines
                const lines = text.split('\n').filter(line => line.trim() !== '');
                const grid = document.getElementById('accountsGrid');
                const fragment = document.createDocumentFragment();
                
                lines.forEach(line => {
                    const parts = line.split(' | ');
                    if (parts.length < 2) return; // Skip invalid or empty lines
                    
                    // The first part is email:password
                    const credentials = parts[0].split(':');
                    const email = credentials[0];
                    const password = credentials.slice(1).join(':'); 
                    
                    // Parse the rest of the string into a data dictionary
                    const data = {};
                    parts.slice(1).forEach(part => {
                        const [key, ...valParts] = part.split(' = ');
                        if (key) {
                            data[key.trim()] = valParts.join(' = ').trim();
                        }
                    });
                    
                    // Create the Card UI
                    const card = document.createElement('div');
                    card.className = 'card account-card';
                    
                    let html = `<h3><i data-lucide="user"></i> ${email}</h3>`;
                    
                    // Password gets special styling
                    html += `
                        <div class="detail-row">
                            <span class="detail-label">Password</span>
                            <span class="detail-value" style="color:#ff4757; font-family: monospace; font-size: 15px;">${password}</span>
                        </div>`;
                    
                    // Map the exact keys from the text file to clean display labels
                    const fields = [
                        { key: 'Country', label: 'Country' },
                        { key: 'memberPlan', label: 'Plan' },
                        { key: 'memberSince', label: 'Member Since' },
                        { key: 'isUserOnHold', label: 'On Hold' },
                        { key: 'videoQuality', label: 'Video Quality' },
                        { key: 'phonenumber', label: 'Phone' },
                        { key: 'maxStreams', label: 'Max Streams' },
                        { key: 'paymentType', label: 'Payment Type' },
                        { key: 'HasSlot', label: 'Has Slot' },
                        { key: 'last4digits', label: 'CC Last 4' },
                        { key: 'Total_CC', label: 'Total CC' }
                    ];
                    
                    // Generate rows dynamically
                    fields.forEach(f => {
                        if (data[f.key]) {
                            let valColor = "#fff";
                            if (data[f.key] === "false") valColor = "#4ade80";
                            if (data[f.key] === "true") valColor = "#ff4757";
                            
                            html += `<div class="detail-row"><span class="detail-label">${f.label}</span><span class="detail-value" style="color: ${valColor}">${data[f.key]}</span></div>`;
                        }
                    });
                    
                    // Add the cookie block at the bottom
                    if (data['cookies']) {
                        html += `<div class="detail-label" style="margin-top:10px; font-size: 12px;"><i data-lucide="cookie" style="width:14px; height:14px; margin-right:4px;"></i> Session Cookies</div>`;
                        html += `<div class="cookie-box">${data['cookies']}</div>`;
                    }
                    
                    card.innerHTML = html;
                    fragment.appendChild(card);
                });
                
                // Remove loading spinner and inject the grid
                document.getElementById('loading').style.display = 'none';
                grid.appendChild(fragment);
                
                // Draw all the new icons we just generated
                lucide.createIcons();
                
            } catch (error) {
                document.getElementById('loading').innerHTML = `<span style="color:#ff4757;"><i data-lucide="alert-triangle"></i> Error: ${error.message}. Make sure the text file is in the same folder!</span>`;
                lucide.createIcons();
            }
        });
    </script>
    
    <script src="js/core.js"></script>
    <script src="js/context-menu.js"></script>
</body>
</html>
