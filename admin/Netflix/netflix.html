<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WaelOS — Netflix DB</title>
    <link rel="icon" type="image/svg+xml" href="../../assets/icon.svg" />
    <link rel="stylesheet" href="../../css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .container { 
            max-width: 1300px; 
            margin: 80px auto 50px; 
            padding: 0 5vw; 
            position: relative; 
            z-index: 10; 
        }
        
        .db-header { margin-bottom: 30px; }
        .db-header h1 {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #e50914; 
        }

        /* --- Filter Toolbar --- */
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .filter-bar input {
            flex: 1;
            min-width: 250px;
            margin-bottom: 0; 
            padding-left: 40px;
        }
        .filter-group {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }
        .filter-group i {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            width: 18px;
            height: 18px;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); 
            gap: 25px; 
        }
        
        .account-card { 
            padding: 24px; 
            font-size: 14px; 
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .account-card h3 { 
            margin: 0 0 15px 0; 
            color: var(--terminal-green); 
            font-size: 16px; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            word-break: break-all;
        }
        
        .detail-row { 
            display: flex; 
            justify-content: space-between; 
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        .detail-label { color: var(--text-muted); font-weight: 600; }
        .detail-value { color: #fff; text-align: right; max-width: 65%; font-weight: 500; }
        
        .cookie-box { 
            background: rgba(0, 0, 0, 0.4); 
            padding: 12px; 
            border-radius: 8px; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 11px; 
            max-height: 80px; 
            overflow-y: auto; 
            margin-top: 10px; 
            color: rgba(255,255,255,0.6); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            word-break: break-all;
        }
        
        #loading { 
            text-align: center; 
            font-size: 18px; 
            margin-top: 50px; 
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        #noResults {
            display: none;
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 16px;
            background: var(--card-bg);
            border: 1px dashed var(--card-border);
            border-radius: 16px;
        }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="../../index.html"><i data-lucide="home"></i> Home</a>
    
    <div class="container">
        <div class="db-header">
            <h1><i data-lucide="database"></i> DB Viewer</h1>
            <p class="sub">Parsing accounts from 666x NETFLIX.txt</p>
        </div>

        <div class="filter-bar" id="filterBar" style="display: none;">
            <div class="filter-group">
                <i data-lucide="mail"></i>
                <input type="text" id="filterEmail" placeholder="Filter by Email..." autocomplete="off">
            </div>
            <div class="filter-group">
                <i data-lucide="globe"></i>
                <input type="text" id="filterCountry" placeholder="Filter by Country (e.g. BR, DE)..." autocomplete="off">
            </div>
            <div class="filter-group">
                <i data-lucide="monitor-play"></i>
                <input type="text" id="filterPlan" placeholder="Filter by Plan (e.g. Premium)..." autocomplete="off">
            </div>
        </div>
        
        <div id="loading">Reading data stream... <i data-lucide="loader-2" class="spin"></i></div>
        
        <div class="grid" id="accountsGrid">
            <div id="noResults">
                <i data-lucide="search-x" style="width: 40px; height: 40px; margin-bottom: 10px; opacity: 0.5;"></i><br>
                No accounts match your filters.
            </div>
        </div>
    </div>

    <script>
        let allAccounts = [];

        window.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            
            try {
                const response = await fetch('666x NETFLIX.txt');
                if (!response.ok) throw new Error('File not found in this folder');
                const text = await response.text();
                
                const lines = text.split('\n').filter(line => line.trim().includes('|'));
                
                lines.forEach(line => {
                    const parts = line.split(' | ');
                    const credentials = parts[0].split(':');
                    const email = credentials[0];
                    const password = credentials.slice(1).join(':'); 
                    
                    const data = {};
                    parts.slice(1).forEach(part => {
                        const [key, ...valParts] = part.split(' = ');
                        if (key) data[key.trim()] = valParts.join(' = ').trim();
                    });
                    
                    allAccounts.push({ email, password, data });
                });
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('filterBar').style.display = 'flex';
                renderAccounts(allAccounts);
                
            } catch (error) {
                document.getElementById('loading').innerHTML = `<span style="color:#ff4757;">Error: ${error.message}</span>`;
            }
        });

        function renderAccounts(accountsToRender) {
            const grid = document.getElementById('accountsGrid');
            const noResults = document.getElementById('noResults');
            
            Array.from(grid.children).forEach(child => {
                if (child.id !== 'noResults') child.remove();
            });
            
            if (accountsToRender.length === 0) {
                noResults.style.display = 'block';
                return;
            } else {
                noResults.style.display = 'none';
            }

            const fragment = document.createDocumentFragment();
            
            accountsToRender.forEach(acc => {
                const card = document.createElement('div');
                card.className = 'card account-card';
                
                let html = `<h3><i data-lucide="user"></i> ${acc.email}</h3>`;
                html += `<div class="detail-row"><span class="detail-label">Password</span><span class="detail-value" style="color:#ff4757;">${acc.password}</span></div>`;
                
                const fields = [
                    { key: 'Country', label: 'Country' },
                    { key: 'memberPlan', label: 'Plan' },
                    { key: 'memberSince', label: 'Member Since' },
                    { key: 'isUserOnHold', label: 'On Hold' },
                    { key: 'videoQuality', label: 'Video Quality' },
                    { key: 'phonenumber', label: 'Phone' },
                    { key: 'maxStreams', label: 'Max Streams' },
                    { key: 'paymentType', label: 'Payment' },
                    { key: 'HasSlot', label: 'Has Slot' },
                    { key: 'last4digits', label: 'CC Last 4' },
                    { key: 'Total_CC', label: 'Total CC' }
                ];
                
                fields.forEach(f => {
                    if (acc.data[f.key]) {
                        html += `<div class="detail-row"><span class="detail-label">${f.label}</span><span class="detail-value">${acc.data[f.key]}</span></div>`;
                    }
                });
                
                if (acc.data['cookies']) {
                    html += `<div class="cookie-box">${acc.data['cookies']}</div>`;
                }
                
                card.innerHTML = html;
                fragment.appendChild(card);
            });
            
            grid.appendChild(fragment);
            lucide.createIcons();
        }

        function applyFilters() {
            const emailQuery = document.getElementById('filterEmail').value.toLowerCase();
            const countryQuery = document.getElementById('filterCountry').value.toLowerCase();
            const planQuery = document.getElementById('filterPlan').value.toLowerCase();

            const filtered = allAccounts.filter(acc => {
                const matchEmail = acc.email.toLowerCase().includes(emailQuery);
                const country = acc.data['Country'] ? acc.data['Country'].toLowerCase() : '';
                const matchCountry = country.includes(countryQuery);
                const plan = acc.data['memberPlan'] ? acc.data['memberPlan'].toLowerCase() : '';
                const matchPlan = plan.includes(planQuery);

                return matchEmail && matchCountry && matchPlan;
            });

            renderAccounts(filtered);
        }

        document.getElementById('filterEmail').addEventListener('input', applyFilters);
        document.getElementById('filterCountry').addEventListener('input', applyFilters);
        document.getElementById('filterPlan').addEventListener('input', applyFilters);
    </script>
    
    <script src="../../js/core.js"></script>
    <script src="../../js/context-menu.js"></script>
</body>
</html>
