<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael — Codes Admin</title>
    <link rel="icon" type="image/svg+xml" href="../assets/icon.svg" />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { padding: 60px 20px; }
        .container { position: relative; z-index: 10; max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: var(--muted); }
        .code-list { max-height: 200px; overflow-y: auto; background: rgba(0,0,0,.18); border-radius: 12px; padding: 10px; border: 1px solid rgba(255,255,255,.1); }
        .code-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,.05); }
        .code-item:last-child { border-bottom: none; }
        .bypasses-box { background: rgba(0,0,0,.3); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 15px; margin-top: 20px; }
        .bypasses-box h3 { margin: 0 0 10px; font-size: 16px; color: #4ade80; display: flex; align-items: center; gap: 6px; }
        .bypasses-box ul { margin: 0; padding-left: 20px; color: var(--muted); font-size: 14px; line-height: 1.6; }
        .bypasses-box li strong { color: #fff; }
        textarea { resize: vertical; }
        .navBtn { display: inline-flex; align-items: center; gap: 6px; }
        .btn-danger { display: flex; align-items: center; justify-content: center; gap: 4px; }
        .lucide { width: 1.2em; height: 1.2em; vertical-align: -0.125em; }

        @media (max-width: 768px) { 
            .container { grid-template-columns: 1fr; margin-top: 40px; } 
        }
    </style>
</head>
<body>
    <div class="bg-left"></div>
    <div class="bg-right"></div>
    <a class="navBtn" href="hub"><i data-lucide="arrow-left"></i> Back to Hub</a>

    <div class="container card">
        <div>
            <h1 style="margin-top: 0; display: flex; align-items: center; gap: 10px;"><i data-lucide="plus-circle"></i> Add Code</h1>
            <form id="addCodeForm">
                <label>New Code</label>
                <input type="text" id="newCode" required autocomplete="off" style="text-transform: uppercase;">
                
                <label>Action Type</label>
                <select id="actionType" required>
                    <option value="redirect">Redirect to URL</option>
                    <option value="popup">Pop-up Message</option>
                    <option value="script">Custom Script (JS)</option>
                </select>
                
                <div id="urlField">
                    <label>Target URL</label>
                    <input type="url" id="targetUrl" placeholder="https://...">
                </div>
                
                <div id="msgField" style="display: none;">
                    <label>Popup Message</label>
                    <input type="text" id="popupMsg" placeholder="Secret unlocked!">
                </div>

                <div id="scriptField" style="display: none;">
                    <label>Custom JavaScript</label>
                    <textarea id="customScript" placeholder="alert('Code Activated!'); window.unlockAchievement('hack_captain');" style="width: 100%; min-height: 100px; background: rgba(0,0,0,0.3); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 10px; outline: none; font-family: monospace;"></textarea>
                </div>
                
                <button type="submit" class="btn" style="margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 6px;"><i data-lucide="save"></i> Add to List</button>
            </form>

            <div style="background: rgba(0,0,0,.25); padding: 15px; border-radius: 12px; margin-top: 20px; border: 1px solid rgba(255,255,255,.1);">
                <button class="btn" id="pushBtn" style="background: #4ade80; display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%;"><i data-lucide="upload-cloud"></i> Push to GitHub</button>
                <p id="apiMsg" style="margin-top: 10px; font-weight: bold; font-size: 14px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px;"></p>
            </div>
        </div>

        <div>
            <h2 style="margin-top: 0; display: flex; align-items: center; gap: 10px;"><i data-lucide="key"></i> Current Codes</h2>
            <div class="code-list" id="codeList"></div>

            <div class="bypasses-box">
                <h3><i data-lucide="shield-alert"></i> System Bypasses</h3>
                <ul>
                    <li><strong>UNLOCK-ALL</strong>: Trophies Override</li>
                    <li><strong>ADMIN</strong>: Admin Hub</li>
                    <li><strong>MESSAGE</strong>: Contact Form</li>
                    <li><strong>TEA</strong>: Moroccan Tea</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script>
        lucide.createIcons();
        let db = {};
        let fileSha = null;

        document.getElementById('actionType').addEventListener('change', function(e) {
            const val = e.target.value;
            document.getElementById('urlField').style.display = val === 'redirect' ? 'block' : 'none';
            document.getElementById('msgField').style.display = val === 'popup' ? 'block' : 'none';
            document.getElementById('scriptField').style.display = val === 'script' ? 'block' : 'none';
            
            document.getElementById('targetUrl').required = val === 'redirect';
            document.getElementById('popupMsg').required = val === 'popup';
            document.getElementById('customScript').required = val === 'script';
        });

        window.onload = async () => {
            if (!localStorage.getItem('gh_token')) {
                window.location.href = "hub";
                return;
            }
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/json/codes.json`, { headers: { 'Authorization': `Bearer ${CONFIG.GITHUB_TOKEN}` } });
                if (res.ok) {
                    const data = await res.json();
                    fileSha = data.sha;
                    db = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                }
            } catch (e) {
            }
            updateUI();
        };

        document.getElementById('addCodeForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const code = document.getElementById('newCode').value.trim().toUpperCase();
            const type = document.getElementById('actionType').value;
            
            if (type === 'redirect') {
                db[code] = { type: type, url: document.getElementById('targetUrl').value.trim() };
            } else if (type === 'popup') {
                db[code] = { type: type, message: document.getElementById('popupMsg').value.trim() };
            } else if (type === 'script') {
                db[code] = { type: type, script: document.getElementById('customScript').value.trim() };
            }

            document.getElementById('addCodeForm').reset();
            document.getElementById('actionType').dispatchEvent(new Event('change'));
            updateUI();
        });

        function deleteCode(code) {
            delete db[code];
            updateUI();
        }

        function updateUI() {
            const listDiv = document.getElementById('codeList');
            listDiv.innerHTML = '';
            
            if (Object.keys(db).length === 0) {
                listDiv.innerHTML = '<p style="text-align:center; color:#aaa;">No codes in database.</p>';
                return;
            }

            for (const [code, data] of Object.entries(db)) {
                listDiv.innerHTML += `
                    <div class="code-item">
                        <div>
                            <strong style="color:#fff;">${code}</strong><br>
                            <span style="font-size:12px; color:#aaa;">${data.type}</span>
                        </div>
                        <button class="btn-danger" onclick="deleteCode('${code}')"><i data-lucide="trash-2"></i> Delete</button>
                    </div>`;
            }
            lucide.createIcons();
        }

        document.getElementById('pushBtn').addEventListener('click', async () => {
            const msg = document.getElementById('apiMsg');
            msg.style.color = "#fff";
            msg.innerHTML = `<i data-lucide="loader-2" class="lucide-spin"></i> Pushing...`;
            lucide.createIcons();

            const payload = {
                message: "Updated codes",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2))))
            };
            if (fileSha) payload.sha = fileSha;

            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/json/codes.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${CONFIG.GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    const data = await res.json();
                    fileSha = data.content.sha;
                    msg.style.color = "#4ade80";
                    msg.innerHTML = `<i data-lucide="check-circle-2"></i> Codes Updated Live!`;
                } else {
                    throw new Error("API Error");
                }
            } catch (e) {
                msg.style.color = "#ff6b6b";
                msg.innerHTML = `<i data-lucide="x-circle"></i> Failed to update.`;
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
