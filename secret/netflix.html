<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WaelOS — Netflix DB</title>
    <link rel="icon" type="image/svg+xml" href="../../assets/icon.svg" />
    <link rel="stylesheet" href="../../css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 1. Theme Override for this specific app */
        body {
            --terminal-green: #e50914; 
            --card-bg: rgba(15, 15, 15, 0.5);
        }

        .container { 
            max-width: 1300px; 
            margin: 80px auto 50px; 
            padding: 0 5vw; 
            position: relative; 
            z-index: 10; 
        }
        
        .db-header { 
            margin-bottom: 30px; 
            text-align: center;
        }
        
        .db-header h1 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #e50914; 
            font-size: 42px;
            text-shadow: 0 0 20px rgba(229, 9, 20, 0.4);
            margin: 0 0 5px 0;
        }

        /* --- Unified Glass Filter Bar --- */
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 8px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .filter-group {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }
        .filter-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 18px;
            height: 18px;
            transition: color 0.3s;
        }
        .filter-group input {
            width: 100%;
            margin: 0;
            padding: 14px 14px 14px 48px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 10px;
            color: #fff;
        }
        .filter-group input:focus {
            background: rgba(229, 9, 20, 0.05);
            border-color: rgba(229, 9, 20, 0.3);
        }
        .filter-group input:focus + i, .filter-group input:focus ~ i {
            color: #e50914;
        }
        
        /* Filter dividers */
        .filter-group:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            height: 60%;
            width: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            .filter-bar { flex-direction: column; padding: 15px; }
            .filter-group:not(:last-child)::after { display: none; }
        }

        /* --- Card Grid Design --- */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); 
            gap: 25px; 
        }
        
        .account-card { 
            padding: 24px; 
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 3px solid #e50914; 
            background: linear-gradient(180deg, rgba(229, 9, 20, 0.03) 0%, rgba(15,15,15,0.6) 100%);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease, border-color 0.3s;
        }

        .account-card:hover {
            transform: translateY(-5px);
            border-color: rgba(229, 9, 20, 0.4);
            box-shadow: 0 15px 35px rgba(229, 9, 20, 0.15), 0 0 20px rgba(0,0,0,0.5);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
            word-break: break-all;
        }
        
        .card-header h3 { 
            margin: 0; 
            color: #fff; 
            font-size: 17px; 
            font-weight: 700;
        }

        .card-header i { color: #e50914; }
        
        .password-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 10px 14px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            color: #e50914;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .password-box span { color: var(--text-muted); font-family: 'Inter', sans-serif; font-size: 12px; }

        .detail-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.08); 
            font-size: 14px;
        }
        .detail-row:last-of-type { border-bottom: none; }
        
        .detail-label { color: var(--text-muted); font-weight: 500; }
        .detail-value { color: #fff; text-align: right; font-weight: 600; }

        /* Modern UI Badges */
        .badge {
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-red { background: rgba(229, 9, 20, 0.15); color: #ff4757; border: 1px solid rgba(229, 9, 20, 0.3); }
        .badge-green { background: rgba(74, 222, 128, 0.15); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.3); }
        .badge-gray { background: rgba(255, 255, 255, 0.1); color: #ccc; border: 1px solid rgba(255, 255, 255, 0.2); }
        .mono-text { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #a1a1aa; }
        
        .cookie-box { 
            background: #000; 
            padding: 12px; 
            border-radius: 8px; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 11px; 
            max-height: 70px; 
            overflow-y: auto; 
            color: rgba(255,255,255,0.4); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            word-break: break-all;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
        }
        
        #loading { 
            text-align: center; 
            font-size: 18px; 
            margin-top: 50px; 
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        #noResults {
            display: none;
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 40px;
            color: var(--text-muted);
            font-size: 16px;
            background: rgba(0,0,0,0.2);
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 16px;
        }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="../../index.html"><i data-lucide="home"></i> Home</a>
    
    <div class="container">
        <div class="db-header">
            <h1>
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Netflix_icon.svg/500px-Netflix_icon.svg.png" alt="Netflix" style="width: 38px; height: 38px; object-fit: contain; filter: drop-shadow(0 4px 10px rgba(229,9,20,0.3));">
                Netflix
            </h1>
            <p class="sub">Secure Parsing Engine — 666x NETFLIX.txt</p>
        </div>

        <div class="filter-bar" id="filterBar" style="display: none;">
            <div class="filter-group">
                <i data-lucide="search"></i>
                <input type="text" id="filterEmail" placeholder="Search Email..." autocomplete="off">
            </div>
            <div class="filter-group">
                <i data-lucide="globe"></i>
                <input type="text" id="filterCountry" placeholder="Country Code (e.g. BR)..." autocomplete="off">
            </div>
            <div class="filter-group">
                <i data-lucide="layers"></i>
                <input type="text" id="filterPlan" placeholder="Subscription Plan..." autocomplete="off">
            </div>
        </div>
        
        <div id="loading">Decrypting data stream... <i data-lucide="loader-2" class="spin"></i></div>
        
        <div class="grid" id="accountsGrid">
            <div id="noResults">
                <i data-lucide="ghost" style="width: 48px; height: 48px; margin-bottom: 15px; opacity: 0.3;"></i><br>
                No accounts match your current filters.
            </div>
        </div>
    </div>

    <script>
        let allAccounts = [];

        window.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            
            try {
                const response = await fetch('666x NETFLIX.txt');
                if (!response.ok) throw new Error('Database file not found');
                const text = await response.text();
                
                const lines = text.split('\n').filter(line => line.trim().includes('|'));
                
                lines.forEach(line => {
                    const parts = line.split(' | ');
                    const credentials = parts[0].split(':');
                    const email = credentials[0];
                    const password = credentials.slice(1).join(':'); 
                    
                    const data = {};
                    parts.slice(1).forEach(part => {
                        const [key, ...valParts] = part.split(' = ');
                        if (key) data[key.trim()] = valParts.join(' = ').trim();
                    });
                    
                    allAccounts.push({ email, password, data });
                });
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('filterBar').style.display = 'flex';
                renderAccounts(allAccounts);
                
            } catch (error) {
                document.getElementById('loading').innerHTML = `<span style="color:#ff4757;">System Error: ${error.message}</span>`;
            }
        });

        function getBadge(value, type) {
            if (!value || value === 'N/A' || value === 'false') return `<span class="badge badge-gray">${value || 'N/A'}</span>`;
            if (value === 'true') return `<span class="badge badge-red">Yes</span>`;
            if (type === 'plan' && value.toLowerCase().includes('premium')) return `<span class="badge badge-red">${value}</span>`;
            return `<span class="badge badge-green">${value}</span>`;
        }

        function renderAccounts(accountsToRender) {
            const grid = document.getElementById('accountsGrid');
            const noResults = document.getElementById('noResults');
            
            Array.from(grid.children).forEach(child => {
                if (child.id !== 'noResults') child.remove();
            });
            
            if (accountsToRender.length === 0) {
                noResults.style.display = 'block';
                return;
            } else {
                noResults.style.display = 'none';
            }

            const fragment = document.createDocumentFragment();
            
            accountsToRender.forEach(acc => {
                const card = document.createElement('div');
                card.className = 'card account-card';
                
                let html = `
                    <div class="card-header">
                        <i data-lucide="user"></i>
                        <h3>${acc.email}</h3>
                    </div>
                    <div class="password-box">
                        <span>PASS</span> ${acc.password}
                    </div>
                `;
                
                const c = acc.data;
                
                // Top Row Data (Badges)
                html += `<div class="detail-row" style="margin-top: 5px;">
                            <span class="detail-label">Country / Plan</span>
                            <div style="display:flex; gap:6px;">
                                ${c['Country'] ? `<span class="badge badge-gray">${c['Country']}</span>` : ''}
                                ${c['memberPlan'] ? getBadge(c['memberPlan'], 'plan') : ''}
                            </div>
                         </div>`;
                
                // Optional Details
                if (c['videoQuality']) html += `<div class="detail-row"><span class="detail-label">Quality</span><span class="detail-value">${c['videoQuality']}</span></div>`;
                if (c['maxStreams']) html += `<div class="detail-row"><span class="detail-label">Max Streams</span><span class="detail-value">${c['maxStreams']} Screens</span></div>`;
                if (c['isUserOnHold']) html += `<div class="detail-row"><span class="detail-label">On Hold</span><span class="detail-value">${c['isUserOnHold'] === 'true' ? '<span class="badge badge-red">Yes</span>' : '<span class="badge badge-gray">No</span>'}</span></div>`;
                if (c['phonenumber'] && c['phonenumber'] !== 'N/A') html += `<div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value mono-text">${c['phonenumber']}</span></div>`;
                if (c['paymentType']) html += `<div class="detail-row"><span class="detail-label">Payment</span><span class="detail-value">${c['paymentType']}</span></div>`;
                if (c['last4digits'] && c['last4digits'] !== 'N/A') html += `<div class="detail-row"><span class="detail-label">CC Ending In</span><span class="detail-value mono-text">${c['last4digits']}</span></div>`;
                
                // Cookies
                if (c['cookies']) {
                    html += `<div class="detail-label" style="margin-top:10px; font-size: 11px; text-transform:uppercase;"><i data-lucide="cookie" style="width:12px; height:12px; margin-right:4px;"></i> Session Tokens</div>`;
                    html += `<div class="cookie-box">${c['cookies']}</div>`;
                }
                
                card.innerHTML = html;
                fragment.appendChild(card);
            });
            
            grid.appendChild(fragment);
            lucide.createIcons();
        }

        // Filtering
        function applyFilters() {
            const emailQuery = document.getElementById('filterEmail').value.toLowerCase();
            const countryQuery = document.getElementById('filterCountry').value.toLowerCase();
            const planQuery = document.getElementById('filterPlan').value.toLowerCase();

            const filtered = allAccounts.filter(acc => {
                const matchEmail = acc.email.toLowerCase().includes(emailQuery);
                const country = acc.data['Country'] ? acc.data['Country'].toLowerCase() : '';
                const matchCountry = country.includes(countryQuery);
                const plan = acc.data['memberPlan'] ? acc.data['memberPlan'].toLowerCase() : '';
                const matchPlan = plan.includes(planQuery);

                return matchEmail && matchCountry && matchPlan;
            });

            renderAccounts(filtered);
        }

        document.getElementById('filterEmail').addEventListener('input', applyFilters);
        document.getElementById('filterCountry').addEventListener('input', applyFilters);
        document.getElementById('filterPlan').addEventListener('input', applyFilters);
    </script>
    
    <script src="../../js/core.js"></script>
    <script src="../../js/context-menu.js"></script>
</body>
</html>
