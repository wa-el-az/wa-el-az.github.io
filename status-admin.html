<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael — Status Editor</title>
    <link rel="icon" type="image/png" href="assets/icon.png" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        body { padding: 20px; display: flex; align-items: center; justify-content: center; }
        .card { max-width: 500px; text-align: center; width: 100%; }
        #apiMsg { margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="bg-left"></div>
    <div class="bg-right"></div>
    <a class="navBtn" href="admin">Back to Hub</a>

    <div class="card">
        <h1>Update Status</h1>
        <p class="sub">This updates the green badge on your Home Page.</p>
        
        <input type="text" id="statusInput" placeholder="e.g. Playing Asphalt 8" autocomplete="off">
        
        <button class="btn" id="pushBtn" style="background: #4ade80;">Update Live Status</button>
        <p id="apiMsg"></p>
    </div>

    <script src="js/config.js"></script>
    <script>
        let fileSha = null;

        window.onload = async () => {
            if (!localStorage.getItem('gh_token')) {
                window.location.href = "admin";
                return;
            }
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/status.json`);
                if (res.ok) {
                    const data = await res.json();
                    fileSha = data.sha;
                    const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    document.getElementById('statusInput').value = content.status;
                }
            } catch (e) {
                // Ignore if missing
            }
        };

        document.getElementById('pushBtn').addEventListener('click', async () => {
            const newStatus = document.getElementById('statusInput').value.trim();
            const msg = document.getElementById('apiMsg');
            
            msg.style.color = "#fff";
            msg.innerText = "Pushing...";

            const payload = {
                message: "Update status",
                content: btoa(unescape(encodeURIComponent(JSON.stringify({ status: newStatus }, null, 2))))
            };
            if (fileSha) payload.sha = fileSha;

            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/status.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${CONFIG.GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    const data = await res.json();
                    fileSha = data.content.sha;
                    msg.style.color = "#4ade80";
                    msg.innerText = "✓ Status Updated!";
                } else {
                    throw new Error("API Error");
                }
            } catch (e) {
                msg.style.color = "#ff6b6b";
                msg.innerText = "✗ Failed to update.";
            }
        });
    </script>
</body>
</html>
