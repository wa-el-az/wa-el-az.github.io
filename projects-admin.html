<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael — Projects Admin</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { padding: 40px 20px; }
        .container { position: relative; z-index: 10; max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: var(--muted); }
        textarea { resize: vertical; min-height: 80px; }
        .proj-list { max-height: 300px; overflow-y: auto; background: rgba(0,0,0,.18); border-radius: 12px; padding: 10px; border: 1px solid rgba(255,255,255,.1); }
        .proj-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,.05); }
        .proj-item:last-child { border-bottom: none; }
        .navBtn { display: inline-flex; align-items: center; gap: 6px; }
        .btn-danger { display: inline-flex; align-items: center; gap: 6px; }
        .lucide { width: 1.2em; height: 1.2em; vertical-align: -0.125em; }

        @media (max-width: 768px) { 
            .container { grid-template-columns: 1fr; margin-top: 40px; } 
        }
    </style>
</head>
<body>
    <div class="bg-left"></div>
    <div class="bg-right"></div>
    <a class="navBtn" href="admin"><i data-lucide="arrow-left"></i> Back to Hub</a>

    <div class="container card">
        <div>
            <h1 style="margin-top: 0; display: flex; align-items: center; gap: 10px;"><i data-lucide="plus-circle"></i> Add Project</h1>
            <form id="addProjForm">
                <label>Project ID (e.g. py-chat)</label>
                <input type="text" id="pId" required autocomplete="off">
                
                <label>Project Title</label>
                <input type="text" id="pTitle" required autocomplete="off">
                
                <label>Description</label>
                <textarea id="pDesc" required></textarea>
                
                <label>Link (Optional)</label>
                <input type="text" id="pLink" autocomplete="off">
                
                <button type="submit" class="btn" style="display: flex; align-items: center; justify-content: center; gap: 6px;"><i data-lucide="save"></i> Add to List</button>
            </form>
        </div>

        <div>
            <h2 style="margin-top: 0; display: flex; align-items: center; gap: 10px;"><i data-lucide="folder"></i> Current Projects</h2>
            <div class="proj-list" id="projList"></div>

            <div style="background: rgba(0,0,0,.25); padding: 15px; border-radius: 12px; margin-top: 20px; border: 1px solid rgba(255,255,255,.1);">
                <button class="btn" id="pushBtn" style="background: #4ade80; display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%;"><i data-lucide="upload-cloud"></i> Push to GitHub</button>
                <p id="apiMsg" style="margin-top: 10px; font-weight: bold; font-size: 14px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px;"></p>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        lucide.createIcons();
        let db = {};
        let fileSha = null;

        window.onload = async () => {
            if (!localStorage.getItem('gh_token')) {
                window.location.href = "admin";
                return;
            }
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/projects.json`);
                if (res.ok) {
                    const data = await res.json();
                    fileSha = data.sha;
                    db = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                }
            } catch (e) {}
            updateUI();
        };

        document.getElementById('addProjForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('pId').value.trim().toLowerCase().replace(/\s+/g, '-');
            
            db[id] = {
                title: document.getElementById('pTitle').value.trim(),
                description: document.getElementById('pDesc').value.trim(),
                link: document.getElementById('pLink').value.trim()
            };

            document.getElementById('addProjForm').reset();
            updateUI();
        });

        function deleteProj(id) {
            delete db[id];
            updateUI();
        }

        function updateUI() {
            const listDiv = document.getElementById('projList');
            listDiv.innerHTML = '';
            
            if (Object.keys(db).length === 0) {
                listDiv.innerHTML = '<p style="text-align:center; color:#aaa;">No projects yet.</p>';
                return;
            }

            for (const [id, data] of Object.entries(db)) {
                const item = document.createElement('div');
                item.className = 'proj-item';
                item.innerHTML = `
                    <div><strong style="color:#fff;">${data.title}</strong></div>
                    <button class="btn-danger" onclick="deleteProj('${id}')"><i data-lucide="trash-2"></i> Delete</button>
                `;
                listDiv.appendChild(item);
            }
            lucide.createIcons();
        }

        document.getElementById('pushBtn').addEventListener('click', async () => {
            const msg = document.getElementById('apiMsg');
            msg.style.color = "#fff";
            msg.innerHTML = `<i data-lucide="loader-2" class="lucide-spin"></i> Pushing...`;
            lucide.createIcons();

            const payload = {
                message: "Updated projects",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2))))
            };
            if (fileSha) payload.sha = fileSha;

            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/projects.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${CONFIG.GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    const data = await res.json();
                    fileSha = data.content.sha;
                    msg.style.color = "#4ade80";
                    msg.innerHTML = `<i data-lucide="check-circle-2"></i> Projects Updated!`;
                } else {
                    throw new Error("API Error");
                }
            } catch (e) {
                msg.style.color = "#ff6b6b";
                msg.innerHTML = `<i data-lucide="x-circle"></i> Failed to update.`;
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
