<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>Wael — Message Me</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { display: flex; align-items: center; justify-content: center; padding: 20px; overflow-x: hidden; }
        .card { width: 100%; max-width: 500px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: var(--muted); }
        textarea { min-height: 120px; resize: vertical; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #statusMsg { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 15px; font-weight: bold; }
        .navBtn { display: inline-flex; align-items: center; gap: 6px; z-index: 50;}
        .lucide { width: 1.2em; height: 1.2em; vertical-align: -0.125em; }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="index"><i data-lucide="home"></i> Home</a>

    <div class="card">
        <h1 style="display: flex; align-items: center; justify-content: center; gap: 10px;"><i data-lucide="send"></i> Send a Message</h1>
        <p class="sub">This goes directly to my Admin Inbox.</p>
        <form id="msgForm">
            <label>Your Name</label>
            <input type="text" id="mName" required placeholder="Wael" autocomplete="off">
            <label>Your Email (Optional)</label>
            <input type="email" id="mEmail" placeholder="tea@wael.work.gd" autocomplete="off">
            <label>Message</label>
            <textarea id="mText" required placeholder="Hi Wael!"></textarea>
            <button type="submit" class="btn" id="sendBtn"><i data-lucide="mail"></i> Send Message</button>
        </form>
        <p id="statusMsg"></p>
    </div>

    <script src="js/config.js"></script>
    <script src="js/achievements.js"></script>
    <script>
        // Dynamic Back Button Logic
        window.addEventListener('DOMContentLoaded', () => {
            const backBtn = document.getElementById('dynamicBackBtn');
            const referrer = document.referrer.toLowerCase();
            
            if (referrer.includes('shortcuts')) {
                backBtn.href = 'shortcuts';
                backBtn.innerHTML = '<i data-lucide="zap"></i> Shortcuts';
            } else if (referrer.includes('redeem')) {
                backBtn.href = 'redeem';
                backBtn.innerHTML = '<i data-lucide="ticket"></i> Redeem';
            } else {
                backBtn.href = 'index';
                backBtn.innerHTML = '<i data-lucide="home"></i> Home';
            }
            lucide.createIcons();
        });

        document.getElementById('msgForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('sendBtn');
            const msgOut = document.getElementById('statusMsg');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="lucide-spin"></i> Sending...`;
            lucide.createIcons();
            msgOut.innerText = "";

            let currentData = {};
            let sha = null;

            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/messages.json`);
                if (res.ok) {
                    const data = await res.json();
                    sha = data.sha;
                    currentData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                }
            } catch (error) { }

            const msgId = "msg_" + Date.now();
            currentData[msgId] = {
                name: document.getElementById('mName').value.trim(),
                email: document.getElementById('mEmail').value.trim() || "No Email Provided",
                message: document.getElementById('mText').value.trim(),
                date: new Date().toLocaleString()
            };

            const payload = {
                message: "New message from website",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))))
            };
            if (sha) payload.sha = sha;

            try {
                const push = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/messages.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${CONFIG.GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (push.ok) {
                    msgOut.style.color = "#4ade80";
                    msgOut.innerHTML = `<i data-lucide="check-circle-2"></i> Message sent! I'll read it soon.`;
                    window.unlockAchievement('exp_mail');
                    document.getElementById('msgForm').reset();
                } else { 
                    throw new Error(); 
                }
            } catch (err) {
                msgOut.style.color = "#ff6b6b";
                msgOut.innerHTML = `<i data-lucide="x-circle"></i> Failed to send. Error: ${err.message}`;
            }
            btn.disabled = false;
            btn.innerHTML = `<i data-lucide="mail"></i> Send Message`;
            lucide.createIcons();
        });
    </script>
    <script src="js/context-menu.js"></script>
    <script src="/js/emoji-replacer.js"></script>
</body>
</html>
