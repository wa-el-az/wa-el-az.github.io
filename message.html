<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Wael — Message Me</title>
<style>
:root{ --text:#f5f7fa; --muted:rgba(255,255,255,.78); } *{box-sizing:border-box;}
body{ margin:0; min-height:100vh; font-family:system-ui,-apple-system,sans-serif; color:var(--text); display: flex; align-items: center; justify-content: center; padding: 20px; }
.bg-left, .bg-right { position: fixed; top: 0; bottom: 0; } .bg-left { left: 0; width: 58%; z-index: -2; background: linear-gradient(135deg,#052e21 0%,#063826 60%,#052b1f 100%); } .bg-right { right: 0; width: 52%; z-index: -1; background: linear-gradient(135deg,#4a0707 0%,#5b0b0b 60%,#360606 100%); } .bg-right::before { content:""; position:absolute; left:-140px; top:-10%; width:280px; height:120%; background:inherit; transform:skewX(-14deg); box-shadow:-20px 0 50px rgba(0,0,0,.35); }
.navBtn{ position:absolute; top:20px; right:20px; padding:12px 22px; z-index: 20; border-radius:999px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); backdrop-filter:blur(10px); color:#fff; font-weight:700; text-decoration:none; }
.card { position: relative; z-index: 10; width: 100%; max-width: 500px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); border-radius:28px; backdrop-filter:blur(14px); padding: 35px; box-shadow:0 25px 70px rgba(0,0,0,.35); }
h1 { margin: 0 0 10px; text-align: center; } p.sub { text-align: center; color: var(--muted); margin-bottom: 25px; }
label { display: block; margin-bottom: 6px; font-size: 14px; color: var(--muted); }
input, textarea { width: 100%; padding: 14px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,.18); background: rgba(0,0,0,.18); color: #fff; outline: none; font-family: inherit; font-size: 16px; }
textarea { min-height: 120px; resize: vertical; }
.btn { padding: 14px 20px; border-radius: 12px; border: 0; background: #fff; color: #111; font-weight: 800; cursor: pointer; width: 100%; font-size: 16px; }
#statusMsg { text-align: center; margin-top: 15px; font-weight: bold; }
@media (max-width:860px){ .bg-right::before { display: none; } .bg-left, .bg-right { position: fixed; height: 50vh; width: 100%; } .bg-left { top: 0; left: 0; } .bg-right { bottom: 0; top: auto; right: 0; } }
</style>
</head>
<body>
<div class="bg-left"></div><div class="bg-right"></div>
<a class="navBtn" href="shortcuts.html">Back</a>

<div class="card">
  <h1>Send a Message</h1>
  <p class="sub">This goes directly to my Admin Inbox.</p>
  <form id="msgForm">
    <label>Your Name (Required)</label>
    <input type="text" id="mName" required autocomplete="off">
    <label>Your Email (Optional)</label>
    <input type="email" id="mEmail" autocomplete="off">
    <label>Message</label>
    <textarea id="mText" required></textarea>
    <button type="submit" class="btn" id="sendBtn">Send Message</button>
  </form>
  <p id="statusMsg"></p>
</div>

<script>
  // Obfuscated config to protect your repo
  const O_T = atob("Z2hwXzRLa3J0WEhWU01XS1RLMnBUcGxoaXc1OVhGYVVyRjFLeDBKVA==");
  const OWNER = "wa-el-az"; const REPO = "wa-el-az.github.io"; const FILE = "messages.json";

  document.getElementById('msgForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('sendBtn'); const msgOut = document.getElementById('statusMsg');
    btn.disabled = true; btn.innerText = "Sending..."; msgOut.innerText = "";

    let currentData = {}; let sha = null;
    try {
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`);
      if (res.ok) { const data = await res.json(); sha = data.sha; currentData = JSON.parse(decodeURIComponent(escape(atob(data.content)))); }
    } catch (e) { /* File doesn't exist yet */ }

    const msgId = "msg_" + Date.now();
    currentData[msgId] = {
      name: document.getElementById('mName').value.trim(),
      email: document.getElementById('mEmail').value.trim() || "No Email",
      message: document.getElementById('mText').value.trim(),
      date: new Date().toLocaleString()
    };

    const payload = { message: "New Contact Message", content: btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2)))) };
    if (sha) payload.sha = sha;

    try {
      const push = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, {
        method: 'PUT', headers: { 'Authorization': `Bearer ${O_T}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
      });
      if (push.ok) {
        msgOut.style.color = "#4ade80"; msgOut.innerText = "✓ Message sent successfully!";
        document.getElementById('msgForm').reset();
      } else throw new Error("API Error");
    } catch (err) { msgOut.style.color = "#ff6b6b"; msgOut.innerText = "✗ Failed to send. Please try again later."; }
    btn.disabled = false; btn.innerText = "Send Message";
  });
</script>
</body>
</html>
