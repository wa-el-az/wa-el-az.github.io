<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/u-term/apple-emoji-css@master/apple-emoji.css">
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>Wael — Message Me</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        body { display: flex; align-items: center; justify-content: center; padding: 20px; overflow-x: hidden; }
        .card { width: 100%; max-width: 500px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: var(--muted); }
        textarea { min-height: 120px; resize: vertical; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #statusMsg { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    <a class="navBtn" href="shortcuts">Back</a>
    <div class="card">
        <h1>Send a Message</h1>
        <p class="sub">This goes directly to my Admin Inbox.</p>
        <form id="msgForm">
            <label>Your Name</label>
            <input type="text" id="mName" required placeholder="Wael" autocomplete="off">
            <label>Your Email (Optional)</label>
            <input type="email" id="mEmail" placeholder="tea@wael.work.gd" autocomplete="off">
            <label>Message</label>
            <textarea id="mText" required placeholder="Hi Wael!"></textarea>
            <button type="submit" class="btn" id="sendBtn">Send Message</button>
        </form>
        <p id="statusMsg"></p>
    </div>

    <script src="js/config.js"></script>
    <script src="js/achievements.js"></script>
    <script>
        document.getElementById('msgForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('sendBtn');
            const msgOut = document.getElementById('statusMsg');
            btn.disabled = true;
            btn.innerText = "Sending...";
            msgOut.innerText = "";

            let currentData = {};
            let sha = null;

            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/messages.json`);
                if (res.ok) {
                    const data = await res.json();
                    sha = data.sha;
                    currentData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                }
            } catch (error) { }

            const msgId = "msg_" + Date.now();
            currentData[msgId] = {
                name: document.getElementById('mName').value.trim(),
                email: document.getElementById('mEmail').value.trim() || "No Email Provided",
                message: document.getElementById('mText').value.trim(),
                date: new Date().toLocaleString()
            };

            const payload = {
                message: "New message from website",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))))
            };
            if (sha) payload.sha = sha;

            try {
                const push = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/messages.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${CONFIG.GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (push.ok) {
                    msgOut.style.color = "#4ade80";
                    msgOut.innerText = "✓ Message sent! I'll read it soon.";
                    window.unlockAchievement('exp_mail');
                    document.getElementById('msgForm').reset();
                } else { 
                    throw new Error(); 
                }
            } catch (err) {
                msgOut.style.color = "#ff6b6b";
                msgOut.innerText = "✗ Failed to send. Error: " + err.message;
            }
            btn.disabled = false;
            btn.innerText = "Send Message";
        });
    </script>
</body>
</html>
