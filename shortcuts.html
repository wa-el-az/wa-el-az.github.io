<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>Wael — Shortcuts</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { padding: 80px 5vw; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .wrapper { position: relative; z-index: 10; text-align: center; width: 100%; max-width: 800px; }
        h1 { font-size: clamp(36px, 6vw, 56px); margin-bottom: 10px; }
        p.intro { color: var(--text-muted); margin-bottom: 40px; font-size: 18px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .card-sc { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 160px; background: rgba(255, 255, 255, .08); border: 1px solid rgba(255, 255, 255, .15); border-radius: 24px; backdrop-filter: blur(14px); text-decoration: none; color: #fff; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .card-sc:hover { transform: translateY(-8px); background: rgba(255, 255, 255, .15); border-color: rgba(255,255,255,0.4); }
        .card-sc span.icon { margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        .card-sc span.icon svg { width: 40px; height: 40px; }
        .card-sc span.label { font-size: 20px; font-weight: bold; }
        .lucide { width: 1.2em; height: 1.2em; vertical-align: -0.125em; }
    </style>
<style>
/* Morocco flag replacement */
.ma-flag{
  width: 1em;
  height: 1em;
  object-fit: contain;
  display: inline-block;
  vertical-align: -0.14em;
  transition: transform 160ms ease, filter 160ms ease;
  transform-origin: center;
}

.ma-flag:hover{
  transform: translateY(-1px) scale(1.14);
  filter: drop-shadow(0 2px 8px rgba(255,255,255,0.35));
}

.custom-emoji-inline.ma-flag{
  margin: 0 0.08em;
}

.tea-flag{
  width: 140px;
  height: 140px;
  vertical-align: middle;
  filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
}

.tea-flag:hover{
  transform: scale(1.04);
  filter: drop-shadow(0 18px 28px rgba(0,0,0,0.65));
}

.achieve-flag{
  width: 36px;
  height: 36px;
  vertical-align: middle;
}
</style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    <div class="wrapper">
        <h1>Site Directory</h1>
        <p class="intro">Quick shortcuts to every part of my website.</p>
        <div class="grid">
            <a href="index" class="card-sc"><span class="icon"><i data-lucide="home"></i></span><span class="label">Home</span></a>
            <a href="projects" class="card-sc"><span class="icon"><i data-lucide="folder"></i></span><span class="label">My Projects</span></a>
            <a href="message" class="card-sc"><span class="icon"><i data-lucide="message-square"></i></span><span class="label">Contact Me</span></a>
            <a href="redeem" class="card-sc"><span class="icon"><i data-lucide="ticket"></i></span><span class="label">Redeem Code</span></a>
            <a href="tea" class="card-sc"><span class="icon"><i data-lucide="coffee"></i></span><span class="label">Tea Clicker</span></a>
            <a href="admin/hub" class="card-sc"><span class="icon"><i data-lucide="settings"></i></span><span class="label">Admin Hub</span></a>
            <a href="tic-tac-toe" class="card-sc"><span class="icon"><i data-lucide="gamepad-2"></i></span><span class="label">Tic-tac-toe</span></a>
            <a href="achievements" class="card-sc"><span class="icon"><i data-lucide="trophy"></i></span><span class="label">Trophy Room</span></a>
            <a href="mypc" class="card-sc"><span class="icon"><i data-lucide="monitor"></i></span><span class="label">My PC</span></a>
            
            <a href="hardware" class="card-sc"><span class="icon"><i data-lucide="cpu"></i></span><span class="label">System Monitor</span></a>
            
            <a href="gd" class="card-sc">
                <span class="icon"><img src="assets/gd-logo.svg" alt="GD Logo" style="width: 40px; height: 40px; filter: invert(1); opacity: 0.9;"></span>
                <span class="label">GD Profile</span>
            </a>
            
            <a href="windows" class="card-sc">
                <span class="icon"><img src="https://img.icons8.com/ios11/512/FFFFFF/windows-11.png" alt="Windows Logo" style="width: 40px; height: 40px; object-fit: contain;"></span>
                <span class="label">Windows Vault</span>
            </a>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
    <script src="js/context-menu.js"></script>
</body>
</html>
