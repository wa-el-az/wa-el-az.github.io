<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Wael — Shortcuts</title>
<link rel="icon" type="image/png" href="1000003608.png" />
<style>
:root{ --text:#f5f7fa; --muted:rgba(255,255,255,.78); }
*{box-sizing:border-box;}
body{ margin:0; min-height:100vh; font-family:system-ui,-apple-system,sans-serif; color:var(--text); padding: 80px 5vw; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.bg-left, .bg-right { position: fixed; top: 0; bottom: 0; } .bg-left { left: 0; width: 58%; z-index: -2; background: linear-gradient(135deg,#052e21 0%,#063826 60%,#052b1f 100%); } .bg-right { right: 0; width: 52%; z-index: -1; background: linear-gradient(135deg,#4a0707 0%,#5b0b0b 60%,#360606 100%); } .bg-right::before { content:""; position:absolute; left:-140px; top:-10%; width:280px; height:120%; background:inherit; transform:skewX(-14deg); box-shadow:-20px 0 50px rgba(0,0,0,.35); }
.navBtn{ position:absolute; top:20px; right:20px; padding:12px 22px; z-index: 20; border-radius:999px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); backdrop-filter:blur(10px); color:#fff; font-weight:700; text-decoration:none; }
.wrapper { position: relative; z-index: 10; text-align: center; width: 100%; max-width: 800px; }
h1 { font-size: 48px; margin-bottom: 40px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
.card { display: flex; align-items: center; justify-content: center; height: 120px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-radius: 24px; backdrop-filter: blur(14px); text-decoration: none; color: #fff; font-size: 24px; font-weight: bold; transition: 0.2s; box-shadow: 0 10px 30px rgba(0,0,0,.2); }
.card:hover { transform: translateY(-5px); background: rgba(255,255,255,.15); }
@media (max-width:860px){ .bg-right::before { display: none; } .bg-left, .bg-right { position: fixed; height: 50vh; width: 100%; } .bg-left { top: 0; left: 0; } .bg-right { bottom: 0; top: auto; right: 0; } }
</style>
</head>
<body>
<div class="bg-left"></div><div class="bg-right"></div>
<a class="navBtn" href="index.html">Back</a>
<div class="wrapper">
  <h1>Directory</h1>
  <div class="grid">
    <a href="index.html" class="card">🏠 Home</a>
    <a href="projects.html" class="card">📁 Projects</a>
    <a href="redeem.html" class="card">🎟️ Redeem</a>
    <a href="message.html" class="card">💬 Contact Me</a>
  </div>
</div>
</body>
</html>
