<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>Wael — Shortcuts</title>
    <link rel="icon" type="image/png" href="1000003608.png" />
    <style>
        :root { --text: #f5f7fa; --muted: rgba(255, 255, 255, .78); }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; color: var(--text); padding: 80px 5vw; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .bg-left, .bg-right { position: fixed; top: 0; bottom: 0; }
        .bg-left { left: 0; width: 58%; z-index: -2; background: linear-gradient(135deg,#052e21 0%,#063826 60%,#052b1f 100%); }
        .bg-right { right: 0; width: 52%; z-index: -1; background: linear-gradient(135deg,#4a0707 0%,#5b0b0b 60%,#360606 100%); }
        .bg-right::before { content: ""; position: absolute; left: -140px; top: -10%; width: 280px; height: 120%; background: inherit; transform: skewX(-14deg); box-shadow: -20px 0 50px rgba(0,0,0,.35); }

        .navBtn { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            padding: 12px 22px; 
            z-index: 20; 
            border-radius: 999px; 
            background: rgba(255, 255, 255, .12); 
            border: 1px solid rgba(255, 255, 255, .25); 
            backdrop-filter: blur(10px); 
            color: #fff; 
            font-weight: 700; 
            text-decoration: none; 
            transition: 0.2s; 
        }
        .navBtn:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-1px); }

        .wrapper { position: relative; z-index: 10; text-align: center; width: 100%; max-width: 800px; }
        h1 { font-size: clamp(36px, 6vw, 56px); margin-bottom: 10px; }
        p.intro { color: var(--muted); margin-bottom: 40px; font-size: 18px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .card { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 160px; background: rgba(255, 255, 255, .08); border: 1px solid rgba(255, 255, 255, .15); border-radius: 24px; backdrop-filter: blur(14px); text-decoration: none; color: #fff; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .card:hover { transform: translateY(-8px); background: rgba(255, 255, 255, .15); border-color: rgba(255,255,255,0.4); }
        .card span.icon { font-size: 40px; margin-bottom: 10px; }
        .card span.label { font-size: 20px; font-weight: bold; }

        @media (max-width: 860px) {
            .bg-right::before { display: none; }
            .bg-left, .bg-right { position: fixed; height: 50vh; width: 100%; }
            .bg-left { top: 0; left: 0; }
            .bg-right { bottom: 0; top: auto; right: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <a class="navBtn" href="index">Home</a>

    <div class="wrapper">
        <h1>Site Directory</h1>
        <p class="intro">Quick shortcuts to every part of my website.</p>
        <div class="grid">
            <a href="index" class="card"><span class="icon">🏠</span><span class="label">Home</span></a>
            <a href="projects" class="card"><span class="icon">📁</span><span class="label">My Projects</span></a>
            <a href="message" class="card"><span class="icon">💬</span><span class="label">Contact Me</span></a>
            <a href="redeem" class="card"><span class="icon">🎟️</span><span class="label">Redeem Code</span></a>
            
            <a href="tea" class="card"><span class="icon">🍵</span><span class="label">Tea Clicker</span></a>
            
            <a href="admin" class="card"><span class="icon">⚙️</span><span class="label">Admin Hub</span></a>
            <a href="tic-tac-toe" class="card"><span class="icon">⭕</span><span class="label">Tic-tac-toe</span></a>
        </div>
    </div>
</body>
</html>
