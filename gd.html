<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael | GD Icon Viewer</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Import the official Geometry Dash font (Pusab) */
        @font-face {
            font-family: 'Pusab';
            src: url('https://gdbrowser.com/assets/pusab.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        body { 
            padding: 100px 5vw 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }

        .gd-container {
            width: 100%;
            max-width: 450px;
            animation: fadePageIn 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .gd-title {
            font-family: 'Pusab', sans-serif;
            text-align: center;
            color: #fff;
            font-size: 28px;
            text-shadow: 2px 2px 0px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .icon-display {
            background: rgba(0, 0, 0, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        #gdIcon {
            max-width: 120px;
            max-height: 120px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none; /* Hidden until loaded */
        }

        #gdIcon:hover {
            transform: scale(1.15) rotate(5deg);
        }

        .loading-ring {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--terminal-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-box input {
            margin-bottom: 0;
            font-family: 'Inter', sans-serif;
            font-weight: bold;
        }

        /* Nav Btn specific alignment for this page */
        .navBtn { display: inline-flex; align-items: center; gap: 6px; }
        .lucide { width: 1.2em; height: 1.2em; vertical-align: -0.125em; }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="index" style="z-index: 50;"><i data-lucide="home"></i> Home</a>

    <div class="gd-container">
        <h1 class="gd-title">Geometry Dash</h1>
        
        <div class="card">
            <div class="icon-display">
                <div class="loading-ring" id="loader"></div>
                <img id="gdIcon" src="" alt="GD Icon" />
            </div>

            <p class="sub" style="text-align: center; margin-top: -10px; margin-bottom: 20px;">
                Enter a GD Username to extract their main icon.
            </p>

            <div class="search-box">
                <input type="text" id="usernameInput" placeholder="e.g. RobTop" autocomplete="off" spellcheck="false" />
                <button class="btn" id="searchBtn" style="width: auto; padding: 14px 24px;">
                    <i data-lucide="search"></i>
                </button>
            </div>
            
            <p id="errorMsg" style="color: #ff4757; font-size: 13px; text-align: center; margin-top: 15px; display: none; font-weight: bold;">
                User not found!
            </p>
        </div>
    </div>

    <script src="js/context-menu.js"></script>
    <script>
        lucide.createIcons();

        // Dynamic Back Button Logic
        const backBtn = document.getElementById('dynamicBackBtn');
        const referrer = document.referrer.toLowerCase();
        
        if (referrer.includes('shortcuts')) {
            backBtn.href = 'shortcuts';
            backBtn.innerHTML = '<i data-lucide="zap"></i> Shortcuts';
        } else {
            backBtn.href = 'index';
            backBtn.innerHTML = '<i data-lucide="home"></i> Home';
        }
        lucide.createIcons();

        // Icon Fetching Logic
        const input = document.getElementById('usernameInput');
        const btn = document.getElementById('searchBtn');
        const iconImg = document.getElementById('gdIcon');
        const loader = document.getElementById('loader');
        const errorMsg = document.getElementById('errorMsg');

        function fetchIcon() {
            const username = input.value.trim();
            if (!username) return;

            // Update UI to loading state
            iconImg.style.display = 'none';
            errorMsg.style.display = 'none';
            loader.style.display = 'block';
            
            // Build the GDBrowser Image API URL
            // Using a timestamp cache-breaker to ensure we don't get stuck with a broken cached image
            const targetUrl = `https://gdbrowser.com/icon/${encodeURIComponent(username)}?form=cube&timestamp=${new Date().getTime()}`;

            // Create a temporary image object to test if it loads successfully before displaying it
            const tempImg = new Image();
            
            tempImg.onload = () => {
                loader.style.display = 'none';
                iconImg.src = targetUrl;
                iconImg.style.display = 'block';
                
                // Pop animation
                iconImg.style.transform = 'scale(0.5)';
                setTimeout(() => iconImg.style.transform = 'scale(1)', 50);
            };

            tempImg.onerror = () => {
                loader.style.display = 'none';
                errorMsg.style.display = 'block';
            };

            tempImg.src = targetUrl;
        }

        // Trigger on button click
        btn.addEventListener('click', fetchIcon);

        // Trigger on 'Enter' key press
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchIcon();
        });

        // Load a default icon on startup just to show how it works
        input.value = "RobTop";
        fetchIcon();
    </script>
</body>
</html>
