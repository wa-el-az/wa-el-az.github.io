<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael | GD Icon Kit</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @font-face {
            font-family: 'Pusab';
            src: url('assets/fonts/pusab.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body { padding: 80px 5vw 40px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .kit-container {
            width: 100%;
            max-width: 700px;
            animation: fadePageIn 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .gd-title {
            font-family: 'Pusab', sans-serif;
            text-align: center;
            color: #fff;
            font-size: clamp(24px, 5vw, 32px);
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 20px;
        }

        /* The Viewport */
        .preview-window {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
            backdrop-filter: blur(10px);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }

        #iconResult {
            max-width: 160px;
            max-height: 160px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            transition: opacity 0.3s, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Form Tabs */
        .form-tabs {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab-btn {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            padding: 5px;
            transition: 0.2s;
        }

        .tab-btn img { width: 100%; height: 100%; object-fit: contain; opacity: 0.5; transition: 0.2s; }
        .tab-btn.active { background: rgba(74, 222, 128, 0.2); border-color: var(--terminal-green); }
        .tab-btn.active img { opacity: 1; transform: scale(1.1); }

        /* Configuration Grid */
        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 12px; font-weight: bold; color: var(--terminal-green); text-transform: uppercase; margin-left: 5px; }
        
        .color-inputs { display: flex; gap: 10px; margin-top: 15px; }
        .color-box { flex: 1; height: 50px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; position: relative; overflow: hidden; }
        .color-box input { position: absolute; top: -10px; left: -10px; width: 100px; height: 100px; cursor: pointer; border: none; }

        .loader {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--terminal-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .navBtn { display: inline-flex; align-items: center; gap: 6px; }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="index" style="z-index: 50;"><i data-lucide="home"></i> Home</a>

    <div class="kit-container">
        <h1 class="gd-title">Online Icon Kit</h1>

        <div class="preview-window">
            <div class="loader" id="loadingCircle"></div>
            <img id="iconResult" src="" alt="Icon Preview" />
        </div>

        <div class="card">
            <div class="form-tabs">
                <button class="tab-btn active" data-form="cube" title="Cube"><img src="https://gdbrowser.com/assets/iconkitbuttons/icon_on.png"></button>
                <button class="tab-btn" data-form="ship" title="Ship"><img src="https://gdbrowser.com/assets/iconkitbuttons/ship_off.png"></button>
                <button class="tab-btn" data-form="ball" title="Ball"><img src="https://gdbrowser.com/assets/iconkitbuttons/ball_off.png"></button>
                <button class="tab-btn" data-form="ufo" title="UFO"><img src="https://gdbrowser.com/assets/iconkitbuttons/ufo_off.png"></button>
                <button class="tab-btn" data-form="wave" title="Wave"><img src="https://gdbrowser.com/assets/iconkitbuttons/wave_off.png"></button>
                <button class="tab-btn" data-form="robot" title="Robot"><img src="https://gdbrowser.com/assets/iconkitbuttons/robot_off.png"></button>
                <button class="tab-btn" data-form="spider" title="Spider"><img src="https://gdbrowser.com/assets/iconkitbuttons/spider_off.png"></button>
                <button class="tab-btn" data-form="swing" title="Swing"><img src="https://gdbrowser.com/assets/iconkitbuttons/swing_off.png"></button>
                <button class="tab-btn" data-form="jetpack" title="Jetpack"><img src="https://gdbrowser.com/assets/iconkitbuttons/jetpack_off.png"></button>
            </div>

            <div class="config-grid">
                <div class="input-group">
                    <label>Player Name</label>
                    <input type="text" id="username" placeholder="e.g. RobTop" autocomplete="off" />
                </div>
                <div class="input-group">
                    <label>Icon ID</label>
                    <input type="number" id="iconId" value="1" min="1" max="200" />
                </div>
            </div>

            <div class="color-inputs">
                <div class="input-group" style="flex:1">
                    <label>Primary</label>
                    <div class="color-box"><input type="color" id="col1" value="#afafaf"></div>
                </div>
                <div class="input-group" style="flex:1">
                    <label>Secondary</label>
                    <div class="color-box"><input type="color" id="col2" value="#ffffff"></div>
                </div>
                <div class="input-group" style="flex:1">
                    <label>Glow</label>
                    <div class="color-box"><input type="color" id="colG" value="#ffffff"></div>
                </div>
            </div>

            <button class="btn" id="downloadBtn" style="margin-top: 20px;"><i data-lucide="download"></i> Download PNG</button>
        </div>
    </div>

    <script src="js/context-menu.js"></script>
    <script>
        lucide.createIcons();

        // 1. DYNAMIC BACK BUTTON
        const backBtn = document.getElementById('dynamicBackBtn');
        if (document.referrer.toLowerCase().includes('shortcuts')) {
            backBtn.href = 'shortcuts';
            backBtn.innerHTML = '<i data-lucide="zap"></i> Shortcuts';
            lucide.createIcons();
        }

        // 2. STATE MANAGEMENT
        let currentForm = "cube";
        const iconImg = document.getElementById('iconResult');
        const loader = document.getElementById('loadingCircle');

        function updateIcon() {
            loader.style.display = "block";
            iconImg.style.opacity = "0.3";

            const user = document.getElementById('username').value.trim();
            const id = document.getElementById('iconId').value;
            const c1 = document.getElementById('col1').value.replace('#', '');
            const c2 = document.getElementById('col2').value.replace('#', '');
            const cG = document.getElementById('colG').value.replace('#', '');

            // Construct API URL
            // If username is provided, it prioritizes that user's actual icon for that form
            let url = `https://gdbrowser.com/icon/${user || 'Player'}?form=${currentForm}&col1=${c1}&col2=${c2}&glow=${cG}&id=${id}`;

            iconImg.src = url;
            
            iconImg.onload = () => {
                loader.style.display = "none";
                iconImg.style.opacity = "1";
            };
        }

        // 3. EVENT LISTENERS
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentForm = this.dataset.form;
                updateIcon();
            });
        });

        ['username', 'iconId', 'col1', 'col2', 'colG'].forEach(id => {
            document.getElementById(id).addEventListener('change', updateIcon);
            if (id === 'username') {
                document.getElementById(id).addEventListener('keyup', (e) => { if(e.key === "Enter") updateIcon() });
            }
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.href = iconImg.src;
            link.download = `${currentForm}_icon.png`;
            link.click();
        });

        // Initialize
        updateIcon();
    </script>
</body>
</html>
