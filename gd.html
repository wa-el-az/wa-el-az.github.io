<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael | GD Icon Viewer</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Import the official Geometry Dash font */
        @font-face {
            font-family: 'Pusab';
            src: url('assets/fonts/pusab.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        body { 
            padding: 100px 5vw 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }

        .gd-container {
            width: 100%;
            max-width: 450px;
            animation: fadePageIn 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .gd-title {
            font-family: 'Pusab', sans-serif;
            text-align: center;
            color: #fff;
            font-size: 28px;
            text-shadow: 2px 2px 0px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .icon-display {
            background: rgba(0, 0, 0, 0.4);
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            position: relative;
            backdrop-filter: blur(10px);
        }

        #gdIcon {
            max-width: 140px;
            max-height: 140px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none; /* Initially hidden */
        }

        #gdIcon.loaded {
            display: block;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .loading-ring {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top-color: #4ade80;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .search-box {
            display: flex;
            gap: 12px;
        }

        .search-box input {
            margin-bottom: 0;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
        }

        .navBtn { display: inline-flex; align-items: center; gap: 6px; }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="index" style="z-index: 50;"><i data-lucide="home"></i> Home</a>

    <div class="gd-container">
        <h1 class="gd-title">Geometry Dash</h1>
        
        <div class="card">
            <div class="icon-display" id="displayArea">
                <div class="loading-ring" id="loader" style="display:none;"></div>
                <img id="gdIcon" src="" alt="GD Icon" />
            </div>

            <p class="sub" style="text-align: center; margin-bottom: 20px;">
                Enter a GD Username to view their main icon.
            </p>

            <div class="search-box">
                <input type="text" id="usernameInput" placeholder="e.g. RobTop" autocomplete="off" />
                <button class="btn" id="searchBtn" style="width: auto; padding: 0 25px;">
                    <i data-lucide="search"></i>
                </button>
            </div>
            
            <p id="errorMsg" style="color: #ff4757; font-size: 14px; text-align: center; margin-top: 15px; display: none; font-weight: bold;">
                Player not found or API is down.
            </p>
        </div>
    </div>

    <script src="js/context-menu.js"></script>
    <script>
        lucide.createIcons();

        // Handle Back Button Logic
        const backBtn = document.getElementById('dynamicBackBtn');
        if (document.referrer.toLowerCase().includes('shortcuts')) {
            backBtn.href = 'shortcuts';
            backBtn.innerHTML = '<i data-lucide="zap"></i> Shortcuts';
            lucide.createIcons();
        }

        const input = document.getElementById('usernameInput');
        const btn = document.getElementById('searchBtn');
        const iconImg = document.getElementById('gdIcon');
        const loader = document.getElementById('loader');
        const errorMsg = document.getElementById('errorMsg');

        async function fetchIcon() {
            const user = input.value.trim();
            if (!user) return;

            // Reset UI
            errorMsg.style.display = 'none';
            iconImg.classList.remove('loaded');
            iconImg.style.display = 'none';
            loader.style.display = 'block';

            // We use GDBrowser's icon API
            // Form "cube" is the default player icon
            const iconUrl = `https://gdbrowser.com/icon/${encodeURIComponent(user)}?form=cube`;

            // Pre-load the image to handle errors and loading state
            const imgTester = new Image();
            imgTester.src = iconUrl;

            imgTester.onload = () => {
                loader.style.display = 'none';
                iconImg.src = iconUrl;
                iconImg.style.display = 'block';
                iconImg.classList.add('loaded');
            };

            imgTester.onerror = () => {
                loader.style.display = 'none';
                errorMsg.style.display = 'block';
            };
        }

        btn.addEventListener('click', fetchIcon);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') fetchIcon(); });

        // Load RobTop by default
        input.value = "RobTop";
        fetchIcon();
    </script>
</body>
</html>
