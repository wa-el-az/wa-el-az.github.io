<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael | GD Profile</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @font-face {
            font-family: 'Pusab';
            src: url('assets/fonts/pusab.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body { 
            padding: 100px 5vw 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh;
        }

        /* Glassmorphism Profile Box */
        .gd-profile-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            width: 100%;
            max-width: 850px;
            padding: 40px;
            position: relative;
            box-shadow: 0 25px 70px rgba(0,0,0,0.35);
            text-align: center;
            animation: fadePageIn 0.5s ease-out forwards;
            font-family: 'Pusab', 'Inter', sans-serif;
        }

        .user-header {
            margin-bottom: 30px;
        }

        /* MODIFIED: Header turned into a responsive image container */
        .user-name {
            margin: 0;
            display: flex; /* Make h1 a flex container to center child */
            justify-content: center; /* Center horizontally */
            align-items: center; /* Center vertically */
            height: clamp(50px, 10vw, 80px); /* Responsive container height range */
        }

        .user-name img {
            max-height: 100%; /* Responsive image height */
            width: auto; /* Maintain aspect ratio */
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5)); /* Apply shadow effect to image */
        }

        /* Glassy Stats Row */
        .stats-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 35px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 18px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            color: #fff;
            backdrop-filter: blur(5px);
        }

        .stat-item img { height: 20px; width: auto; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

        /* Icon Set Container Centering & Proportions */
        .icon-set {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 20px;
            padding: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(65px, 1fr));
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 35px;
            align-items: center; /* Vertically centers the icons */
            justify-items: center; /* Horizontally centers the icons */
        }

        .icon-set img {
            max-width: 100%;
            max-height: 50px; /* Forces all icons to a balanced maximum height */
            width: auto;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .icon-set img:hover { 
            transform: scale(1.2) translateY(-5px); 
        }

        /* UI Buttons Container */
        .gd-btn-container {
            display: flex;
            justify-content: center;
        }

        /* The Copy Username Button */
        .gd-glass-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: fit-content; 
            padding: 14px 28px;
            border-radius: 99px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            backdrop-filter: blur(10px);
            gap: 8px;
            outline: none;
        }

        .gd-glass-btn:hover { 
            background: rgba(255, 255, 255, 0.2); 
            transform: translateY(-3px); 
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .navBtn { display: inline-flex; align-items: center; gap: 6px; z-index: 50; }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="index"><i data-lucide="home"></i> Home</a>

    <div class="gd-profile-box">
        <div class="user-header">
            <h1 class="user-name">
                <img src="assets/font1 - WaelMA.png" alt="WaelMA">
            </h1>
        </div>

        <div class="stats-row">
            <div class="stat-item"><img src="https://gdbrowser.com/assets/star.png"> 1,738</div>
            <div class="stat-item"><img src="https://gdbrowser.com/assets/moon.png"> 281</div>
            <div class="stat-item"><img src="https://gdbrowser.com/assets/diamond.png"> 3,780</div>
            <div class="stat-item"><img src="https://gdbrowser.com/assets/coin.png"> 118</div>
            <div class="stat-item"><img src="https://gdbrowser.com/assets/silvercoin.png"> 118</div>
            <div class="stat-item"><img src="https://gdbrowser.com/assets/demon.png"> 126</div>
        </div>

        <div class="icon-set">
            <img src="assets/cube_274.png" title="Cube 274">
            <img src="assets/ship_48.png" title="Ship 48">
            <img src="assets/ball_91.png" title="Ball 91">
            <img src="assets/ufo_79.png" title="UFO 79">
            <img src="assets/wave_46.png" title="Wave 46">
            <img src="assets/robot_35.png" title="Robot 35">
            <img src="assets/spider_49.png" title="Spider 49">
            <img src="assets/swing_17.png" title="Swing 17">
            <img src="assets/jetpack_3.png" title="Jetpack 3">
        </div>

        <div class="gd-btn-container">
            <button id="copyUsername" class="gd-glass-btn">
                <i data-lucide="copy"></i> Copy Username
            </button>
        </div>
    </div>

    <script src="js/context-menu.js"></script>
    <script>
        lucide.createIcons();

        // Dynamic Back Button
        const backBtn = document.getElementById('dynamicBackBtn');
        if (document.referrer.toLowerCase().includes('shortcuts')) {
            backBtn.href = 'shortcuts';
            backBtn.innerHTML = '<i data-lucide="zap"></i> Shortcuts';
            lucide.createIcons();
        }

        // Copy Username Logic
        document.getElementById('copyUsername').addEventListener('click', function() {
            navigator.clipboard.writeText('WaelMA').then(() => {
                const originalHtml = this.innerHTML;
                
                // Show success state
                this.innerHTML = '<i data-lucide="check"></i> Copied!';
                this.style.background = 'rgba(74, 222, 128, 0.2)';
                this.style.borderColor = '#4ade80';
                this.style.color = '#4ade80';
                lucide.createIcons();
                
                // Revert after 2 seconds
                setTimeout(() => {
                    this.innerHTML = originalHtml;
                    this.style.background = '';
                    this.style.borderColor = '';
                    this.style.color = '';
                    lucide.createIcons();
                }, 2000);
            });
        });
    </script>
</body>
</html>
