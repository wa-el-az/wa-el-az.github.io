<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael | GD Profile</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @font-face {
            font-family: 'Pusab';
            src: url('assets/fonts/pusab.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body { 
            padding: 40px 5vw; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://gdbrowser.com/assets/backgrounds/1.png');
            background-size: cover;
            background-position: center;
            font-family: 'Pusab', sans-serif;
        }

        /* GD Style Brown Box */
        .gd-profile-box {
            background: #be6f3f;
            border: 6px solid #5a311b;
            border-radius: 15px;
            width: 95%;
            max-width: 900px;
            padding: 30px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            text-align: center;
            animation: fadePageIn 0.5s ease-out forwards;
        }

        .user-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .user-name {
            font-size: clamp(24px, 6vw, 48px);
            color: #fff;
            text-shadow: 4px 4px 0px #000;
            margin: 0;
        }

        /* Collectibles Row */
        .stats-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            color: #fff;
            text-shadow: 2px 2px 0px #000;
        }

        .stat-item img { height: 24px; width: auto; }

        /* Icon Set Container */
        .icon-set {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 15px;
            border: 4px solid rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .icon-set img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.4));
            transition: transform 0.2s;
            cursor: pointer;
        }

        .icon-set img:hover { transform: scale(1.15); }

        /* UI Buttons */
        .gd-btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .gd-blue-btn {
            background: #0080ff;
            border: 4px solid #004080;
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            text-shadow: 2px 2px 0px #000;
            transition: 0.2s;
        }

        .gd-blue-btn:hover { background: #0099ff; transform: translateY(-3px); }

        .navBtn { position: fixed; top: 20px; left: 20px; font-family: 'Inter', sans-serif; display: inline-flex; align-items: center; gap: 6px; z-index: 100; }
        
        /* Corner Pieces from GD UI */
        .corner { position: absolute; width: 60px; height: 60px; pointer-events: none; }
        .top-left { top: -10px; left: -10px; transform: rotate(0deg); }
        .top-right { top: -10px; right: -10px; transform: rotate(90deg); }
        .bottom-left { bottom: -10px; left: -10px; transform: rotate(-90deg); }
        .bottom-right { bottom: -10px; right: -10px; transform: rotate(180deg); }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="index"><i data-lucide="home"></i> Home</a>

    <div class="gd-profile-box">
        <img src="https://gdbrowser.com/assets/corner.png" class="corner top-left">
        <img src="https://gdbrowser.com/assets/corner.png" class="corner top-right">
        <img src="https://gdbrowser.com/assets/corner.png" class="corner bottom-left">
        <img src="https://gdbrowser.com/assets/corner.png" class="corner bottom-right">

        <div class="user-header">
            <h1 class="user-name">WaelMA</h1>
        </div>

        <div class="stats-row">
            <div class="stat-item"><img src="https://gdbrowser.com/assets/star.png"> 1,738</div>
            <div class="stat-item"><img src="https://gdbrowser.com/assets/moon.png"> 281</div>
            <div class="stat-item"><img src="https://gdbrowser.com/assets/diamond.png"> 3,780</div>
            <div class="stat-item"><img src="https://gdbrowser.com/assets/coin.png"> 118</div>
            <div class="stat-item"><img src="https://gdbrowser.com/assets/silvercoin.png"> 118</div>
            <div class="stat-item"><img src="https://gdbrowser.com/assets/demon.png"> 126</div>
        </div>

        <div class="icon-set">
            <img src="assets/cube_274.png" title="Cube 274">
            <img src="assets/ship_48.png" title="Ship 48">
            <img src="assets/ball_91.png" title="Ball 91">
            <img src="assets/ufo_79.png" title="UFO 79">
            <img src="assets/wave_46.png" title="Wave 46">
            <img src="assets/robot_35.png" title="Robot 35">
            <img src="assets/spider_49.png" title="Spider 49">
            <img src="assets/swing_17.png" title="Swing 17">
            <img src="assets/jetpack_3.png" title="Jetpack 3">
        </div>

        <div class="gd-btn-container">
            <a href="https://gdbrowser.com/u/WaelMA" target="_blank" class="gd-blue-btn">View on GDBrowser</a>
            <a href="shortcuts" class="gd-blue-btn" style="background:#4ade80; border-color:#2d8c50;">More Shortcuts</a>
        </div>
    </div>

    <script src="js/context-menu.js"></script>
    <script>
        lucide.createIcons();

        // Handle Dynamic Back Button
        const backBtn = document.getElementById('dynamicBackBtn');
        if (document.referrer.toLowerCase().includes('shortcuts')) {
            backBtn.href = 'shortcuts';
            backBtn.innerHTML = '<i data-lucide="zap"></i> Shortcuts';
            lucide.createIcons();
        }
    </script>
</body>
</html>
