<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wael — Admin Hub</title>
<link rel="icon" type="image/png" href="1000003608.png" />
<style>
:root{ --text:#f5f7fa; --muted:rgba(255,255,255,.78); --radius:16px; --terminal-green: #4ade80; } *{box-sizing:border-box;}
body{ margin:0; min-height:100vh; font-family:system-ui,-apple-system,sans-serif; color:var(--text); }

.bg-left, .bg-right { position: fixed; top: 0; bottom: 0; } 
.bg-left { left: 0; width: 58%; z-index: -2; background: linear-gradient(135deg,#052e21 0%,#063826 60%,#052b1f 100%); } 
.bg-right { right: 0; width: 52%; z-index: -1; background: linear-gradient(135deg,#4a0707 0%,#5b0b0b 60%,#360606 100%); } 
.bg-right::before { content:""; position:absolute; left:-140px; top:-10%; width:280px; height:120%; background:inherit; transform:skewX(-14deg); box-shadow:-20px 0 50px rgba(0,0,0,.35); }

.wrapper { position: relative; z-index: 10; padding: 60px 5vw; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
.top-nav { position: absolute; top: 20px; right: 20px; z-index: 20; display: flex; gap: 12px; }
.navBtn{ padding:10px 20px; border-radius:999px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); backdrop-filter:blur(10px); color:#fff; font-weight:700; text-decoration:none; cursor: pointer; transition: 0.2s; font-size: 15px; } 

.card { width: 100%; max-width: 500px; padding: 35px 30px; text-align: center; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); border-radius:28px; backdrop-filter:blur(14px); box-shadow:0 25px 70px rgba(0,0,0,.35); }
input { width: 100%; padding: 14px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,.18); background: rgba(0,0,0,.18); color: #fff; text-align: center; }
.btn { padding: 14px 20px; border-radius: 12px; border: 0; background: #fff; color: #111; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; }

#dashboardMenu { display: none; width: 100%; max-width: 800px; gap: 15px; flex-direction: column; align-items: center; }
.menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
.dash-link { padding: 18px; border-radius: 16px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15); color: #fff; text-decoration: none; font-weight: 700; transition: 0.2s; text-align: center; }
.dash-link:hover { background: rgba(255,255,255,0.1); transform: scale(1.02); }

/* TERMINAL STYLING */
.terminal {
  width: 100%; margin-top: 30px; background: #0a1a14; border: 2px solid #1a3a2a; border-radius: 12px;
  padding: 20px; font-family: 'Courier New', Courier, monospace; text-align: left;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.8); position: relative;
}
.terminal-header { color: var(--terminal-green); font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #1a3a2a; padding-bottom: 5px; font-size: 14px; }
.terminal-body { height: 300px; overflow-y: auto; font-size: 13px; line-height: 1.6; color: var(--terminal-green); }
.log-entry { margin-bottom: 15px; border-left: 2px solid var(--terminal-green); padding-left: 10px; }
.log-entry span { color: #888; font-size: 11px; }

@media (max-width:860px){ .menu-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="bg-left"></div><div class="bg-right"></div>
<div class="top-nav">
  <a class="navBtn" href="shortcuts.html">Exit</a>
  <button class="navBtn" id="logoutBtn">Logout</button>
</div>

<div class="wrapper">
  <div class="card" id="loginCard">
    <h1>Admin Login</h1>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button class="btn" id="loginBtn">Login</button>
  </div>

  <div id="dashboardMenu">
    <div class="card" style="max-width: 600px; margin-bottom: 20px;">
        <h1>Welcome, Wael</h1>
        <div class="menu-grid">
            <a href="messages-admin.html" class="dash-link">📥 Inbox</a>
            <a href="codes-admin.html" class="dash-link">🔑 Codes</a>
            <a href="projects-admin.html" class="dash-link">📁 Projects</a>
            <a href="status-admin.html" class="dash-link">🟢 Status</a>
        </div>
    </div>

    <div class="terminal">
        <div class="terminal-header">WAEL_SYSTEM_v2.0: TRAFFIC_MONITOR ~ RECENT_VISITS</div>
        <div class="terminal-body" id="terminalBody">
            [SYSTEM] Initializing logs...<br>
            [SYSTEM] Fetching traffic.json...
        </div>
    </div>
  </div>
</div>

<script>
  const GH_TOKEN_PART_1 = "ghp_"; 
  const GH_TOKEN_PART_2 = "ZbXmiQPNZdww3806lwmSXtNN6zK2uW2rWk9a"; 
  const REPO = "wa-el-az/wa-el-az.github.io";

  const loginCard = document.getElementById('loginCard'); 
  const dashboardMenu = document.getElementById('dashboardMenu');

  function checkAuth() {
    if (localStorage.getItem('gh_token') === (GH_TOKEN_PART_1 + GH_TOKEN_PART_2)) { 
        loginCard.style.display = "none"; 
        dashboardMenu.style.display = "flex";
        loadTraffic();
    }
  }
  checkAuth();

  document.getElementById('loginBtn').addEventListener('click', () => {
    if (document.getElementById('username').value === "Wael" && document.getElementById('password').value === "Kiloalpha_5@") {
      localStorage.setItem('gh_token', GH_TOKEN_PART_1 + GH_TOKEN_PART_2);
      checkAuth();
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', () => { 
    localStorage.removeItem('gh_token'); window.location.href = "redeem.html"; 
  });

async function loadTraffic() {
    const term = document.getElementById('terminalBody');
    const token = GH_TOKEN_PART_1 + GH_TOKEN_PART_2;

    try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/traffic.json?t=${Date.now()}`, {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Accept': 'application/vnd.github.v3+json'
            }
        });

        if (res.ok) {
            const data = await res.json();
            const content = decodeURIComponent(escape(atob(data.content)));
            
            // SAFETY CHECK: If file is {} or empty, make it an empty array []
            let logs = JSON.parse(content);
            if (!Array.isArray(logs)) logs = []; 

            logs = logs.reverse();
            
            term.innerHTML = "";
            if (logs.length === 0) {
                term.innerHTML = "> [SYSTEM] Status: Online<br>> [SYSTEM] Logs: Empty. Waiting for first visitor...";
                return;
            }

            logs.forEach(log => {
                term.innerHTML += `
                    <div class="log-entry">
                        <span>[${log.time}]</span><br>
                        > IP: ${log.ip}<br>
                        > LOC: ${log.loc}<br>
                        > ISP: ${log.isp}<br>
                        > DEV: ${log.device}
                    </div>
                `;
            });
        } else {
            term.innerHTML = `[ERROR] GitHub Status: ${res.status}`;
        }
    } catch(e) { 
        console.error("Fetch Connection Error:", e);
        term.innerHTML = "[ERROR] Terminal malfunction.<br>> Check if traffic.json is []"; 
    }
  }
</script>
</body>
</html>
