<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael — Admin Hub</title>
    <link rel="icon" type="image/png" href="1000003608.png" />
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        .wrapper { position: relative; z-index: 10; padding: 60px 5vw; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .top-nav { position: absolute; top: 20px; right: 20px; z-index: 20; display: flex; gap: 12px; }
        #dashboardMenu { display: none; width: 100%; max-width: 500px; gap: 15px; flex-direction: column; }
        .dash-link { display: block; padding: 18px; border-radius: 16px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15); color: #fff; text-decoration: none; font-weight: 700; font-size: 18px; transition: 0.2s; } 
        .dash-link:hover { background: rgba(255,255,255,0.1); transform: scale(1.02); }
        #loginMsg { margin-top: 15px; font-weight: 600; font-size: 14px; color: #ff6b6b; }
        .card { max-width: 420px; margin: 0 auto; text-align: center; } /* Overriding default width */
        
        @media (max-width:860px){ .top-nav { top: 15px; right: 15px; } }
    </style>
</head>
<body>
<div class="bg-left"></div><div class="bg-right"></div>

<div class="top-nav">
  <a class="navBtn" href="shortcuts">Exit</a>
  <button class="navBtn" id="logoutBtn">Logout</button>
</div>

<div class="wrapper">
  <div class="card" id="loginCard">
    <h1>Admin Login</h1>
    <p class="sub">Authenticate to access the hub.</p>
    <input type="text" id="username" placeholder="Username" autocomplete="off">
    <input type="password" id="password" placeholder="Password">
    <button class="btn" id="loginBtn">Login</button>
    <p id="loginMsg"></p>
  </div>

  <div id="dashboardMenu" class="card" style="max-width: 500px; padding: 40px;">
    <h1 style="margin-bottom: 20px;">Welcome, Wael</h1>
    <p style="color: #4ade80; font-weight: bold; margin-bottom: 25px;">✓ System Authenticated.</p>
    <a href="messages-admin" class="dash-link" style="background: rgba(74, 222, 128, 0.2); border-color: #4ade80;">📥 View Inbox</a>
    <a href="codes-admin" class="dash-link">🔑 Codes Manager</a>
    <a href="projects-admin" class="dash-link">📁 Projects Manager</a>
    <a href="status-admin" class="dash-link">🟢 Status Manager</a>
  </div>
</div>

<script src="config.js"></script>

<script>
  
  const loginCard = document.getElementById('loginCard'); 
  const dashboardMenu = document.getElementById('dashboardMenu'); 
  const loginMsg = document.getElementById('loginMsg');

  if (localStorage.getItem('gh_token') === CONFIG.GITHUB_TOKEN) { 
    loginCard.style.display = "none"; 
    dashboardMenu.style.display = "flex"; 
  }

  document.getElementById('loginBtn').addEventListener('click', () => {
    if (document.getElementById('username').value.trim() === CONFIG.ADMIN_USER && document.getElementById('password').value === CONFIG.ADMIN_PASS) {
      localStorage.setItem('gh_token', CONFIG.GITHUB_TOKEN);
      loginCard.style.display = "none"; dashboardMenu.style.display = "flex";
    } else { loginMsg.innerText = "✗ Incorrect credentials."; }
  });

  document.getElementById('logoutBtn').addEventListener('click', () => { 
    localStorage.removeItem('gh_token'); 
    window.location.href = "redeem"; 
  });
</script>
</body>
</html>
