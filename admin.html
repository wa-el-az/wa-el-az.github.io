<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wael — Admin Dashboard</title>
<link rel="icon" type="image/png" href="1000003608.png" />

<style>
:root{
  --left-bg:#063826; --right-bg:#5b0b0b;
  --text:#f5f7fa; --muted:rgba(255,255,255,.78);
  --radius:16px;
}
*{box-sizing:border-box;}
body{
  margin:0; min-height:100vh;
  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
  background:linear-gradient(135deg,#052e21 0%,#063826 40%,#5b0b0b 60%,#360606 100%);
  color:var(--text); padding: 40px 20px;
}

.navBtn{
  position:absolute; top:20px; right:20px; z-index:10; padding:12px 22px;
  border-radius:999px; background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.25); backdrop-filter:blur(10px);
  color:#fff; font-weight:700; text-decoration:none;
}

.container {
  max-width: 900px; margin: 0 auto;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15);
  border-radius:28px; backdrop-filter:blur(14px); box-shadow:0 25px 70px rgba(0,0,0,.35);
  padding: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px;
}

@media (max-width: 768px) {
  .container { grid-template-columns: 1fr; padding: 20px; margin-top: 40px;}
}

h1, h2 { margin-top: 0; }
.kicker { color: var(--muted); font-weight: 600; font-size: 14px; text-transform: uppercase; margin-bottom: 5px; }

/* Forms & Inputs */
.form-group { margin-bottom: 15px; }
label { display: block; margin-bottom: 6px; font-size: 14px; color: var(--muted); }
input, select {
  width: 100%; padding: 12px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,.18); background: rgba(0,0,0,.18);
  color: #fff; outline: none; font-family: inherit;
}
.btn {
  padding: 12px 20px; border-radius: 12px; border: 0; background: #fff;
  color: #111; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px;
}
.btn-danger { background: #ff4757; color: white; width: auto; padding: 6px 12px; border-radius: 8px; font-size: 12px;}

/* API Token Area */
.api-box {
  background: rgba(0,0,0,.25); padding: 15px; border-radius: 12px; margin-top: 20px;
  border: 1px solid rgba(255,255,255,.1);
}

/* Code List */
.code-list {
  max-height: 250px; overflow-y: auto; background: rgba(0,0,0,.18);
  border-radius: 12px; padding: 10px; border: 1px solid rgba(255,255,255,.1);
}
.code-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px; border-bottom: 1px solid rgba(255,255,255,.05);
}
.code-item:last-child { border-bottom: none; }
.code-name { font-weight: bold; color: #fff; }
.code-type { font-size: 12px; color: var(--muted); background: rgba(255,255,255,.1); padding: 2px 8px; border-radius: 99px; }
</style>
</head>
<body>

<a class="navBtn" href="redeem.html">Back to Redeem</a>

<div class="container">
  <div>
    <p class="kicker">Admin Dashboard</p>
    <h1>Code Manager</h1>
    
    <form id="addCodeForm" style="margin-top: 25px;">
      <div class="form-group">
        <label>New Code (e.g. WAEL-TEA)</label>
        <input type="text" id="newCodeId" required autocomplete="off" placeholder="Must be unique">
      </div>
      
      <div class="form-group">
        <label>What should this code do?</label>
        <select id="newCodeType">
          <option value="popup">Show a Pop-up Message</option>
          <option value="redirect">Redirect to a Link</option>
        </select>
      </div>

      <div class="form-group">
        <label id="valueLabel">Pop-up Message text:</label>
        <input type="text" id="newCodeValue" required autocomplete="off" placeholder="Enter message here...">
      </div>

      <button type="submit" class="btn">Add / Update Code in List</button>
    </form>
  </div>

  <div>
    <h2>Current Codes</h2>
    <div class="code-list" id="codeList"></div>

    <div class="api-box">
      <div class="form-group" style="margin-bottom: 10px;">
        <label>GitHub Personal Access Token (PAT)</label>
        <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      </div>
      <button class="btn" id="pushBtn" style="background: #4ade80;">Push Directly to GitHub</button>
      <p id="apiStatus" style="font-size: 13px; margin: 10px 0 0; font-weight: bold;"></p>
    </div>
  </div>
</div>

<script>
  // ==========================================
  // 1. CHANGE THESE TO YOUR GITHUB DETAILS
  // ==========================================
  const REPO_OWNER = "wa-el-az"; // e.g., "wael-dev"
  const REPO_NAME = "wa-el-az.github.io";        // e.g., "wael-website"
  const FILE_PATH = "codes.json";
  
  let currentDatabase = {};
  let fileSha = null; // GitHub requires the file's 'sha' to overwrite it

  window.onload = async () => {
    // Load saved token from browser storage
    const savedToken = localStorage.getItem('gh_token');
    if (savedToken) document.getElementById('githubToken').value = savedToken;

    fetchCurrentCodes();
  };

  async function fetchCurrentCodes() {
    try {
      const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`);
      if (res.ok) {
        const data = await res.json();
        fileSha = data.sha; // Save the SHA for pushing later
        
        // GitHub API returns files in Base64 encoding. We must decode it.
        const decodedContent = decodeURIComponent(escape(atob(data.content)));
        currentDatabase = JSON.parse(decodedContent);
      }
    } catch (e) {
      console.log("Could not fetch from GitHub API. Trying local file...", e);
      // Fallback to local fetch if API fails
      try {
        const localRes = await fetch(FILE_PATH);
        if (localRes.ok) currentDatabase = await localRes.json();
      } catch (err) {}
    }
    updateUI();
  }

  // Handle Form UI switching
  document.getElementById('newCodeType').addEventListener('change', (e) => {
    const label = document.getElementById('valueLabel');
    const input = document.getElementById('newCodeValue');
    if (e.target.value === 'redirect') {
      label.innerText = 'URL to Redirect to:';
      input.placeholder = 'https://... or about.html';
    } else {
      label.innerText = 'Pop-up Message text:';
      input.placeholder = 'Enter message here...';
    }
  });

  // Add a new code
  document.getElementById('addCodeForm').addEventListener('submit', (e) => {
    e.preventDefault();
    let codeId = document.getElementById('newCodeId').value.trim().toUpperCase();
    let type = document.getElementById('newCodeType').value;
    let value = document.getElementById('newCodeValue').value.trim();

    if (type === 'redirect') currentDatabase[codeId] = { "type": "redirect", "url": value };
    else currentDatabase[codeId] = { "type": "popup", "message": value };

    document.getElementById('newCodeId').value = '';
    document.getElementById('newCodeValue').value = '';
    updateUI();
  });

  // Delete a code
  function deleteCode(codeId) {
    delete currentDatabase[codeId];
    updateUI();
  }

  // Update UI List
  function updateUI() {
    const listDiv = document.getElementById('codeList');
    listDiv.innerHTML = '';
    if (Object.keys(currentDatabase).length === 0) {
      listDiv.innerHTML = '<p style="color:#aaa; text-align:center;">No codes yet.</p>';
      return;
    }
    for (const [code, data] of Object.entries(currentDatabase)) {
      const item = document.createElement('div');
      item.className = 'code-item';
      item.innerHTML = `
        <div><span class="code-name">${code}</span> <span class="code-type">${data.type}</span></div>
        <button class="btn-danger" onclick="deleteCode('${code}')">Delete</button>
      `;
      listDiv.appendChild(item);
    }
  }

  // ==========================================
  // PUSH TO GITHUB AUTOMATICALLY
  // ==========================================
  document.getElementById('pushBtn').addEventListener('click', async () => {
    const token = document.getElementById('githubToken').value.trim();
    const statusText = document.getElementById('apiStatus');

    if (!token) {
      statusText.style.color = "#ff6b6b";
      statusText.innerText = "Please enter a GitHub Token.";
      return;
    }

    // Save token securely in browser for next time
    localStorage.setItem('gh_token', token);
    
    statusText.style.color = "#fff";
    statusText.innerText = "Pushing to GitHub...";

    const newJsonString = JSON.stringify(currentDatabase, null, 2);
    // Encode to Base64 (Required by GitHub API)
    const encodedContent = btoa(unescape(encodeURIComponent(newJsonString)));

    const bodyData = {
      message: "Admin Dashboard: Updated codes.json",
      content: encodedContent,
      sha: fileSha // Required to overwrite an existing file
    };

    try {
      const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(bodyData)
      });

      if (response.ok) {
        const result = await response.json();
        fileSha = result.content.sha; // Update the SHA so you can edit again without refreshing
        statusText.style.color = "#4ade80";
        statusText.innerText = "✓ Successfully saved to GitHub! (Give Pages 1-2 mins to update)";
      } else {
        const errorData = await response.json();
        throw new Error(errorData.message);
      }
    } catch (error) {
      statusText.style.color = "#ff6b6b";
      statusText.innerText = "✗ Error: " + error.message;
      console.error(error);
    }
  });
</script>

</body>
</html>
