<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael — Windows Vault</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { padding: 100px 5vw; }
        .header, .content-area { position: relative; z-index: 10; max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { margin: 0; font-size: clamp(36px, 5vw, 56px); display: flex; align-items: center; justify-content: center; gap: 12px; }
        .header p { color: var(--muted); font-size: 18px; margin-top: 10px; }
        
        .filters { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .filter-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 200px; }
        .filter-group label { font-size: 14px; color: var(--muted); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,.18); background: rgba(0,0,0,.4); color: #fff; outline: none; font-size: 16px; font-family: "SF Pro", sans-serif; cursor: pointer; }
        select option { background: #111; color: #fff; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .key-card { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.15); border-radius: 16px; padding: 20px; backdrop-filter: blur(14px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.2s, background 0.2s; display: flex; flex-direction: column; }
        .key-card:hover { transform: translateY(-5px); background: rgba(255,255,255,.08); border-color: rgba(74, 222, 128, 0.4); }
        
        .kc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .kc-title { font-size: 20px; font-weight: bold; font-family: 'Space Grotesk', sans-serif; margin: 0; color: #fff; }
        .kc-version { font-size: 12px; background: rgba(52, 152, 219, 0.2); color: #3498db; padding: 4px 8px; border-radius: 6px; font-weight: bold; }
        
        .kc-key { font-family: 'JetBrains Mono', monospace, Courier; font-size: 15px; color: #4ade80; background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px; border: 1px dashed rgba(74, 222, 128, 0.3); text-align: center; letter-spacing: 1px; flex-grow: 1; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        
        .copy-btn { background: #fff; color: #111; border: none; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; }
        .copy-btn:hover { background: #e0e0e0; }
        .copy-btn.copied { background: #4ade80; color: #000; }
        
        #loading { display: flex; align-items: center; justify-content: center; gap: 8px; text-align: center; color: var(--muted); font-size: 18px; margin-top: 40px; }
        .navBtn { display: inline-flex; align-items: center; gap: 6px; z-index: 50; }
        .lucide { width: 1.2em; height: 1.2em; vertical-align: -0.125em; }
    </style>
</head>
<body>
    <div class="bg-left"></div>
    <div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="index"><i data-lucide="home"></i> Home</a>

    <div class="header">
        <h1><i data-lucide="key"></i> Windows Vault</h1>
        <p>Official generic license keys for activation and testing.</p>
    </div>

    <div class="content-area">
        <div class="filters" id="filterSection" style="display: none;">
            <div class="filter-group">
                <label>Windows Version</label>
                <select id="versionSelect">
                    <option value="all">All Versions</option>
                    </select>
            </div>
            <div class="filter-group">
                <label>Edition</label>
                <select id="editionSelect">
                    <option value="all">All Editions</option>
                    </select>
            </div>
        </div>

        <div id="loading"><i data-lucide="loader-2" class="lucide-spin"></i> Accessing database...</div>
        <div class="grid" id="keysGrid"></div>
    </div>

    <script src="js/config.js"></script>
    <script>
        // Dynamic Back Button Logic
        window.addEventListener('DOMContentLoaded', () => {
            const backBtn = document.getElementById('dynamicBackBtn');
            const referrer = document.referrer.toLowerCase();
            
            if (referrer.includes('shortcuts')) {
                backBtn.href = 'shortcuts';
                backBtn.innerHTML = '<i data-lucide="zap"></i> Shortcuts';
            } else if (referrer.includes('redeem')) {
                backBtn.href = 'redeem';
                backBtn.innerHTML = '<i data-lucide="ticket"></i> Redeem';
            } else {
                backBtn.href = 'index';
                backBtn.innerHTML = '<i data-lucide="home"></i> Home';
            }
            lucide.createIcons();
        });

        let keysDatabase = [];

        window.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('keysGrid');
            const loading = document.getElementById('loading');
            const filterSection = document.getElementById('filterSection');
            
            try {
                // Fetch the JSON file
                const response = await fetch('windows.json');
                if (!response.ok) throw new Error("Database not found");
                
                keysDatabase = await response.json();
                
                loading.style.display = 'none';
                filterSection.style.display = 'flex';

                populateFilters();
                renderKeys(keysDatabase);

            } catch (e) {
                loading.innerHTML = `<i data-lucide="alert-circle"></i> Error loading Windows keys. Make sure windows.json exists.`;
                lucide.createIcons();
            }
        });

        function populateFilters() {
            const versionSelect = document.getElementById('versionSelect');
            const editionSelect = document.getElementById('editionSelect');
            
            // Extract unique versions and editions
            const versions = [...new Set(keysDatabase.map(item => item.version))];
            const editions = [...new Set(keysDatabase.map(item => item.edition))];
            
            versions.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v; opt.textContent = v;
                versionSelect.appendChild(opt);
            });
            
            editions.forEach(e => {
                const opt = document.createElement('option');
                opt.value = e; opt.textContent = e;
                editionSelect.appendChild(opt);
            });

            // Add Event Listeners for filtering
            versionSelect.addEventListener('change', filterData);
            editionSelect.addEventListener('change', filterData);
        }

        function filterData() {
            const selectedVersion = document.getElementById('versionSelect').value;
            const selectedEdition = document.getElementById('editionSelect').value;
            
            const filtered = keysDatabase.filter(item => {
                const matchVersion = selectedVersion === 'all' || item.version === selectedVersion;
                const matchEdition = selectedEdition === 'all' || item.edition === selectedEdition;
                return matchVersion && matchEdition;
            });
            
            renderKeys(filtered);
        }

        function renderKeys(dataArray) {
            const grid = document.getElementById('keysGrid');
            grid.innerHTML = '';

            if (dataArray.length === 0) {
                grid.innerHTML = '<p style="text-align:center; color:#aaa; grid-column: 1/-1;">No keys match your filters.</p>';
                return;
            }

            dataArray.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'key-card';
                card.innerHTML = `
                    <div class="kc-header">
                        <h3 class="kc-title">${item.edition}</h3>
                        <span class="kc-version">${item.version}</span>
                    </div>
                    <div class="kc-key">${item.key}</div>
                    <button class="copy-btn" id="copyBtn-${index}" onclick="copyKey('${item.key}', 'copyBtn-${index}')">
                        <i data-lucide="copy"></i> Copy Key
                    </button>
                `;
                grid.appendChild(card);
            });
            
            lucide.createIcons();
        }

        function copyKey(key, btnId) {
            navigator.clipboard.writeText(key).then(() => {
                const btn = document.getElementById(btnId);
                btn.innerHTML = `<i data-lucide="check"></i> Copied!`;
                btn.classList.add('copied');
                lucide.createIcons();
                
                setTimeout(() => {
                    btn.innerHTML = `<i data-lucide="copy"></i> Copy Key`;
                    btn.classList.remove('copied');
                    lucide.createIcons();
                }, 2000);
            });
        }
    </script>
</body>
</html>
