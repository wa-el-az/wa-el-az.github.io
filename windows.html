<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael — Windows Vault</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { padding: 100px 5vw; }
        .header, .content-area { position: relative; z-index: 10; max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { margin: 0; font-size: clamp(36px, 5vw, 56px); display: flex; align-items: center; justify-content: center; gap: 12px; }
        .header p { color: var(--muted); font-size: 18px; margin-top: 10px; }
        
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .cat-card { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.15); border-radius: 24px; padding: 30px 20px; backdrop-filter: blur(14px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: 0.3s; display: flex; flex-direction: column; align-items: center; cursor: pointer; text-decoration: none; color: #fff; }
        .cat-card:hover { transform: translateY(-8px); background: rgba(255,255,255,.1); border-color: rgba(255,255,255,0.4); }
        .cat-card img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 15px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3)); }
        .cat-card h2 { font-size: 22px; margin: 0; font-family: 'Space Grotesk', sans-serif; }

        .keys-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .back-to-vault { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; text-decoration: none; }
        .back-to-vault:hover { background: rgba(255,255,255,0.2); }

        /* Filter Styling */
        .filter-wrap { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .filter-wrap label { font-size: 13px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; }
        select { background: transparent; border: none; color: #fff; font-weight: bold; outline: none; cursor: pointer; font-family: inherit; font-size: 14px; padding: 5px; }
        select option { background: #111; }

        .keys-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .key-card { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.15); border-radius: 16px; padding: 20px; backdrop-filter: blur(14px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.2s; display: flex; flex-direction: column; }
        .key-card:hover { transform: translateY(-5px); border-color: rgba(74, 222, 128, 0.4); }
        
        .kc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .kc-title { font-size: 18px; font-weight: bold; font-family: 'Space Grotesk', sans-serif; margin: 0; color: #fff; }
        .kc-version { font-size: 11px; background: rgba(52, 152, 219, 0.2); color: #3498db; padding: 3px 7px; border-radius: 6px; font-weight: bold; }
        .kc-key { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #4ade80; background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px; border: 1px dashed rgba(74, 222, 128, 0.3); text-align: center; letter-spacing: 1px; flex-grow: 1; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; word-break: break-all; }
        
        .copy-btn { background: #fff; color: #111; border: none; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; }
        .copy-btn:hover { background: #e0e0e0; }
        .copy-btn.copied { background: #4ade80; color: #000; }
        
        #loading { display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--muted); font-size: 18px; margin-top: 40px; }
        .navBtn { display: inline-flex; align-items: center; gap: 6px; z-index: 50; }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    <a class="navBtn" id="dynamicBackBtn" href="index"><i data-lucide="home"></i> Home</a>

    <div class="header">
        <h1><img src="https://img.icons8.com/ios11/512/FFFFFF/windows-11.png" alt="Windows Logo" style="width: 48px; height: 48px; object-fit: contain; margin-top: -4px;"> Windows Vault</h1>
        <p id="headerDesc">Select a system to view official activation keys.</p>
    </div>

    <div class="content-area">
        <div id="loading"><i data-lucide="loader-2" class="lucide-spin"></i> Accessing database...</div>
        
        <div id="home-view" class="category-grid" style="display: none;">
            <a href="#11" class="cat-card">
                <img src="assets/win11.png" alt="Windows 11">
                <h2>Windows 11</h2>
            </a>
            <a href="#10" class="cat-card">
                <img src="assets/win10.png" alt="Windows 10">
                <h2>Windows 10</h2>
            </a>
            <a href="#8" class="cat-card">
                <img src="assets/win8.png" alt="Windows 8/8.1">
                <h2>Windows 8 / 8.1</h2>
            </a>
            <a href="#7" class="cat-card">
                <img src="assets/win7.png" alt="Windows 7">
                <h2>Windows 7</h2>
            </a>
            <a href="#office" class="cat-card">
                <img src="assets/office.png" alt="Office">
                <h2>Microsoft Office</h2>
            </a>
        </div>

        <div id="keys-view" style="display: none;">
            <div class="keys-nav">
                <a href="#" class="back-to-vault"><i data-lucide="arrow-left"></i> Categories</a>
                <div class="filter-wrap">
                    <label>Edition:</label>
                    <select id="editionFilter">
                        <option value="all">All Editions</option>
                    </select>
                </div>
            </div>
            <div class="keys-grid" id="keysGrid"></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const backBtn = document.getElementById('dynamicBackBtn');
        const referrer = document.referrer.toLowerCase();
        if (referrer.includes('shortcuts')) {
            backBtn.href = 'shortcuts'; backBtn.innerHTML = '<i data-lucide="zap"></i> Shortcuts';
        } else if (referrer.includes('redeem')) {
            backBtn.href = 'redeem'; backBtn.innerHTML = '<i data-lucide="ticket"></i> Redeem';
        } else {
            backBtn.href = 'index'; backBtn.innerHTML = '<i data-lucide="home"></i> Home';
        }

        let keysDatabase = [];
        let currentHash = "";

        async function init() {
            try {
                const response = await fetch('windows.json');
                if (!response.ok) throw new Error("Database not found");
                keysDatabase = await response.json();
                document.getElementById('loading').style.display = 'none';
                handleRouting(); 
            } catch (e) {
                document.getElementById('loading').innerHTML = `<i data-lucide="alert-circle"></i> Database error.`;
            }
            lucide.createIcons();
        }

        window.addEventListener('hashchange', handleRouting);
        document.getElementById('editionFilter').addEventListener('change', () => {
            handleRouting(); // Re-trigger filter based on dropdown
        });

        function handleRouting() {
            if (keysDatabase.length === 0) return;

            const hash = window.location.hash.substring(1).toLowerCase();
            const homeView = document.getElementById('home-view');
            const keysView = document.getElementById('keys-view');
            const desc = document.getElementById('headerDesc');
            const editionFilter = document.getElementById('editionFilter');

            if (!hash) {
                homeView.style.display = 'grid';
                keysView.style.display = 'none';
                desc.innerText = "Select a system to view official activation keys.";
                currentHash = "";
            } else {
                homeView.style.display = 'none';
                keysView.style.display = 'block';
                
                // Only reset the dropdown if we switched categories
                if (hash !== currentHash) {
                    currentHash = hash;
                    populateEditionFilter(hash);
                }

                let filteredKeys = [];
                if (hash === 'office') {
                    filteredKeys = keysDatabase.filter(k => k.version.toLowerCase().includes('office'));
                    desc.innerText = "Microsoft Office Keys";
                } else {
                    filteredKeys = keysDatabase.filter(k => k.version.includes(hash));
                    desc.innerText = `Windows ${hash} Keys`;
                }

                // Apply edition filter
                const selectedEdition = editionFilter.value;
                if (selectedEdition !== 'all') {
                    filteredKeys = filteredKeys.filter(k => k.edition === selectedEdition);
                }

                renderKeys(filteredKeys);
            }
            lucide.createIcons();
        }

        function populateEditionFilter(category) {
            const filter = document.getElementById('editionFilter');
            filter.innerHTML = '<option value="all">All Editions</option>';
            
            let catKeys = [];
            if (category === 'office') {
                catKeys = keysDatabase.filter(k => k.version.toLowerCase().includes('office'));
            } else {
                catKeys = keysDatabase.filter(k => k.version.includes(category));
            }

            const editions = [...new Set(catKeys.map(k => k.edition))].sort();
            editions.forEach(ed => {
                const opt = document.createElement('option');
                opt.value = ed; opt.textContent = ed;
                filter.appendChild(opt);
            });
        }

        function renderKeys(dataArray) {
            const grid = document.getElementById('keysGrid');
            grid.innerHTML = '';
            if (dataArray.length === 0) {
                grid.innerHTML = '<p style="text-align:center; color:#aaa; grid-column: 1/-1;">No keys match your filter.</p>';
                return;
            }
            dataArray.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'key-card';
                card.innerHTML = `
                    <div class="kc-header">
                        <h3 class="kc-title">${item.edition}</h3>
                        <span class="kc-version">${item.version}</span>
                    </div>
                    <div class="kc-key">${item.key}</div>
                    <button class="copy-btn" id="copyBtn-${index}" onclick="copyKey('${item.key}', 'copyBtn-${index}')">
                        <i data-lucide="copy"></i> Copy
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        function copyKey(key, btnId) {
            navigator.clipboard.writeText(key).then(() => {
                const btn = document.getElementById(btnId);
                btn.innerHTML = `<i data-lucide="check"></i> Copied!`;
                btn.classList.add('copied');
                lucide.createIcons();
                setTimeout(() => {
                    btn.innerHTML = `<i data-lucide="copy"></i> Copy`;
                    btn.classList.remove('copied');
                    lucide.createIcons();
                }, 2000);
            });
        }

        init();
    </script>
</body>
</html>
