<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael — Inbox</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { padding: 80px 5vw; }
        .wrapper { position: relative; z-index: 10; max-width: 800px; margin: 0 auto; }
        h1 { margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .msg-card { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .msg-header { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 10px; }
        .msg-title { font-weight: bold; font-size: 18px; }
        .msg-date { color: var(--muted); font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .msg-email { color: #4ade80; font-size: 14px; margin-bottom: 15px; display: flex; align-items: center; gap: 6px; }
        .msg-body { line-height: 1.5; white-space: pre-wrap; margin-bottom: 15px; }
        .navBtn { display: inline-flex; align-items: center; gap: 6px; }
        .btn-danger { display: inline-flex; align-items: center; gap: 6px; }
        .lucide { width: 1.2em; height: 1.2em; vertical-align: -0.125em; }
    </style>
</head>
<body>
    <div class="bg-left"></div>
    <div class="bg-right"></div>
    <a class="navBtn" href="admin"><i data-lucide="arrow-left"></i> Back to Hub</a>

    <div class="wrapper">
        <h1><i data-lucide="inbox"></i> Inbox</h1>
        <div id="inboxList">
            <p style="color: var(--muted);"><i data-lucide="loader-2" class="lucide-spin"></i> Loading messages...</p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        lucide.createIcons();
        let db = {};
        let fileSha = null;

        window.onload = async () => {
            if (!localStorage.getItem('gh_token')) {
                window.location.href = "admin";
                return;
            }
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/messages.json`);
                if (res.ok) {
                    const data = await res.json();
                    fileSha = data.sha;
                    db = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    render();
                } else {
                    document.getElementById('inboxList').innerHTML = "<p>No messages found.</p>";
                }
            } catch (e) {
                document.getElementById('inboxList').innerHTML = "<p>Inbox is empty.</p>";
            }
        };

        function render() {
            const list = document.getElementById('inboxList');
            list.innerHTML = ''; 
            const keys = Object.keys(db).reverse();
            
            if (keys.length === 0) {
                list.innerHTML = "<p>No messages found.</p>";
                return;
            }
            
            keys.forEach(id => {
                const msg = db[id];
                
                const card = document.createElement('div');
                card.className = 'msg-card';
                
                const header = document.createElement('div');
                header.className = 'msg-header';
                
                const title = document.createElement('span');
                title.className = 'msg-title';
                title.textContent = msg.name; 
                
                const date = document.createElement('span');
                date.className = 'msg-date';
                date.innerHTML = `<i data-lucide="calendar"></i> ${msg.date}`;
                
                header.appendChild(title);
                header.appendChild(date);
                
                const email = document.createElement('span');
                email.className = 'msg-email';
                email.innerHTML = `<i data-lucide="at-sign"></i> ${msg.email}`;
                
                const body = document.createElement('div');
                body.className = 'msg-body';
                body.textContent = msg.message;
                
                const btn = document.createElement('button');
                btn.className = 'btn-danger';
                btn.innerHTML = `<i data-lucide="trash-2"></i> Delete Message`;
                btn.onclick = () => deleteMsg(id);
                
                card.appendChild(header);
                card.appendChild(email);
                card.appendChild(body);
                card.appendChild(btn);
                
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        async function deleteMsg(id) {
            if (!confirm("Delete this message?")) return;
            
            delete db[id];
            
            const payload = {
                message: "Deleted message",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                sha: fileSha
            };

            await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/messages.json`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${CONFIG.GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            location.reload();
        }
    </script>
</body>
</html>
