<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael — Desktop Pet</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            padding: 80px 5vw; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }
        
        .header-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(14px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            text-align: center;
            max-width: 600px;
            position: relative;
            z-index: 10;
        }

        .header-card h1 { margin: 0 0 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .header-card p { color: var(--text-muted); line-height: 1.5; margin: 0; }

        /* --- THE PET CSS --- */
        #shimeji {
            position: fixed;
            width: 50px; 
            height: 50px;
            object-fit: contain;
            z-index: 9999;
            cursor: grab;
            user-select: none;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transition: transform 0.15s; /* Smooth turning */
        }

        #shimeji:active { cursor: grabbing; }

        /* Transformation Magic */
        @keyframes morphFlash {
            0% { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)) brightness(1) saturate(1); transform: scale(1) rotate(0deg); }
            50% { filter: drop-shadow(0 0 40px #4ade80) brightness(2) saturate(3); transform: scale(0.3) rotate(180deg); }
            100% { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)) brightness(1) saturate(1); transform: scale(1) rotate(360deg); }
        }
        .morphing { animation: morphFlash 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        
        .mode-badge {
            position: fixed;
            background: rgba(0,0,0,0.6);
            color: #4ade80;
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
            transition: 0.3s;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="index"><i data-lucide="home"></i> Home</a>

    <div class="header-card" id="solid-box">
        <h1><i data-lucide="bot"></i> GD Desktop Pet</h1>
        <p>Your pet will randomly transform into different Geometry Dash modes. Watch how its physics and abilities change! The box you are reading right now is solid—throw your pet on top of it!</p>
    </div>

    <img id="shimeji" src="assets/gd/cube_274.png" alt="Desktop Pet" draggable="false">
    <div id="modeDisplay" class="mode-badge">Cube Mode</div>

    <script src="js/config.js"></script>
    <script>
        lucide.createIcons();

        const backBtn = document.getElementById('dynamicBackBtn');
        if (document.referrer.toLowerCase().includes('shortcuts')) {
            backBtn.href = 'shortcuts';
            backBtn.innerHTML = '<i data-lucide="zap"></i> Shortcuts';
            lucide.createIcons();
        }

        // ==========================================
        // ADVANCED SHIMEJI ENGINE (GD EDITION)
        // ==========================================
        const pet = document.getElementById('shimeji');
        const solidBox = document.getElementById('solid-box');
        const modeBadge = document.getElementById('modeDisplay');
        
        const GAMEMODES = [
            { id: 'Cube', src: 'assets/gd/cube_274.png' },
            { id: 'Ship', src: 'assets/gd/ship_48.png' },
            { id: 'Ball', src: 'assets/gd/ball_91.png' },
            { id: 'UFO', src: 'assets/gd/ufo_79.png' },
            { id: 'Spider', src: 'assets/gd/spider_49.png' }
        ];

        let currentMode = 'Cube';
        let spiderFlipped = false; // For spider gravity logic
        let transformTimer = 600; // Time until next morph
        
        // Physics Variables
        let posX = window.innerWidth / 2; 
        let posY = 100; 
        let velX = 0; 
        let velY = 0; 
        
        const baseGravity = 0.8;
        const friction = 0.8; 
        const bounce = -0.4; 
        const walkSpeed = 3; 
        
        let isDragging = false;
        let isFacingRight = true;
        let roamTimer = 0;
        let rotation = 0; // For ball rolling
        
        function morphPet() {
            // Pick a random mode different from current
            let newMode;
            do {
                newMode = GAMEMODES[Math.floor(Math.random() * GAMEMODES.length)];
            } while (newMode.id === currentMode);

            // Trigger CSS Animation
            pet.classList.add('morphing');
            spiderFlipped = false; // Reset spider state
            rotation = 0; 
            
            // Swap image at the exact halfway point of the animation
            setTimeout(() => {
                pet.src = newMode.src;
                currentMode = newMode.id;
                
                // Show badge
                modeBadge.innerText = `${currentMode} Mode`;
                modeBadge.style.opacity = '1';
                setTimeout(() => modeBadge.style.opacity = '0', 2000);
            }, 300);

            // Cleanup animation class
            setTimeout(() => {
                pet.classList.remove('morphing');
            }, 600);
        }
        
        function updatePhysics() {
            const petW = 50;
            const petH = 50;
            const screenBottom = window.innerHeight - petH;
            const screenRight = window.innerWidth - petW;
            const boxRect = solidBox.getBoundingClientRect();

            if (!isDragging) {
                // 1. DYNAMIC GRAVITY BASED ON MODE
                let activeGravity = baseGravity;
                if (currentMode === 'Ship') activeGravity = 0; // Ship has no gravity, it floats
                if (currentMode === 'Spider' && spiderFlipped) activeGravity = -baseGravity; // Spider ceiling walking
                
                velY += activeGravity;
                
                // Store previous position to detect collisions cleanly
                let prevY = posY;
                
                posX += velX;
                posY += velY;

                // 2. SOLID BOX COLLISION (Platform Logic)
                let petCenterX = posX + (petW / 2);
                
                // If pet is horizontally aligned with the box
                if (petCenterX > boxRect.left && petCenterX < boxRect.right) {
                    // Falling onto the top of the box
                    if (velY >= 0 && prevY + petH <= boxRect.top + 10 && posY + petH >= boxRect.top) {
                        posY = boxRect.top - petH;
                        velY *= bounce;
                        velX *= friction;
                    }
                    // Spider hitting the BOTTOM of the box while walking on the ceiling
                    if (velY <= 0 && prevY >= boxRect.bottom - 10 && posY <= boxRect.bottom) {
                        posY = boxRect.bottom;
                        velY *= bounce;
                        velX *= friction;
                    }
                }

                // 3. SCREEN EDGE COLLISIONS
                // Floor
                if (posY > screenBottom) {
                    posY = screenBottom;
                    velY *= bounce;
                    if (currentMode !== 'Ship') velX *= friction; 
                    if (Math.abs(velY) < 1) velY = 0; 
                }

                // SOLID CEILING
                if (posY < 0) {
                    posY = 0;
                    velY = Math.abs(velY) * 0.5; // Bounce downwards slightly so it doesn't fly away
                    if (currentMode !== 'Ship') velX *= friction;
                }

                // Left Wall
                if (posX < 0) {
                    posX = 0;
                    velX *= -1; // Bounce off wall
                    if (currentMode === 'Ball') velY = -12; // Ball wall-climb ability!
                }
                
                // Right Wall
                if (posX > screenRight) {
                    posX = screenRight;
                    velX *= -1;
                    if (currentMode === 'Ball') velY = -12; // Ball wall-climb ability!
                }

                // 4. ADVANCED AI & ABILITIES
                roamTimer--;
                transformTimer--;

                if (transformTimer <= 0) {
                    morphPet();
                    transformTimer = Math.random() * 600 + 400; // 7 to 16 seconds
                }

                if (roamTimer <= 0) {
                    const action = Math.random();
                    
                    if (currentMode === 'Ship') {
                        // SHIP AI: Smooth floating in random directions
                        velX = (Math.random() - 0.5) * 12;
                        velY = (Math.random() - 0.5) * 12;
                        roamTimer = 60;
                    } 
                    else {
                        // GROUND AI (Cube, Ball, UFO, Spider)
                        // Only act if resting on floor, ceiling, or box
                        if (Math.abs(velY) < 1) {
                            if (action < 0.3) {
                                velX = -walkSpeed; // Walk Left
                                isFacingRight = false;
                                roamTimer = Math.random() * 100 + 50;
                            } else if (action < 0.6) {
                                velX = walkSpeed; // Walk Right
                                isFacingRight = true;
                                roamTimer = Math.random() * 100 + 50;
                            } else if (action < 0.8) {
                                // SPECIAL ABILITIES TRIGGER
                                if (currentMode === 'Cube' || currentMode === 'Ball') {
                                    velY = spiderFlipped ? 15 : -15; // Normal Jump
                                } else if (currentMode === 'UFO') {
                                    velY = spiderFlipped ? 10 : -10; // UFO Hop
                                } else if (currentMode === 'Spider') {
                                    spiderFlipped = !spiderFlipped; // INSTANT GRAVITY FLIP
                                }
                                roamTimer = 40;
                            } else {
                                velX = 0; // Stand still
                                roamTimer = Math.random() * 100 + 50;
                            }
                        } else if (currentMode === 'UFO' && action < 0.05) {
                            // UFO can double-jump in mid-air!
                            velY = spiderFlipped ? 10 : -10;
                        }
                    }
                }
            }

            // 5. RENDER GRAPHICS
            pet.style.left = posX + 'px';
            pet.style.top = posY + 'px';
            
            // Render Badge to follow pet
            modeBadge.style.left = (posX - 10) + 'px';
            modeBadge.style.top = (posY - 35) + 'px';

            // Rotation Logic
            let flipScale = isFacingRight ? 'scaleX(1)' : 'scaleX(-1)';
            let spiderScale = spiderFlipped ? ' scaleY(-1)' : '';
            
            if (currentMode === 'Ball' && Math.abs(velX) > 0.5 && !isDragging) {
                rotation += velX * 3; // Spin the ball!
                pet.style.transform = `rotate(${rotation}deg)`;
            } else if (currentMode === 'Ship') {
                // Angle ship based on velocity
                let tilt = velY * 2;
                if (!isFacingRight) tilt *= -1;
                pet.style.transform = `${flipScale} rotate(${tilt}deg)`;
            } else {
                pet.style.transform = flipScale + spiderScale;
            }

            requestAnimationFrame(updatePhysics);
        }

        // --- DRAGGING LOGIC ---
        let offsetX = 0, offsetY = 0;
        let lastMouseX = 0, lastMouseY = 0;

        pet.addEventListener('mousedown', (e) => {
            isDragging = true;
            offsetX = e.clientX - posX;
            offsetY = e.clientY - posY;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            velX = 0; velY = 0;
            pet.style.transition = 'none'; 
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                velX = e.clientX - lastMouseX;
                velY = e.clientY - lastMouseY;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                posX = e.clientX - offsetX;
                posY = e.clientY - offsetY;
                
                if (velX > 0) isFacingRight = true;
                if (velX < 0) isFacingRight = false;
            }
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                pet.style.transition = 'transform 0.15s'; 
                roamTimer = 60; 
                // Reset spider flip if thrown
                if (currentMode === 'Spider') spiderFlipped = false;
            }
        });

        updatePhysics();
    </script>
</body>
</html>
