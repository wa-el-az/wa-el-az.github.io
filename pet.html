<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael — Desktop Pet</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            padding: 80px 5vw; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
            user-select: none;
        }
        
        .header-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(14px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            text-align: center;
            max-width: 650px;
            position: relative;
            z-index: 10;
        }

        .header-card h1 { margin: 0 0 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .header-card p { color: var(--text-muted); line-height: 1.5; margin: 0 0 20px; }

        .controls-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* --- THE PET CSS --- */
        .pet-entity {
            position: fixed;
            width: 50px; 
            height: 50px;
            object-fit: contain;
            z-index: 9999;
            cursor: grab;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transition: transform 0.15s; 
        }

        .pet-entity:active { cursor: grabbing; }

        /* Sugar Rush RGB Effect */
        @keyframes rainbowGlow {
            0% { filter: drop-shadow(0 0 20px #ff0000); }
            33% { filter: drop-shadow(0 0 20px #00ff00); }
            66% { filter: drop-shadow(0 0 20px #0000ff); }
            100% { filter: drop-shadow(0 0 20px #ff0000); }
        }
        .sugar-rush { animation: rainbowGlow 0.5s linear infinite !important; }

        /* Transformation Magic */
        @keyframes morphFlash {
            0% { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)) brightness(1) saturate(1); transform: scale(1) rotate(0deg); }
            50% { filter: drop-shadow(0 0 40px #4ade80) brightness(2) saturate(3); transform: scale(0.3) rotate(180deg); }
            100% { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)) brightness(1) saturate(1); transform: scale(1) rotate(360deg); }
        }
        .morphing { animation: morphFlash 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        
        .mode-badge {
            position: fixed;
            background: rgba(0,0,0,0.6);
            color: #4ade80;
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .speech-bubble {
            position: fixed;
            background: #fff;
            color: #111;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10001;
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            max-width: 150px;
            text-align: center;
        }
        .speech-bubble::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            border-width: 6px 6px 0; border-style: solid; border-color: #fff transparent transparent transparent;
        }

        /* --- OBSTACLES & ITEMS --- */
        .jump-pad {
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 6px;
            background: #f1c40f;
            border-radius: 6px 6px 0 0;
            box-shadow: 0 -5px 15px rgba(241, 196, 15, 0.6);
            z-index: 15;
        }

        .portal {
            position: fixed;
            width: 40px;
            height: 90px;
            border-radius: 50%;
            z-index: 5;
            box-shadow: 0 0 30px currentColor;
            border: 4px solid currentColor;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }
        .portal-blue { top: 30%; left: 10vw; color: #3498db; }
        .portal-yellow { top: 30%; right: 10vw; color: #f1c40f; }

        .tea-drop {
            position: fixed;
            font-size: 36px;
            z-index: 9998;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="index" style="transition: none;"><i data-lucide="home"></i> Home</a>

    <div id="portalBlue" class="portal portal-blue"></div>
    <div id="portalYellow" class="portal portal-yellow"></div>

    <div class="header-card" id="solid-box">
        <div id="jumpPad" class="jump-pad"></div>
        <h1><i data-lucide="bot"></i> GD Chaos Sandbox</h1>
        <p>Your pets will dynamically shape-shift and interact with the environment! Hit the yellow Jump Pad, fly through the Gravity Portals, feed them Moroccan Tea, or turn on the Laser Pointer to make them chase your mouse!</p>
        
        <div class="controls-row">
            <button class="btn" style="width: auto;" onclick="spawnPet()"><i data-lucide="copy"></i> Spawn Clone</button>
            <button class="btn" style="width: auto; background: #4ade80; color: #111;" onclick="dropTea()"><i data-lucide="coffee"></i> Drop Tea</button>
            <button class="btn" style="width: auto; background: #e74c3c; color: #fff;" id="laserToggle" onclick="toggleLaser()"><i data-lucide="mouse-pointer"></i> Laser: OFF</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        lucide.createIcons();

        const backBtn = document.getElementById('dynamicBackBtn');
        if (document.referrer.toLowerCase().includes('shortcuts')) {
            backBtn.href = 'shortcuts';
            backBtn.innerHTML = '<i data-lucide="zap"></i> Shortcuts';
            lucide.createIcons();
        }

        // ==========================================
        // ADVANCED MULTI-PET ENGINE
        // ==========================================
        const solidBox = document.getElementById('solid-box');
        const jumpPad = document.getElementById('jumpPad');
        const pBlue = document.getElementById('portalBlue');
        const pYellow = document.getElementById('portalYellow');
        const laserBtn = document.getElementById('laserToggle');
        
        const GAMEMODES = [
            { id: 'Cube', src: 'assets/gd/cube_274.png' },
            { id: 'Ship', src: 'assets/gd/ship_48.png' },
            { id: 'Ball', src: 'assets/gd/ball_91.png' },
            { id: 'UFO', src: 'assets/gd/ufo_79.png' },
            { id: 'Spider', src: 'assets/gd/spider_49.png' }
        ];

        const DIALOGUE = [
            "I beat Stereo Madness!", "WaelOS is so smooth...", "Have you redeemed a code?", 
            "Need more RAM!", "Mint tea is the best.", "Where is the Windows Vault?", 
            "I love jumping!", "Are you an admin?", "Don't drop me!"
        ];

        let pets = [];
        let teaItem = null;
        let thiefPet = null;
        let isLaserMode = false;
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function toggleLaser() {
            isLaserMode = !isLaserMode;
            laserBtn.innerHTML = isLaserMode ? `<i data-lucide="mouse-pointer"></i> Laser: ON` : `<i data-lucide="mouse-pointer"></i> Laser: OFF`;
            laserBtn.style.background = isLaserMode ? '#3498db' : '#e74c3c';
            lucide.createIcons();
        }

        function dropTea() {
            if (teaItem) return; // Only one tea at a time
            teaItem = {
                el: document.createElement('div'),
                posX: Math.random() * (window.innerWidth - 50),
                posY: -50,
                velY: 0
            };
            teaItem.el.className = 'tea-drop';
            teaItem.el.innerText = '🍵';
            document.body.appendChild(teaItem.el);
        }

        function spawnPet() {
            const petObj = {
                el: document.createElement('img'),
                badge: document.createElement('div'),
                bubble: document.createElement('div'),
                mode: GAMEMODES[Math.floor(Math.random() * GAMEMODES.length)],
                posX: window.innerWidth / 2 + (Math.random() * 100 - 50),
                posY: 100,
                velX: 0,
                velY: 0,
                isFacingRight: true,
                roamTimer: 60,
                transformTimer: Math.random() * 500 + 300,
                speechTimer: Math.random() * 800 + 400,
                spiderFlipped: false,
                rotation: 0,
                sugarRush: 0,
                isDragging: false,
                offsetX: 0, offsetY: 0, lastX: 0, lastY: 0
            };

            // Setup DOM Elements
            petObj.el.className = 'pet-entity';
            petObj.el.src = petObj.mode.src;
            petObj.el.draggable = false;
            
            petObj.badge.className = 'mode-badge';
            petObj.badge.innerText = `${petObj.mode.id} Mode`;
            
            petObj.bubble.className = 'speech-bubble';

            document.body.appendChild(petObj.el);
            document.body.appendChild(petObj.badge);
            document.body.appendChild(petObj.bubble);

            // Dragging Logic
            petObj.el.addEventListener('mousedown', (e) => {
                petObj.isDragging = true;
                petObj.offsetX = e.clientX - petObj.posX;
                petObj.offsetY = e.clientY - petObj.posY;
                petObj.lastX = e.clientX;
                petObj.lastY = e.clientY;
                petObj.velX = 0; petObj.velY = 0;
                petObj.el.style.transition = 'none'; 

                // Drop stolen button if clicked
                if (thiefPet === petObj) {
                    thiefPet = null;
                    backBtn.style.position = 'fixed';
                    backBtn.style.top = '24px';
                    backBtn.style.right = '24px';
                    backBtn.style.left = 'auto';
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (petObj.isDragging) {
                    petObj.velX = e.clientX - petObj.lastX;
                    petObj.velY = e.clientY - petObj.lastY;
                    petObj.lastX = e.clientX;
                    petObj.lastY = e.clientY;
                    petObj.posX = e.clientX - petObj.offsetX;
                    petObj.posY = e.clientY - petObj.offsetY;
                    if (petObj.velX > 0) petObj.isFacingRight = true;
                    if (petObj.velX < 0) petObj.isFacingRight = false;
                }
            });

            window.addEventListener('mouseup', () => {
                if (petObj.isDragging) {
                    petObj.isDragging = false;
                    petObj.el.style.transition = 'transform 0.15s'; 
                    petObj.roamTimer = 60; 
                    if (petObj.mode.id === 'Spider') petObj.spiderFlipped = false;
                }
            });

            pets.push(petObj);
        }

        function morphPet(p) {
            let newMode;
            do { newMode = GAMEMODES[Math.floor(Math.random() * GAMEMODES.length)]; } while (newMode.id === p.mode.id);

            p.el.classList.add('morphing');
            p.spiderFlipped = false; 
            p.rotation = 0; 
            
            setTimeout(() => {
                p.el.src = newMode.src;
                p.mode = newMode;
                p.badge.innerText = `${p.mode.id} Mode`;
                p.badge.style.opacity = '1';
                setTimeout(() => p.badge.style.opacity = '0', 2000);
            }, 300);

            setTimeout(() => { p.el.classList.remove('morphing'); }, 600);
        }

        // --- MAIN PHYSICS LOOP ---
        function engineLoop() {
            const petSize = 50;
            const ground = window.innerHeight - petSize;
            const rightWall = window.innerWidth - petSize;
            const boxRect = solidBox.getBoundingClientRect();
            
            // Portals Rects
            const pbRect = pBlue.getBoundingClientRect();
            const pyRect = pYellow.getBoundingClientRect();
            
            // Tea Physics
            if (teaItem) {
                teaItem.velY += 0.8;
                teaItem.posY += teaItem.velY;
                if (teaItem.posY > window.innerHeight - 40) {
                    teaItem.posY = window.innerHeight - 40;
                    teaItem.velY = 0;
                }
                teaItem.el.style.left = teaItem.posX + 'px';
                teaItem.el.style.top = teaItem.posY + 'px';
            }

            pets.forEach(p => {
                if (!p.isDragging) {
                    let spdMult = p.sugarRush > 0 ? 2 : 1;
                    if (p.sugarRush > 0) p.sugarRush--;

                    if (p.sugarRush > 0) p.el.classList.add('sugar-rush');
                    else p.el.classList.remove('sugar-rush');

                    // Gravity
                    let activeGravity = 0.8;
                    if (p.mode.id === 'Ship') activeGravity = 0; 
                    if (p.mode.id === 'Spider' && p.spiderFlipped) activeGravity = -0.8; 
                    
                    p.velY += activeGravity;
                    let prevY = p.posY;
                    p.posX += p.velX;
                    p.posY += p.velY;

                    // Platform Collision (Box)
                    let pCenterX = p.posX + (petSize / 2);
                    let pCenterY = p.posY + (petSize / 2);

                    if (pCenterX > boxRect.left && pCenterX < boxRect.right) {
                        // Land on top
                        if (p.velY >= 0 && prevY + petSize <= boxRect.top + 10 && p.posY + petSize >= boxRect.top) {
                            p.posY = boxRect.top - petSize;
                            p.velY *= -0.4;
                            p.velX *= 0.8;
                            
                            // JUMP PAD LOGIC
                            if (pCenterX > boxRect.left + (boxRect.width/2) - 40 && pCenterX < boxRect.left + (boxRect.width/2) + 40) {
                                p.velY = -25; // BOING
                            }
                        }
                        // Spider hit bottom
                        if (p.velY <= 0 && prevY >= boxRect.bottom - 10 && p.posY <= boxRect.bottom) {
                            p.posY = boxRect.bottom;
                            p.velY *= -0.4;
                            p.velX *= 0.8;
                        }
                    }

                    // Portal Logic
                    if (pCenterX > pbRect.left && pCenterX < pbRect.right && pCenterY > pbRect.top && pCenterY < pbRect.bottom) {
                        p.spiderFlipped = true; // Blue = Anti-gravity
                    }
                    if (pCenterX > pyRect.left && pCenterX < pyRect.right && pCenterY > pyRect.top && pCenterY < pyRect.bottom) {
                        p.spiderFlipped = false; // Yellow = Normal gravity
                    }

                    // Screen Bounds
                    if (p.posY > ground) {
                        p.posY = ground; p.velY *= -0.4;
                        if (p.mode.id !== 'Ship') p.velX *= 0.8; 
                        if (Math.abs(p.velY) < 1) p.velY = 0; 
                    }
                    if (p.posY < 0) {
                        p.posY = 0; p.velY = Math.abs(p.velY) * 0.5;
                        if (p.mode.id !== 'Ship') p.velX *= 0.8;
                    }
                    if (p.posX < 0) {
                        p.posX = 0; p.velX *= -1;
                        if (p.mode.id === 'Ball') p.velY = -12;
                    }
                    if (p.posX > rightWall) {
                        p.posX = rightWall; p.velX *= -1;
                        if (p.mode.id === 'Ball') p.velY = -12;
                    }

                    // Thief Mechanic (1% chance if near Home button)
                    if (!thiefPet && !isLaserMode && Math.random() < 0.01) {
                        let btnRect = backBtn.getBoundingClientRect();
                        if (Math.hypot(p.posX - btnRect.left, p.posY - btnRect.top) < 150) {
                            thiefPet = p;
                        }
                    }
                    if (thiefPet === p) {
                        backBtn.style.position = 'fixed';
                        backBtn.style.left = (p.posX + 10) + 'px';
                        backBtn.style.top = (p.posY - 30) + 'px';
                    }

                    // AI & Timers
                    p.transformTimer--;
                    p.roamTimer--;
                    p.speechTimer--;

                    if (p.transformTimer <= 0) { morphPet(p); p.transformTimer = Math.random() * 600 + 400; }
                    
                    if (p.speechTimer <= 0) {
                        p.bubble.innerText = DIALOGUE[Math.floor(Math.random() * DIALOGUE.length)];
                        p.bubble.style.opacity = '1';
                        setTimeout(() => p.bubble.style.opacity = '0', 3000);
                        p.speechTimer = Math.random() * 800 + 400;
                    }

                    // Laser Pointer Override
                    if (isLaserMode) {
                        let dx = mouseX - pCenterX;
                        let dy = mouseY - pCenterY;
                        let dist = Math.hypot(dx, dy);
                        if (dist > 20) {
                            p.velX += (dx / dist) * 0.5 * spdMult;
                            if (p.mode.id === 'Ship') p.velY += (dy / dist) * 0.5 * spdMult;
                            else if (p.posY >= ground || p.posY <= 0 || (p.posY === boxRect.top - petSize)) {
                                if (dy < -50 && Math.random() < 0.1) p.velY = p.spiderFlipped ? 15 : -15; // Jump to mouse
                            }
                        }
                    } 
                    // Tea Attraction Override
                    else if (teaItem) {
                        let dx = teaItem.posX - pCenterX;
                        if (Math.abs(dx) > 10) {
                            p.velX += (dx > 0 ? 0.3 : -0.3) * spdMult;
                        }
                        // Eat Tea
                        if (Math.hypot(dx, teaItem.posY - pCenterY) < 50) {
                            teaItem.el.remove();
                            teaItem = null;
                            p.sugarRush = 600; // 10 seconds of RGB speed
                            p.bubble.innerText = "YUM!";
                            p.bubble.style.opacity = '1';
                            setTimeout(() => p.bubble.style.opacity = '0', 2000);
                        }
                    }
                    // Normal AI
                    else if (p.roamTimer <= 0) {
                        const action = Math.random();
                        if (p.mode.id === 'Ship') {
                            p.velX = (Math.random() - 0.5) * 12 * spdMult;
                            p.velY = (Math.random() - 0.5) * 12 * spdMult;
                            p.roamTimer = 60;
                        } else if (Math.abs(p.velY) < 1) {
                            if (action < 0.3) { p.velX = -3 * spdMult; p.isFacingRight = false; p.roamTimer = Math.random() * 100 + 50; }
                            else if (action < 0.6) { p.velX = 3 * spdMult; p.isFacingRight = true; p.roamTimer = Math.random() * 100 + 50; }
                            else if (action < 0.8) {
                                if (p.mode.id === 'Cube' || p.mode.id === 'Ball') p.velY = p.spiderFlipped ? 15 : -15;
                                else if (p.mode.id === 'UFO') p.velY = p.spiderFlipped ? 10 : -10;
                                else if (p.mode.id === 'Spider') p.spiderFlipped = !p.spiderFlipped;
                                p.roamTimer = 40;
                            } else { p.velX = 0; p.roamTimer = Math.random() * 100 + 50; }
                        } else if (p.mode.id === 'UFO' && action < 0.05) {
                            p.velY = p.spiderFlipped ? 10 : -10;
                        }
                    }
                }

                // Apply Graphics
                if (p.velX > 0 && !p.isDragging && !isLaserMode && !teaItem) p.isFacingRight = true;
                if (p.velX < 0 && !p.isDragging && !isLaserMode && !teaItem) p.isFacingRight = false;

                p.el.style.left = p.posX + 'px';
                p.el.style.top = p.posY + 'px';
                p.badge.style.left = (p.posX - 10) + 'px';
                p.badge.style.top = (p.posY - 30) + 'px';
                p.bubble.style.left = (p.posX - 30) + 'px';
                p.bubble.style.top = (p.posY - 50) + 'px';

                let flipScale = p.isFacingRight ? 'scaleX(1)' : 'scaleX(-1)';
                let spiderScale = p.spiderFlipped ? ' scaleY(-1)' : '';
                
                if (p.mode.id === 'Ball' && Math.abs(p.velX) > 0.5 && !p.isDragging) {
                    p.rotation += p.velX * 3; 
                    p.el.style.transform = `rotate(${p.rotation}deg)`;
                } else if (p.mode.id === 'Ship') {
                    let tilt = p.velY * 2;
                    if (!p.isFacingRight) tilt *= -1;
                    p.el.style.transform = `${flipScale} rotate(${tilt}deg)`;
                } else {
                    p.el.style.transform = flipScale + spiderScale;
                }
            });

            requestAnimationFrame(engineLoop);
        }

        // Spawn first pet and start!
        spawnPet();
        engineLoop();
    </script>
</body>
</html>
