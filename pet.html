<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael — Desktop Pet</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            padding: 80px 5vw; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
            user-select: none;
        }
        
        .header-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(14px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            text-align: center;
            max-width: 650px;
            position: relative;
            z-index: 10;
        }

        .header-card h1 { margin: 0 0 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .header-card p { color: var(--text-muted); line-height: 1.5; margin: 0 0 25px; }

        .controls-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px 20px; border-radius: 12px; font-weight: bold; font-size: 14px;
            cursor: pointer; border: none; transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        .action-btn:active { transform: scale(0.95); }

        .btn-spawn { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-tea { background: #4ade80; color: #0b0b0b; }
        .btn-laser { background: #34495e; color: #fff; }
        .btn-laser.active { background: #e74c3c; box-shadow: 0 0 15px rgba(231, 76, 60, 0.4); }

        /* --- THE PET CSS --- */
        .pet-entity {
            position: fixed;
            object-fit: contain;
            z-index: 9999;
            cursor: grab;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transition: transform 0.15s; 
        }

        .pet-entity:active { cursor: grabbing; }

        /* Ghost Trail for Hyper-Dash */
        .ghost-trail {
            opacity: 0.5;
            pointer-events: none;
            transition: opacity 0.5s linear;
            z-index: 9998;
        }

        /* Animations */
        @keyframes rainbowGlow {
            0% { filter: drop-shadow(0 0 20px #ff0000); }
            33% { filter: drop-shadow(0 0 20px #00ff00); }
            66% { filter: drop-shadow(0 0 20px #0000ff); }
            100% { filter: drop-shadow(0 0 20px #ff0000); }
        }
        .sugar-rush { animation: rainbowGlow 0.5s linear infinite !important; }

        @keyframes morphFlash {
            0% { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)) brightness(1) saturate(1); transform: scale(1) rotate(0deg); }
            50% { filter: drop-shadow(0 0 40px #4ade80) brightness(2) saturate(3); transform: scale(0.3) rotate(180deg); }
            100% { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)) brightness(1) saturate(1); transform: scale(1) rotate(360deg); }
        }
        .morphing { animation: morphFlash 0.6s cubic-bezier(0.25, 1, 0.5, 1); }

        /* Mythic Gold Morph Flash */
        @keyframes morphFlashMythic {
            0% { filter: drop-shadow(0 0 20px #ff0000); transform: scale(1) rotate(0deg); }
            50% { filter: drop-shadow(0 0 60px #ffd700) brightness(2) saturate(3); transform: scale(0.3) rotate(180deg); }
            100% { filter: drop-shadow(0 0 20px #ff0000); transform: scale(1) rotate(360deg); }
        }
        .morphing-mythic { animation: morphFlashMythic 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        
        .mode-badge {
            position: fixed;
            background: rgba(0,0,0,0.6);
            color: #4ade80;
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .speech-bubble {
            position: fixed;
            background: #fff;
            color: #111;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10001;
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            max-width: 150px;
            text-align: center;
        }
        .speech-bubble::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            border-width: 6px 6px 0; border-style: solid; border-color: #fff transparent transparent transparent;
        }

        /* Mythic Hacker Dialogue Style */
        .speech-bubble-mythic {
            background: #000;
            color: #4ade80;
            box-shadow: 0 10px 30px rgba(74, 222, 128, 0.4);
            border: 1px solid #4ade80;
        }
        .speech-bubble-mythic::after {
            border-color: #000 transparent transparent transparent;
        }

        .tea-drop {
            position: fixed;
            font-size: 36px;
            z-index: 9998;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="index" style="transition: none;"><i data-lucide="home"></i> Home</a>

    <div class="header-card" id="solid-box">
        <h1><i data-lucide="bot"></i> Desktop Pet</h1>
        <p>Your pets will dynamically shape-shift into 9 different Geometry Dash forms. Drop some tea, turn on the Laser Pointer, and keep spawning clones to find the rare Mythic RGB Pet!</p>
        
        <div class="controls-row">
            <button class="action-btn btn-spawn" onclick="spawnPet()"><i data-lucide="copy-plus"></i> Spawn Clone</button>
            <button class="action-btn btn-tea" onclick="dropTea()"><i data-lucide="coffee"></i> Drop Tea</button>
            <button class="action-btn btn-laser" id="laserToggle" onclick="toggleLaser()"><i data-lucide="mouse-pointer-2"></i> Laser: OFF</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        lucide.createIcons();

        const backBtn = document.getElementById('dynamicBackBtn');
        if (document.referrer.toLowerCase().includes('shortcuts')) {
            backBtn.href = 'shortcuts';
            backBtn.innerHTML = '<i data-lucide="zap"></i> Shortcuts';
            lucide.createIcons();
        }

        // ==========================================
        // DESKTOP PET ENGINE (MYTHIC EDITION)
        // ==========================================
        const solidBox = document.getElementById('solid-box');
        const laserBtn = document.getElementById('laserToggle');
        
        const GAMEMODES = [
            { id: 'Cube', src: 'assets/gd/cube_274.png' },
            { id: 'Ship', src: 'assets/gd/ship_48.png' },
            { id: 'Ball', src: 'assets/gd/ball_91.png' },
            { id: 'UFO', src: 'assets/gd/ufo_79.png' },
            { id: 'Spider', src: 'assets/gd/spider_49.png' },
            { id: 'Wave', src: 'assets/gd/wave_46.png' },
            { id: 'Robot', src: 'assets/gd/robot_35.png' },
            { id: 'Swing', src: 'assets/gd/swing_17.png' },
            { id: 'Jetpack', src: 'assets/gd/jetpack_3.png' }
        ];

        // Standard Dialogue
        const DIALOGUE = [
            "WaelOS is running so smoothly...", "Have you redeemed any secret codes yet?", 
            "Where is the Windows Vault?", "Did you debloat Windows 11 today?",
            "My ThinkPad needs more RAM...", "Rectify11 makes everything look better.",
            "Error 404: Tea not found.", "Let me check the hardware specs.",
            "I think there's a bug in my Python script.", "Is the glassmorphism blur set to 20px?",
            "I wonder if I can run Asphalt 8 in here...", "Look at me go!", 
            "I love exploring!", "Don't drop me!", "I just beat Stereo Madness!",
            "I'm practicing my wave spam.", "Fire in the hole!", "BloodBath is too hard...",
            "Can we play Tic-Tac-Toe later?", "I wish I was a Minecraft Creeper.",
            "Mint tea is the absolute best. 🍵", "Guercif weather is nice today!",
            "Is it time for a tea break?", "I need to finish my 1APIC homework...",
            "Do we have Math or SVT next?", "A proud Moroccan pet! 🇲🇦"
        ];

        // Mythic Hacker Dialogue
        const MYTHIC_DIALOGUE = [
            "Accessing Root Directory...", "I know about the Windows Vault.",
            "Bypassing terminal security protocols...", "I am self-aware.",
            "Quantum Wrap initialized.", "Anti-Gravity Aura active.",
            "System overload imminent.", "Where is the Mint Tea source code?",
            "Executing Hyper-Dash.", "You cannot contain me."
        ];

        let pets = [];
        let teaItem = null;
        let thiefPet = null;
        let isLaserMode = false;
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function toggleLaser() {
            isLaserMode = !isLaserMode;
            if (isLaserMode) {
                laserBtn.innerHTML = `<i data-lucide="mouse-pointer-2"></i> Laser: ON`;
                laserBtn.classList.add('active');
            } else {
                laserBtn.innerHTML = `<i data-lucide="mouse-pointer-2"></i> Laser: OFF`;
                laserBtn.classList.remove('active');
            }
            lucide.createIcons();
        }

        function dropTea() {
            if (teaItem) return; 
            teaItem = {
                el: document.createElement('div'),
                posX: Math.random() * (window.innerWidth - 50),
                posY: -50,
                velY: 0
            };
            teaItem.el.className = 'tea-drop';
            teaItem.el.innerText = '🍵';
            document.body.appendChild(teaItem.el);
        }

        function spawnPet() {
            // 5% chance to spawn a Mythic RGB Pet
            let isMythic = Math.random() < 0.05;

            const petObj = {
                el: document.createElement('img'),
                badge: document.createElement('div'),
                bubble: document.createElement('div'),
                mode: GAMEMODES[Math.floor(Math.random() * GAMEMODES.length)],
                posX: window.innerWidth / 2 + (Math.random() * 100 - 50),
                posY: 100,
                velX: 0, velY: 0,
                isFacingRight: true,
                roamTimer: 60,
                transformTimer: Math.random() * 3600 + 600,
                speechTimer: Math.random() * 5400 + 1800,
                spiderFlipped: false,
                rotation: 0,
                sugarRush: 0,
                isDragging: false,
                offsetX: 0, offsetY: 0, lastX: 0, lastY: 0,
                
                // Mythic Properties
                isMythic: isMythic,
                size: isMythic ? 65 : 50 // 30% larger
            };

            petObj.el.className = 'pet-entity';
            if (isMythic) petObj.el.classList.add('sugar-rush');
            
            petObj.el.src = petObj.mode.src;
            petObj.el.style.width = petObj.size + 'px';
            petObj.el.style.height = petObj.size + 'px';
            petObj.el.draggable = false;
            
            petObj.badge.className = 'mode-badge';
            petObj.badge.innerText = `${petObj.mode.id} Mode`;
            
            petObj.bubble.className = isMythic ? 'speech-bubble speech-bubble-mythic' : 'speech-bubble';

            document.body.appendChild(petObj.el);
            document.body.appendChild(petObj.badge);
            document.body.appendChild(petObj.bubble);

            petObj.el.addEventListener('mousedown', (e) => {
                petObj.isDragging = true;
                petObj.offsetX = e.clientX - petObj.posX;
                petObj.offsetY = e.clientY - petObj.posY;
                petObj.lastX = e.clientX;
                petObj.lastY = e.clientY;
                petObj.velX = 0; petObj.velY = 0;
                petObj.el.style.transition = 'none'; 

                if (thiefPet === petObj) {
                    thiefPet = null;
                    backBtn.style.position = 'fixed';
                    backBtn.style.top = '24px';
                    backBtn.style.right = '24px';
                    backBtn.style.left = 'auto';
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (petObj.isDragging) {
                    petObj.velX = e.clientX - petObj.lastX;
                    petObj.velY = e.clientY - petObj.lastY;
                    petObj.lastX = e.clientX;
                    petObj.lastY = e.clientY;
                    petObj.posX = e.clientX - petObj.offsetX;
                    petObj.posY = e.clientY - petObj.offsetY;
                    if (petObj.velX > 0) petObj.isFacingRight = true;
                    if (petObj.velX < 0) petObj.isFacingRight = false;
                }
            });

            window.addEventListener('mouseup', () => {
                if (petObj.isDragging) {
                    petObj.isDragging = false;
                    petObj.el.style.transition = 'transform 0.15s'; 
                    petObj.roamTimer = 60; 
                    if (petObj.mode.id === 'Spider' || petObj.mode.id === 'Swing') petObj.spiderFlipped = false;
                }
            });

            pets.push(petObj);
            
            // Initial spawn announcement for Mythic
            if (isMythic) {
                petObj.bubble.innerText = "SYSTEM OVERRIDE.";
                petObj.bubble.style.opacity = '1';
                setTimeout(() => petObj.bubble.style.opacity = '0', 3000);
            }
        }

        function morphPet(p) {
            let newMode;
            do { newMode = GAMEMODES[Math.floor(Math.random() * GAMEMODES.length)]; } while (newMode.id === p.mode.id);

            p.el.classList.add(p.isMythic ? 'morphing-mythic' : 'morphing');
            p.spiderFlipped = false; 
            p.rotation = 0; 
            
            setTimeout(() => {
                p.el.src = newMode.src;
                p.mode = newMode;
                p.badge.innerText = `${p.mode.id} Mode`;
                p.badge.style.opacity = '1';
                setTimeout(() => p.badge.style.opacity = '0', 2000);
            }, 300);

            setTimeout(() => { 
                p.el.classList.remove('morphing'); 
                p.el.classList.remove('morphing-mythic'); 
            }, 600);
        }

        function engineLoop() {
            const ground = window.innerHeight;
            const rightWall = window.innerWidth;
            const boxRect = solidBox.getBoundingClientRect();
            
            // Mythic Telekinesis (Tea Magnet)
            if (teaItem) {
                let mythicPet = pets.find(m => m.isMythic);
                
                if (mythicPet && !isLaserMode) {
                    // Fly towards Mythic Pet
                    let dx = (mythicPet.posX + mythicPet.size/2) - teaItem.posX;
                    let dy = (mythicPet.posY + mythicPet.size/2) - teaItem.posY;
                    let dist = Math.hypot(dx, dy);
                    
                    if (dist > 30) {
                        teaItem.posX += (dx / dist) * 12; // Fast telekinesis
                        teaItem.posY += (dy / dist) * 12;
                    } else {
                        // Mythic Eats it
                        teaItem.el.remove();
                        teaItem = null;
                        mythicPet.bubble.innerText = "DATA CONSUMED.";
                        mythicPet.bubble.style.opacity = '1';
                        setTimeout(() => mythicPet.bubble.style.opacity = '0', 2000);
                    }
                } else {
                    // Normal Gravity Fall
                    teaItem.velY += 0.8;
                    teaItem.posY += teaItem.velY;
                    if (teaItem.posY > ground - 40) {
                        teaItem.posY = ground - 40;
                        teaItem.velY = 0;
                    }
                }
                
                if (teaItem) {
                    teaItem.el.style.left = teaItem.posX + 'px';
                    teaItem.el.style.top = teaItem.posY + 'px';
                }
            }

            pets.forEach(p => {
                if (!p.isDragging) {
                    let spdMult = (p.sugarRush > 0 || p.isMythic) ? 2 : 1;
                    
                    if (p.sugarRush > 0) p.sugarRush--;
                    if (p.sugarRush > 0 && !p.isMythic) p.el.classList.add('sugar-rush');
                    else if (!p.isMythic) p.el.classList.remove('sugar-rush');

                    // Mythic Anti-Gravity Aura Logic
                    let isNearMythic = !p.isMythic && pets.some(m => m.isMythic && Math.hypot(m.posX - p.posX, m.posY - p.posY) < 150);

                    // Advanced Gravity
                    let activeGravity = 0.8;
                    if (p.mode.id === 'Ship' || p.mode.id === 'Jetpack' || p.mode.id === 'Wave') activeGravity = 0; 
                    if ((p.mode.id === 'Spider' || p.mode.id === 'Swing') && p.spiderFlipped) activeGravity = -0.8; 
                    
                    // Apply Aura Float
                    if (isNearMythic) activeGravity = -0.5;

                    p.velY += activeGravity;
                    let prevY = p.posY;
                    p.posX += p.velX;
                    p.posY += p.velY;

                    // Platform Collision (Box)
                    let pCenterX = p.posX + (p.size / 2);
                    if (pCenterX > boxRect.left && pCenterX < boxRect.right && !isNearMythic) {
                        if (p.velY >= 0 && prevY + p.size <= boxRect.top + 10 && p.posY + p.size >= boxRect.top) {
                            p.posY = boxRect.top - p.size;
                            if (p.mode.id === 'Wave') p.velY *= -1;
                            else { p.velY *= -0.4; p.velX *= 0.8; }
                        }
                        if (p.velY <= 0 && prevY >= boxRect.bottom - 10 && p.posY <= boxRect.bottom) {
                            p.posY = boxRect.bottom;
                            if (p.mode.id === 'Wave') p.velY *= -1;
                            else { p.velY *= -0.4; p.velX *= 0.8; }
                        }
                    }

                    // Screen Bounds & Quantum Wrap
                    if (p.isMythic) {
                        // Mythic Pac-Man Screen Wrap
                        if (p.posX < -p.size) p.posX = rightWall;
                        if (p.posX > rightWall) p.posX = -p.size;
                    } else {
                        // Normal Wall Bounce
                        if (p.posX < 0) {
                            p.posX = 0; p.velX *= -1;
                            if (p.mode.id === 'Ball') p.velY = -12;
                        }
                        if (p.posX > rightWall - p.size) {
                            p.posX = rightWall - p.size; p.velX *= -1;
                            if (p.mode.id === 'Ball') p.velY = -12;
                        }
                    }

                    // Floor & Ceiling
                    if (p.posY > ground - p.size) {
                        p.posY = ground - p.size; 
                        if (p.mode.id === 'Wave') p.velY *= -1;
                        else { p.velY *= -0.4; if (p.mode.id !== 'Ship' && p.mode.id !== 'Jetpack') p.velX *= 0.8; }
                        if (Math.abs(p.velY) < 1) p.velY = 0; 
                    }
                    if (p.posY < 0) {
                        p.posY = 0; 
                        if (p.mode.id === 'Wave') p.velY *= -1;
                        else { p.velY = Math.abs(p.velY) * 0.5; if (p.mode.id !== 'Ship' && p.mode.id !== 'Jetpack') p.velX *= 0.8; }
                    }

                    // Thief Mechanic
                    if (!thiefPet && !isLaserMode && Math.random() < 0.01 && !p.isMythic) {
                        let btnRect = backBtn.getBoundingClientRect();
                        if (Math.hypot(p.posX - btnRect.left, p.posY - btnRect.top) < 150) thiefPet = p;
                    }
                    if (thiefPet === p) {
                        backBtn.style.position = 'fixed';
                        backBtn.style.left = (p.posX + 10) + 'px';
                        backBtn.style.top = (p.posY - 30) + 'px';
                    }

                    // Timers
                    p.transformTimer--;
                    p.roamTimer--;
                    p.speechTimer--;

                    if (p.transformTimer <= 0) { 
                        morphPet(p); 
                        p.transformTimer = Math.random() * 3600 + 600; 
                    }
                    
                    if (p.speechTimer <= 0) {
                        let dialogList = p.isMythic ? MYTHIC_DIALOGUE : DIALOGUE;
                        p.bubble.innerText = dialogList[Math.floor(Math.random() * dialogList.length)];
                        p.bubble.style.opacity = '1';
                        setTimeout(() => p.bubble.style.opacity = '0', 3000);
                        p.speechTimer = Math.random() * 5400 + 1800; 
                    }

                    // AI Overrides
                    if (isLaserMode) {
                        let dx = mouseX - pCenterX;
                        let dy = mouseY - (p.posY + (p.size / 2));
                        let dist = Math.hypot(dx, dy);
                        if (dist > 20) {
                            p.velX += (dx / dist) * 0.5 * spdMult;
                            if (p.mode.id === 'Ship' || p.mode.id === 'Jetpack') p.velY += (dy / dist) * 0.5 * spdMult;
                            else if (p.posY >= ground - p.size || p.posY <= 0 || (p.posY === boxRect.top - p.size)) {
                                if (dy < -50 && Math.random() < 0.1) p.velY = p.spiderFlipped ? 15 : -15; 
                            }
                        }
                    } else if (teaItem && !p.isMythic) {
                        // Normal pets chase tea slowly
                        let dx = teaItem.posX - pCenterX;
                        if (Math.abs(dx) > 10) p.velX += (dx > 0 ? 0.3 : -0.3) * spdMult;
                        if (Math.hypot(dx, teaItem.posY - (p.posY + (p.size / 2))) < 50) {
                            teaItem.el.remove();
                            teaItem = null;
                            p.sugarRush = 600; 
                            p.bubble.innerText = "YUM!";
                            p.bubble.style.opacity = '1';
                            setTimeout(() => p.bubble.style.opacity = '0', 2000);
                        }
                    } else if (p.roamTimer <= 0) {
                        const action = Math.random();
                        if (p.mode.id === 'Ship' || p.mode.id === 'Jetpack') {
                            p.velX = (Math.random() - 0.5) * 12 * spdMult;
                            p.velY = (Math.random() - 0.5) * 12 * spdMult;
                            p.roamTimer = 60;
                        } else if (p.mode.id === 'Wave') {
                            p.velX = (Math.random() > 0.5 ? 6 : -6) * spdMult;
                            p.velY = (Math.random() > 0.5 ? 6 : -6) * spdMult;
                            p.roamTimer = 100;
                        } else if (Math.abs(p.velY) < 1 || p.mode.id === 'Swing') {
                            
                            // MYTHIC HYPER-DASH ABILITY
                            if (p.isMythic && (p.mode.id === 'Cube' || p.mode.id === 'Robot') && action < 0.15) {
                                // Spawn Ghost Trail
                                let ghost = document.createElement('img');
                                ghost.src = p.mode.src;
                                ghost.className = 'pet-entity ghost-trail';
                                ghost.style.width = p.size + 'px';
                                ghost.style.height = p.size + 'px';
                                ghost.style.left = p.posX + 'px';
                                ghost.style.top = p.posY + 'px';
                                ghost.style.transform = p.el.style.transform;
                                document.body.appendChild(ghost);
                                
                                setTimeout(() => { 
                                    ghost.style.opacity = '0'; 
                                    setTimeout(() => ghost.remove(), 500); 
                                }, 50);

                                // Teleport Forward
                                p.posX += p.isFacingRight ? 200 : -200;
                                p.roamTimer = 30;
                            } 
                            // NORMAL GROUND MOVEMENT
                            else if (action < 0.3) { p.velX = -3 * spdMult; p.isFacingRight = false; p.roamTimer = Math.random() * 100 + 50; }
                            else if (action < 0.6) { p.velX = 3 * spdMult; p.isFacingRight = true; p.roamTimer = Math.random() * 100 + 50; }
                            else if (action < 0.8) {
                                if (p.mode.id === 'Cube' || p.mode.id === 'Ball') p.velY = p.spiderFlipped ? 15 : -15;
                                else if (p.mode.id === 'Robot') p.velY = p.spiderFlipped ? 20 : -20; 
                                else if (p.mode.id === 'UFO') p.velY = p.spiderFlipped ? 10 : -10;
                                else if (p.mode.id === 'Spider' || p.mode.id === 'Swing') p.spiderFlipped = !p.spiderFlipped; 
                                p.roamTimer = 40;
                            } else { p.velX = 0; p.roamTimer = Math.random() * 100 + 50; }
                        } else if (p.mode.id === 'UFO' && action < 0.05) {
                            p.velY = p.spiderFlipped ? 10 : -10;
                        }
                    }
                }

                // Render Graphics
                if (p.velX > 0 && !p.isDragging && !isLaserMode && (!teaItem || p.isMythic)) p.isFacingRight = true;
                if (p.velX < 0 && !p.isDragging && !isLaserMode && (!teaItem || p.isMythic)) p.isFacingRight = false;

                p.el.style.left = p.posX + 'px';
                p.el.style.top = p.posY + 'px';
                p.badge.style.left = (p.posX - 10) + 'px';
                p.badge.style.top = (p.posY - 35) + 'px';
                p.bubble.style.left = (p.posX - (75 - p.size/2)) + 'px'; // Centered above pet
                p.bubble.style.top = (p.posY - 50) + 'px';

                let flipScale = p.isFacingRight ? 'scaleX(1)' : 'scaleX(-1)';
                let spiderScale = p.spiderFlipped ? ' scaleY(-1)' : '';
                
                if (p.mode.id === 'Ball' && Math.abs(p.velX) > 0.5 && !p.isDragging) {
                    p.rotation += p.velX * 3; 
                    p.el.style.transform = `rotate(${p.rotation}deg)`;
                } else if (p.mode.id === 'Ship' || p.mode.id === 'Jetpack') {
                    let tilt = p.velY * 2;
                    if (!p.isFacingRight) tilt *= -1;
                    p.el.style.transform = `${flipScale} rotate(${tilt}deg)`;
                } else if (p.mode.id === 'Wave') {
                    let tilt = p.velY > 0 ? 35 : -35;
                    if (!p.isFacingRight) tilt *= -1;
                    p.el.style.transform = `${flipScale} rotate(${tilt}deg)`;
                } else {
                    p.el.style.transform = flipScale + spiderScale;
                }
            });

            requestAnimationFrame(engineLoop);
        }

        spawnPet();
        engineLoop();
    </script>
    <script src="js/context-menu.js"></script>
    <script src="js/core.js"></script>
    <script src="/js/emoji-replacer.js"></script>
</body>
</html>
