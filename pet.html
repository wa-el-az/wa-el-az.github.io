<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael — Desktop Pet</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            padding: 80px 5vw; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
            user-select: none;
        }
        
        .header-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(14px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            text-align: center;
            max-width: 750px;
            position: relative;
            z-index: 10;
        }

        .header-card h1 { margin: 0 0 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .header-card p { color: var(--text-muted); line-height: 1.5; margin: 0 0 25px; }

        .controls-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
            align-items: center;
        }

        .action-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px 20px; border-radius: 12px; font-weight: bold; font-size: 14px;
            cursor: pointer; border: none; transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            font-family: inherit;
        }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        .action-btn:active { transform: scale(0.95); }

        .btn-spawn { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-tea { background: #4ade80; color: #0b0b0b; }
        .btn-laser { background: #34495e; color: #fff; }
        .btn-laser.active { background: #e74c3c; box-shadow: 0 0 15px rgba(231, 76, 60, 0.4); }

        /* --- TOOLBOX EXPANSION MENU --- */
        .toolbox-wrapper { position: relative; display: inline-block; }
        .btn-more { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); }
        .btn-more.active { background: #fff; color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.4); }
        
        .toolbox-menu {
            position: absolute; top: calc(100% + 12px); left: 50%; transform: translateX(-50%) translateY(-10px);
            background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 16px;
            padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); width: max-content; z-index: 100;
        }
        .toolbox-menu.active { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
        
        .toolbox-item {
            display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 18px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: #fff; font-size: 13px; font-weight: bold;
            cursor: pointer; transition: 0.2s; font-family: inherit; width: 100%;
        }
        .toolbox-item:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        .toolbox-item:active { transform: scale(0.95); }
        
        /* Active States for Toolbox Items */
        .toolbox-item.tag-active { background: rgba(230, 126, 34, 0.2); border-color: #e67e22; color: #e67e22; }
        .toolbox-item i { width: 18px; height: 18px; }

        /* --- TRASH BIN --- */
        #trashBin {
            position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px;
            background: rgba(0, 0, 0, 0.6); border: 2px solid rgba(255, 255, 255, 0.15); border-radius: 18px;
            display: flex; align-items: center; justify-content: center; color: #fff;
            cursor: pointer; z-index: 9990; backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        #trashBin:hover {
            background: rgba(231, 76, 60, 0.2); border-color: #e74c3c; color: #e74c3c; transform: scale(1.1) rotate(-5deg);
        }
        #trashBin svg { width: 32px; height: 32px; }
        .magnet-active {
            background: rgba(231, 76, 60, 0.8) !important; border-color: #fff !important; color: #fff !important;
            transform: scale(1.2) !important; box-shadow: 0 0 30px rgba(231, 76, 60, 0.6) !important;
        }

        /* --- THE PET CSS --- */
        .pet-entity {
            position: fixed; object-fit: contain; z-index: 9999; cursor: grab;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); transition: transform 0.15s; 
        }
        .pet-entity:active { cursor: grabbing; }
        .ghost-trail { opacity: 0.5; pointer-events: none; transition: opacity 0.5s linear; z-index: 9998; }

        .pet-it { filter: drop-shadow(0 0 25px #ff0000) drop-shadow(0 0 10px #ff0000) brightness(1.2) !important; }

        @keyframes trueRGB {
            0% { filter: hue-rotate(0deg) drop-shadow(0 0 20px #ff0000); }
            33% { filter: hue-rotate(120deg) drop-shadow(0 0 20px #00ff00); }
            66% { filter: hue-rotate(240deg) drop-shadow(0 0 20px #0000ff); }
            100% { filter: hue-rotate(360deg) drop-shadow(0 0 20px #ff0000); }
        }
        .sugar-rush { animation: trueRGB 1.5s linear infinite !important; }

        @keyframes morphFlash {
            0% { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)) brightness(1) saturate(1); transform: scale(1) rotate(0deg); }
            50% { filter: drop-shadow(0 0 40px #4ade80) brightness(2) saturate(3); transform: scale(0.3) rotate(180deg); }
            100% { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)) brightness(1) saturate(1); transform: scale(1) rotate(360deg); }
        }
        .morphing { animation: morphFlash 0.6s cubic-bezier(0.25, 1, 0.5, 1) !important; }

        @keyframes morphFlashMythic {
            0% { filter: drop-shadow(0 0 20px #ff0000); transform: scale(1) rotate(0deg); }
            50% { filter: drop-shadow(0 0 60px #ffd700) brightness(2) saturate(3); transform: scale(0.3) rotate(180deg); }
            100% { filter: drop-shadow(0 0 20px #ff0000); transform: scale(1) rotate(360deg); }
        }
        .morphing-mythic { animation: morphFlashMythic 0.6s cubic-bezier(0.25, 1, 0.5, 1) !important; }
        
        .mode-badge {
            position: fixed; background: rgba(0,0,0,0.6); color: #4ade80; padding: 4px 10px;
            border-radius: 99px; font-size: 12px; font-weight: bold; pointer-events: none; z-index: 10000;
            opacity: 0; transition: opacity 0.3s; border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .speech-bubble {
            position: fixed; background: #fff; color: #111; padding: 8px 12px; border-radius: 12px;
            font-size: 13px; font-weight: bold; pointer-events: none; z-index: 10001; opacity: 0;
            transition: opacity 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.3); max-width: 180px; text-align: center;
        }
        .speech-bubble::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            border-width: 6px 6px 0; border-style: solid; border-color: #fff transparent transparent transparent;
        }

        .speech-bubble-mythic {
            background: #000; color: #4ade80; box-shadow: 0 10px 30px rgba(74, 222, 128, 0.4); border: 1px solid #4ade80;
        }
        .speech-bubble-mythic::after { border-color: #000 transparent transparent transparent; }

        .tea-drop, .dropped-coin, .hazard-spike { position: fixed; z-index: 9998; pointer-events: none; }
        .tea-drop { font-size: 36px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
        .dropped-coin { width: 30px; height: 30px; filter: drop-shadow(0 5px 10px rgba(255,215,0,0.5)); }
        .hazard-spike { width: 45px; height: 45px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.6)); }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="index" style="transition: none;"><i data-lucide="home"></i> Home</a>

    <div class="header-card" id="solid-box">
        <h1><i data-lucide="bot"></i> Desktop Pet</h1>
        <p>Spawn pets, drop tea, and keep spawning to find the rare Mythic RGB Pet! These pets interact, chat, and even evolve if they find the magic stone coin dropped by a Mythic pet.</p>
        
        <div class="controls-row">
            <button class="action-btn btn-spawn" onclick="spawnPet()"><i data-lucide="copy-plus"></i> Spawn Pet</button>
            <button class="action-btn btn-tea" onclick="dropTea()"><i data-lucide="coffee"></i> Drop Tea</button>
            <button class="action-btn btn-laser" id="laserToggle" onclick="toggleLaser()"><i data-lucide="mouse-pointer-2"></i> Laser: OFF</button>
            
            <div class="toolbox-wrapper">
                <button class="action-btn btn-more" id="toolboxTrigger" onclick="toggleToolbox(event)">
                    <i data-lucide="layout-grid"></i> Toolbox
                </button>
                <div class="toolbox-menu" id="toolboxMenu">
                    <button class="toolbox-item" onclick="dropSpike()"><i data-lucide="triangle-alert" style="color: #e74c3c;"></i> Drop Spike</button>
                    <button class="toolbox-item" id="tagToggleBtn" onclick="toggleTag()"><i data-lucide="gamepad-2"></i> Play Tag</button>
                    </div>
            </div>
        </div>
    </div>

    <div id="trashBin" onclick="activateMagnet()">
        <i data-lucide="trash-2"></i>
    </div>

    <script src="js/config.js"></script>
    <script>
        lucide.createIcons();

        const backBtn = document.getElementById('dynamicBackBtn');
        if (document.referrer.toLowerCase().includes('shortcuts')) {
            backBtn.href = 'shortcuts';
            backBtn.innerHTML = '<i data-lucide="zap"></i> Shortcuts';
            lucide.createIcons();
        }

        // ==========================================
        // TOOLBOX UI LOGIC
        // ==========================================
        const toolboxMenu = document.getElementById('toolboxMenu');
        const toolboxTrigger = document.getElementById('toolboxTrigger');

        function toggleToolbox(event) {
            event.stopPropagation();
            toolboxMenu.classList.toggle('active');
            toolboxTrigger.classList.toggle('active');
        }

        // Close toolbox if clicking outside
        document.addEventListener('click', (event) => {
            if (!toolboxMenu.contains(event.target) && event.target !== toolboxTrigger) {
                toolboxMenu.classList.remove('active');
                toolboxTrigger.classList.remove('active');
            }
        });

        // ==========================================
        // DESKTOP PET ENGINE
        // ==========================================
        const solidBox = document.getElementById('solid-box');
        const laserBtn = document.getElementById('laserToggle');
        const tagBtn = document.getElementById('tagToggleBtn');
        const trashBin = document.getElementById('trashBin');
        
        const GAMEMODES = [
            { id: 'Cube', src: 'assets/gd/cube_274.png' }, { id: 'Ship', src: 'assets/gd/ship_48.png' },
            { id: 'Ball', src: 'assets/gd/ball_91.png' }, { id: 'UFO', src: 'assets/gd/ufo_79.png' },
            { id: 'Spider', src: 'assets/gd/spider_49.png' }, { id: 'Wave', src: 'assets/gd/wave_46.png' },
            { id: 'Robot', src: 'assets/gd/robot_35.png' }, { id: 'Swing', src: 'assets/gd/swing_17.png' },
            { id: 'Jetpack', src: 'assets/gd/jetpack_3.png' }
        ];

        const DIALOGUE = [
            "WaelOS is running so smoothly...", "Have you redeemed any secret codes yet?", 
            "Where is the Windows Vault?", "Did you debloat Windows 11 today?",
            "My ThinkPad needs more RAM...", "Rectify11 makes everything look better.",
            "Error 404: Tea not found.", "Let me check the hardware specs.",
            "I think there's a bug in my Python script.", "Is the glassmorphism blur set to 20px?",
            "I wonder if I can run Asphalt 8 in here...", "Look at me go!", 
            "I love exploring!", "Don't drop me!", "I just beat Stereo Madness!",
            "I'm practicing my wave spam.", "Fire in the hole!", "BloodBath is too hard...",
            "Mint tea is the absolute best. 🍵", "Guercif weather is nice today!",
            "Do we have Math or SVT next?", "A proud Moroccan pet! 🇲🇦"
        ];

        const MYTHIC_DIALOGUE = [
            "Accessing Root Directory...", "I know about the Windows Vault.",
            "Bypassing terminal security protocols...", "I am self-aware.",
            "Quantum Wrap initialized.", "Anti-Gravity Aura active.",
            "System overload imminent.", "Where is the Mint Tea source code?",
            "Executing Hyper-Dash.", "You cannot contain me."
        ];

        let pets = [];
        let coinsList = [];
        let spikesList = [];
        let teaItem = null;
        let thiefPet = null;
        let itPet = null;
        let isLaserMode = false;
        let isMagnetizing = false;
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX; mouseY = e.clientY;
        });

        function toggleLaser() {
            isLaserMode = !isLaserMode;
            if (isLaserMode) {
                laserBtn.innerHTML = `<i data-lucide="mouse-pointer-2"></i> Laser: ON`;
                laserBtn.classList.add('active');
            } else {
                laserBtn.innerHTML = `<i data-lucide="mouse-pointer-2"></i> Laser: OFF`;
                laserBtn.classList.remove('active');
            }
            lucide.createIcons();
        }

        function toggleTag() {
            if (itPet) {
                itPet.isIt = false;
                itPet.el.classList.remove('pet-it');
                itPet = null;
                tagBtn.innerHTML = `<i data-lucide="gamepad-2"></i> Play Tag`;
                tagBtn.classList.remove('tag-active');
            } else {
                let normalPets = pets.filter(p => !p.isDeleted && !p.isMythic);
                if (normalPets.length < 2) {
                    alert("You need at least 2 normal pets to play a Game of Tag!");
                    return;
                }
                itPet = normalPets[Math.floor(Math.random() * normalPets.length)];
                itPet.isIt = true;
                itPet.tagCooldown = 60; 
                itPet.el.classList.add('pet-it');
                
                itPet.bubble.innerText = "I'm IT!";
                itPet.bubble.style.opacity = '1';
                setTimeout(() => itPet.bubble.style.opacity = '0', 3000);
                
                tagBtn.innerHTML = `<i data-lucide="gamepad-2"></i> Stop Tag`;
                tagBtn.classList.add('tag-active');
            }
            lucide.createIcons();
        }

        function dropTea() {
            if (teaItem) return; 
            teaItem = {
                el: document.createElement('div'),
                posX: Math.random() * (window.innerWidth - 50), posY: -50, velY: 0
            };
            teaItem.el.className = 'tea-drop';
            teaItem.el.innerText = '🍵';
            document.body.appendChild(teaItem.el);
        }

        function dropSpike() {
            let sEl = document.createElement('img');
            sEl.src = 'https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/2f961ba4-4243-4889-928c-e7f4c2d38614/dgqdoe4-e953f151-5935-4e8c-a24c-7b29b8a09b8a.png?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7ImhlaWdodCI6Ijw9Mjg0IiwicGF0aCI6Ii9mLzJmOTYxYmE0LTQyNDMtNDg4OS05MjhjLWU3ZjRjMmQzODYxNC9kZ3Fkb2U0LWU5NTNmMTUxLTU5MzUtNGU4Yy1hMjRjLTdiMjliOGEwOWI4YS5wbmciLCJ3aWR0aCI6Ijw9Mjg1In1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmltYWdlLm9wZXJhdGlvbnMiXX0.hFVgcwneWURMJiDuOU5yiLnaab9tIPEXtIde37dHTLQ';
            sEl.className = 'hazard-spike';
            document.body.appendChild(sEl);
            spikesList.push({
                el: sEl,
                posX: Math.random() * (window.innerWidth - 45),
                posY: -50,
                velX: 0, velY: 0, size: 45
            });
            toolboxMenu.classList.remove('active'); // Auto-close toolbox on action
            toolboxTrigger.classList.remove('active');
        }

        function activateMagnet() {
            if (pets.length === 0 && spikesList.length === 0) return;
            isMagnetizing = true;
            trashBin.classList.add('magnet-active');
        }

        function spawnPet() {
            let isRgbCheatOn = localStorage.getItem('waelos_cheat_rgb_multiplier') === 'true';
            let isMythic = isRgbCheatOn || Math.random() < 0.01;

            const petObj = {
                el: document.createElement('img'), badge: document.createElement('div'), bubble: document.createElement('div'),
                mode: GAMEMODES[Math.floor(Math.random() * GAMEMODES.length)],
                posX: window.innerWidth / 2 + (Math.random() * 100 - 50), posY: 100, velX: 0, velY: 0,
                isFacingRight: true, roamTimer: 60, transformTimer: Math.random() * 3600 + 600, speechTimer: Math.random() * 5400 + 1800,
                spiderFlipped: false, rotation: 0, sugarRush: 0, isDragging: false,
                offsetX: 0, offsetY: 0, lastX: 0, lastY: 0, isMythic: isMythic, size: isMythic ? 65 : 50, 
                isDeleted: false, isIt: false, tagCooldown: 0
            };

            petObj.el.className = 'pet-entity';
            if (isMythic) petObj.el.classList.add('sugar-rush');
            
            petObj.el.src = petObj.mode.src;
            petObj.el.style.width = petObj.size + 'px'; petObj.el.style.height = petObj.size + 'px';
            petObj.el.draggable = false;
            
            petObj.badge.className = 'mode-badge'; petObj.badge.innerText = `${petObj.mode.id} Mode`;
            petObj.bubble.className = isMythic ? 'speech-bubble speech-bubble-mythic' : 'speech-bubble';

            document.body.appendChild(petObj.el); document.body.appendChild(petObj.badge); document.body.appendChild(petObj.bubble);

            petObj.el.addEventListener('mousedown', (e) => {
                if (isMagnetizing) return;
                petObj.isDragging = true;
                petObj.offsetX = e.clientX - petObj.posX; petObj.offsetY = e.clientY - petObj.posY;
                petObj.lastX = e.clientX; petObj.lastY = e.clientY;
                petObj.velX = 0; petObj.velY = 0;
                petObj.el.style.transition = 'none'; 

                if (thiefPet === petObj) {
                    thiefPet = null;
                    backBtn.style.position = 'fixed';
                    backBtn.style.top = '24px';
                    backBtn.style.right = '24px';
                    backBtn.style.left = 'auto';
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (petObj.isDragging) {
                    petObj.velX = e.clientX - petObj.lastX; petObj.velY = e.clientY - petObj.lastY;
                    petObj.lastX = e.clientX; petObj.lastY = e.clientY;
                    petObj.posX = e.clientX - petObj.offsetX; petObj.posY = e.clientY - petObj.offsetY;
                    if (petObj.velX > 0) petObj.isFacingRight = true;
                    if (petObj.velX < 0) petObj.isFacingRight = false;
                }
            });

            window.addEventListener('mouseup', () => {
                if (petObj.isDragging) {
                    petObj.isDragging = false;
                    petObj.el.style.transition = 'transform 0.15s'; 
                    petObj.roamTimer = 60; 
                    if (petObj.mode.id === 'Spider' || petObj.mode.id === 'Swing') petObj.spiderFlipped = false;

                    let tbRect = trashBin.getBoundingClientRect();
                    let pCenterX = petObj.posX + petObj.size / 2;
                    let pCenterY = petObj.posY + petObj.size / 2;
                    
                    if (pCenterX > tbRect.left - 30 && pCenterX < tbRect.right + 30 &&
                        pCenterY > tbRect.top - 30 && pCenterY < tbRect.bottom + 30) {
                        
                        petObj.el.style.transition = 'all 0.4s ease-in'; petObj.el.style.transform = 'scale(0) rotate(360deg)';
                        petObj.el.style.opacity = '0'; petObj.badge.style.opacity = '0'; petObj.bubble.style.opacity = '0';
                        setTimeout(() => { petObj.el.remove(); petObj.badge.remove(); petObj.bubble.remove(); }, 400);
                        
                        if (petObj === itPet) toggleTag(); 
                        petObj.isDeleted = true;
                        trashBin.style.transform = 'scale(1.2)';
                        setTimeout(() => trashBin.style.transform = '', 200);
                    }
                }
            });

            pets.push(petObj);
            
            if (isMythic) {
                petObj.bubble.innerText = "SYSTEM OVERRIDE."; petObj.bubble.style.opacity = '1';
                setTimeout(() => petObj.bubble.style.opacity = '0', 3000);
            }
        }

        function morphPet(p) {
            let newMode;
            do { newMode = GAMEMODES[Math.floor(Math.random() * GAMEMODES.length)]; } while (newMode.id === p.mode.id);

            p.el.classList.add(p.isMythic ? 'morphing-mythic' : 'morphing');
            p.spiderFlipped = false; p.rotation = 0; 
            
            setTimeout(() => {
                if(p.isDeleted) return;
                p.el.src = newMode.src; p.mode = newMode;
                p.badge.innerText = `${p.mode.id} Mode`; p.badge.style.opacity = '1';
                setTimeout(() => p.badge.style.opacity = '0', 2000);
            }, 300);

            setTimeout(() => { 
                if(p.isDeleted) return;
                p.el.classList.remove('morphing'); p.el.classList.remove('morphing-mythic'); 
            }, 600);
        }

        // ==========================================
        // DYNAMIC PHYSICS ENGINE (DELTA-TIME)
        // ==========================================
        let lastTime = performance.now();

        function engineLoop(currentTime) {
            if (!currentTime) currentTime = performance.now();
            let dt = (currentTime - lastTime) / (1000 / 60);
            lastTime = currentTime;
            if (dt > 2) dt = 2; 
            if (dt < 0.01) dt = 0.01;

            const ground = window.innerHeight; const rightWall = window.innerWidth;
            const boxRect = solidBox.getBoundingClientRect();
            const tbRect = trashBin.getBoundingClientRect();
            const tbX = tbRect.left + tbRect.width / 2; const tbY = tbRect.top + tbRect.height / 2;
            
            for (let i = spikesList.length - 1; i >= 0; i--) {
                let s = spikesList[i];
                if (isMagnetizing) {
                    let dx = tbX - (s.posX + s.size/2); let dy = tbY - (s.posY + s.size/2); let dist = Math.hypot(dx, dy);
                    s.velX += (dx / dist) * 2 * dt; s.velY += (dy / dist) * 2 * dt;
                    s.velX *= Math.pow(0.95, dt); s.velY *= Math.pow(0.95, dt);
                    s.posX += s.velX * dt; s.posY += s.velY * dt;
                    if (dist < 40) { s.el.remove(); spikesList.splice(i, 1); continue; }
                } else {
                    s.velY += 0.8 * dt; s.posY += s.velY * dt;
                    if (s.posY > ground - s.size) { s.posY = ground - s.size; s.velY = 0; s.velX = 0; }
                    else if (s.velX) { s.posX += s.velX * dt; }
                }
                s.el.style.left = s.posX + 'px'; s.el.style.top = s.posY + 'px';
            }

            for (let i = coinsList.length - 1; i >= 0; i--) {
                let c = coinsList[i];
                c.velY += 0.8 * dt; c.posY += c.velY * dt;
                if (c.posY > ground - 30) { c.posY = ground - 30; c.velY = 0; }
                c.el.style.left = c.posX + 'px'; c.el.style.top = c.posY + 'px';

                let collected = false;
                for (let p of pets) {
                    if (!p.isDeleted && !p.isMythic && !p.isDragging) {
                        let dx = (p.posX + p.size/2) - (c.posX + 15); let dy = (p.posY + p.size/2) - (c.posY + 15);
                        if (Math.hypot(dx, dy) < (p.size/2 + 15)) {
                            if (p === itPet) toggleTag(); 
                            collected = true; p.isMythic = true; p.size = 65;
                            p.el.style.width = '65px'; p.el.style.height = '65px'; p.el.classList.add('sugar-rush');
                            p.bubble.className = 'speech-bubble speech-bubble-mythic';
                            p.bubble.innerText = "POWER SURGE!"; p.bubble.style.opacity = '1';
                            setTimeout(() => p.bubble.style.opacity = '0', 3000);
                            break;
                        }
                    }
                }
                if (collected) { c.el.remove(); coinsList.splice(i, 1); }
            }

            if (teaItem) {
                let mythicPet = pets.find(m => m.isMythic && !m.isDeleted);
                if (mythicPet && !isLaserMode && !isMagnetizing) {
                    let dx = (mythicPet.posX + mythicPet.size/2) - teaItem.posX; let dy = (mythicPet.posY + mythicPet.size/2) - teaItem.posY;
                    let dist = Math.hypot(dx, dy);
                    if (dist > 30) { teaItem.posX += (dx / dist) * 12 * dt; teaItem.posY += (dy / dist) * 12 * dt; } 
                    else {
                        teaItem.el.remove(); teaItem = null;
                        mythicPet.bubble.innerText = "DATA CONSUMED."; mythicPet.bubble.style.opacity = '1';
                        setTimeout(() => mythicPet.bubble.style.opacity = '0', 2000);
                    }
                } else {
                    teaItem.velY += 0.8 * dt; teaItem.posY += teaItem.velY * dt;
                    if (teaItem.posY > ground - 40) { teaItem.posY = ground - 40; teaItem.velY = 0; }
                }
                if (teaItem) { teaItem.el.style.left = teaItem.posX + 'px'; teaItem.el.style.top = teaItem.posY + 'px'; }
            }

            for (let i = 0; i < pets.length; i++) {
                for (let j = i + 1; j < pets.length; j++) {
                    let p1 = pets[i]; let p2 = pets[j];
                    if (p1.isDragging || p2.isDragging || isMagnetizing || p1.isDeleted || p2.isDeleted) continue;

                    let dx = (p1.posX + p1.size/2) - (p2.posX + p2.size/2); let dy = (p1.posY + p1.size/2) - (p2.posY + p2.size/2);
                    let dist = Math.hypot(dx, dy); let minDist = (p1.size + p2.size) / 2;

                    if (dist < minDist) {
                        let angle = Math.atan2(dy, dx); let pushForce = 2; 
                        p1.velX += Math.cos(angle) * pushForce; p2.velX -= Math.cos(angle) * pushForce;

                        if (itPet) {
                            if (p1.isIt && !p2.isIt && !p2.isMythic && p1.tagCooldown <= 0 && p2.tagCooldown <= 0) {
                                p1.isIt = false; p1.el.classList.remove('pet-it'); p1.tagCooldown = 60;
                                p2.isIt = true; p2.el.classList.add('pet-it'); p2.tagCooldown = 60; itPet = p2;
                                p2.bubble.innerText = "Tag! You're It!"; p2.bubble.style.opacity = '1';
                                setTimeout(() => p2.bubble.style.opacity = '0', 2000);
                            } else if (p2.isIt && !p1.isIt && !p1.isMythic && p2.tagCooldown <= 0 && p1.tagCooldown <= 0) {
                                p2.isIt = false; p2.el.classList.remove('pet-it'); p2.tagCooldown = 60;
                                p1.isIt = true; p1.el.classList.add('pet-it'); p1.tagCooldown = 60; itPet = p1;
                                p1.bubble.innerText = "Tag! You're It!"; p1.bubble.style.opacity = '1';
                                setTimeout(() => p1.bubble.style.opacity = '0', 2000);
                            }
                        }

                        if (p1.isMythic && !p2.isMythic) {
                            p2.velY = -15; p1.bubble.innerText = "Move."; p1.bubble.style.opacity = '1';
                            setTimeout(() => p1.bubble.style.opacity = '0', 2000);
                        } else if (p2.isMythic && !p1.isMythic) {
                            p1.velY = -15; p2.bubble.innerText = "Move."; p2.bubble.style.opacity = '1';
                            setTimeout(() => p2.bubble.style.opacity = '0', 2000);
                        } 
                        else if (Math.random() < (0.05 * dt) && p1.speechTimer > 200 && p2.speechTimer > 200 && !p1.isIt && !p2.isIt) {
                            p1.bubble.innerText = "Watch out!"; p2.bubble.innerText = "Oops!";
                            p1.bubble.style.opacity = '1'; p2.bubble.style.opacity = '1';
                            setTimeout(() => p1.bubble.style.opacity = '0', 2000); setTimeout(() => p2.bubble.style.opacity = '0', 2000);
                            p1.speechTimer = Math.random() * 1000 + 500; p2.speechTimer = Math.random() * 1000 + 500;
                        }
                    }
                }
            }

            pets.forEach(p => {
                if (p.isDeleted) return;

                let pCenterX = p.posX + (p.size / 2); let pCenterY = p.posY + (p.size / 2);
                if (p.tagCooldown > 0) p.tagCooldown -= dt;

                let isGrounded = (p.posY >= ground - p.size - 5) || (p.posY >= boxRect.top - p.size - 5 && p.posY <= boxRect.top - p.size + 5 && pCenterX > boxRect.left && pCenterX < boxRect.right);
                if (!p.isDragging && !isMagnetizing) {
                    for (let s of spikesList) {
                        let dx = s.posX - p.posX;
                        if (isGrounded && ((p.velX > 0 && dx > 0 && dx < 120) || (p.velX < 0 && dx < 0 && dx > -120))) {
                            if (Math.random() < (0.1 * dt)) { p.velY = -16; } 
                        }
                        let distHit = Math.hypot((p.posX + p.size/2) - (s.posX + s.size/2), (p.posY + p.size/2) - (s.posY + s.size/2));
                        if (distHit < (p.size/2 + s.size/2 - 10)) {
                            p.el.style.transition = 'all 0.3s ease-in'; p.el.style.transform = 'scale(0) rotate(720deg)';
                            p.el.style.filter = 'drop-shadow(0 0 30px #e74c3c)'; p.el.style.opacity = '0';
                            p.badge.style.opacity = '0'; p.bubble.style.opacity = '0';
                            setTimeout(() => { p.el.remove(); p.badge.remove(); p.bubble.remove(); }, 300);
                            if (p === itPet) toggleTag();
                            p.isDeleted = true;
                            break;
                        }
                    }
                }
                if (p.isDeleted) return;

                if (isMagnetizing && !p.isDragging) {
                    let dx = tbX - pCenterX; let dy = tbY - pCenterY; let dist = Math.hypot(dx, dy);
                    p.velX += (dx / dist) * 2 * dt; p.velY += (dy / dist) * 2 * dt;
                    p.velX *= Math.pow(0.95, dt); p.velY *= Math.pow(0.95, dt); 
                    p.posX += p.velX * dt; p.posY += p.velY * dt;

                    if (dist < 40) {
                        p.el.style.transition = 'all 0.3s ease-in'; p.el.style.transform = 'scale(0) rotate(720deg)';
                        p.el.style.opacity = '0'; p.badge.style.opacity = '0'; p.bubble.style.opacity = '0';
                        setTimeout(() => { p.el.remove(); p.badge.remove(); p.bubble.remove(); }, 300);
                        if (p === itPet) toggleTag();
                        p.isDeleted = true;
                    }
                } 
                else if (!p.isDragging) {
                    let spdMult = (p.sugarRush > 0 || p.isMythic) ? 2 : 1;
                    
                    if (p.sugarRush > 0) p.sugarRush -= dt;
                    if (p.sugarRush > 0 && !p.isMythic) p.el.classList.add('sugar-rush');
                    else if (!p.isMythic) p.el.classList.remove('sugar-rush');

                    if (p.isMythic && Math.random() < (0.0002 * dt)) {
                        let cEl = document.createElement('img');
                        cEl.src = 'https://static.wikia.nocookie.net/geometry-dash-fan-ideas/images/4/4d/Stone_coin.png';
                        cEl.className = 'dropped-coin'; document.body.appendChild(cEl);
                        coinsList.push({ el: cEl, posX: p.posX + p.size/2 - 15, posY: p.posY, velY: -6 });
                    }

                    let isNearMythic = !p.isMythic && pets.some(m => m.isMythic && !m.isDeleted && Math.hypot(m.posX - p.posX, m.posY - p.posY) < 150);
                    let activeGravity = 0.8;
                    if (p.mode.id === 'Ship' || p.mode.id === 'Jetpack' || p.mode.id === 'Wave') activeGravity = 0; 
                    if ((p.mode.id === 'Spider' || p.mode.id === 'Swing') && p.spiderFlipped) activeGravity = -0.8; 
                    if (isNearMythic) activeGravity = -0.5;

                    p.velY += activeGravity * dt; let prevY = p.posY;
                    p.posX += p.velX * dt; p.posY += p.velY * dt;

                    if (pCenterX > boxRect.left && pCenterX < boxRect.right && !isNearMythic) {
                        if (p.velY >= 0 && prevY + p.size <= boxRect.top + 15 && p.posY + p.size >= boxRect.top) {
                            p.posY = boxRect.top - p.size;
                            if (p.mode.id === 'Wave') p.velY *= -1; else { p.velY *= -0.4; p.velX *= Math.pow(0.8, dt); }
                        }
                        if (p.velY <= 0 && prevY >= boxRect.bottom - 15 && p.posY <= boxRect.bottom) {
                            p.posY = boxRect.bottom;
                            if (p.mode.id === 'Wave') p.velY *= -1; else { p.velY *= -0.4; p.velX *= Math.pow(0.8, dt); }
                        }
                    }

                    if (p.isMythic) {
                        if (p.posX < -p.size) p.posX = rightWall;
                        if (p.posX > rightWall) p.posX = -p.size;
                    } else {
                        if (p.posX < 0) { p.posX = 0; p.velX *= -1; if (p.mode.id === 'Ball') p.velY = -12; }
                        if (p.posX > rightWall - p.size) { p.posX = rightWall - p.size; p.velX *= -1; if (p.mode.id === 'Ball') p.velY = -12; }
                    }

                    if (p.posY > ground - p.size) {
                        p.posY = ground - p.size; 
                        if (p.mode.id === 'Wave') p.velY *= -1; else { p.velY *= -0.4; if (p.mode.id !== 'Ship' && p.mode.id !== 'Jetpack') p.velX *= Math.pow(0.8, dt); }
                        if (Math.abs(p.velY) < 1) p.velY = 0; 
                    }
                    if (p.posY < 0) {
                        p.posY = 0; 
                        if (p.mode.id === 'Wave') p.velY *= -1; else { p.velY *= -0.4; if (p.mode.id !== 'Ship' && p.mode.id !== 'Jetpack') p.velX *= Math.pow(0.8, dt); }
                        if (Math.abs(p.velY) < 1) p.velY = 0; 
                    }

                    if (!thiefPet && !isLaserMode && Math.random() < (0.01 * dt) && !p.isMythic) {
                        let btnRect = backBtn.getBoundingClientRect();
                        if (Math.hypot(p.posX - btnRect.left, p.posY - btnRect.top) < 150) thiefPet = p;
                    }
                    if (thiefPet === p) {
                        backBtn.style.position = 'fixed'; backBtn.style.left = (p.posX + 10) + 'px'; backBtn.style.top = (p.posY - 30) + 'px';
                    }

                    p.transformTimer -= dt; p.roamTimer -= dt; p.speechTimer -= dt;

                    if (p.transformTimer <= 0) { morphPet(p); p.transformTimer = Math.random() * 3600 + 600; }
                    
                    if (p.speechTimer <= 0 && !p.isIt) {
                        let dialogList = p.isMythic ? MYTHIC_DIALOGUE : DIALOGUE;
                        p.bubble.innerText = dialogList[Math.floor(Math.random() * dialogList.length)];
                        p.bubble.style.opacity = '1';
                        setTimeout(() => p.bubble.style.opacity = '0', 3000);
                        p.speechTimer = Math.random() * 5400 + 1800; 
                    }

                    if (isLaserMode) {
                        let dx = mouseX - pCenterX; let dy = mouseY - pCenterY; let dist = Math.hypot(dx, dy);
                        if (dist > 20) {
                            p.velX += (dx / dist) * 0.5 * spdMult * dt;
                            if (p.mode.id === 'Ship' || p.mode.id === 'Jetpack') p.velY += (dy / dist) * 0.5 * spdMult * dt;
                            else if (p.posY >= ground - p.size || p.posY <= 0 || (p.posY === boxRect.top - p.size) || p.posY === boxRect.bottom) {
                                if (dy < -50 && Math.random() < (0.1 * dt)) p.velY = p.spiderFlipped ? 15 : -15; 
                            }
                        }
                    } else if (teaItem && !p.isMythic) {
                        let dx = teaItem.posX - pCenterX;
                        if (Math.abs(dx) > 10) p.velX += (dx > 0 ? 0.3 : -0.3) * spdMult * dt;
                        if (Math.hypot(dx, teaItem.posY - pCenterY) < 50) {
                            teaItem.el.remove(); teaItem = null; p.sugarRush = 600; 
                            p.bubble.innerText = "YUM!"; p.bubble.style.opacity = '1';
                            setTimeout(() => p.bubble.style.opacity = '0', 2000);
                        }
                    } else if (itPet && !p.isMythic && p.isIt) {
                        let closest = null; let minD = Infinity;
                        pets.forEach(o => {
                            if (!o.isDeleted && !o.isMythic && !o.isIt) {
                                let d = Math.hypot(p.posX - o.posX, p.posY - o.posY);
                                if (d < minD) { minD = d; closest = o; }
                            }
                        });
                        if (closest) {
                            let dx = closest.posX - p.posX;
                            p.velX += (dx > 0 ? 0.3 : -0.3) * spdMult * dt;
                            if (closest.posY < p.posY - 40 && p.posY >= ground - p.size - 5 && Math.random() < (0.05 * dt)) {
                                p.velY = p.spiderFlipped ? 15 : -15;
                            }
                        }
                    } else if (itPet && !p.isMythic && !p.isIt && Math.hypot(p.posX - itPet.posX, p.posY - itPet.posY) < 250) {
                        let dx = p.posX - itPet.posX;
                        p.velX += (dx > 0 ? 0.4 : -0.4) * spdMult * dt;
                        if (Math.random() < (0.02 * dt) && p.posY >= ground - p.size - 5) {
                            p.velY = p.spiderFlipped ? 15 : -15;
                        }
                    } else if (p.roamTimer <= 0) {
                        const action = Math.random();
                        if (p.mode.id === 'Ship' || p.mode.id === 'Jetpack') {
                            p.velX = (Math.random() - 0.5) * 12 * spdMult; p.velY = (Math.random() - 0.5) * 12 * spdMult; p.roamTimer = 60;
                        } else if (p.mode.id === 'Wave') {
                            p.velX = (Math.random() > 0.5 ? 6 : -6) * spdMult; p.velY = (Math.random() > 0.5 ? 6 : -6) * spdMult; p.roamTimer = 100;
                        } else if (Math.abs(p.velY) < 1 || p.mode.id === 'Swing') {
                            if (p.isMythic && (p.mode.id === 'Cube' || p.mode.id === 'Robot') && action < 0.15) {
                                let ghost = document.createElement('img'); ghost.src = p.mode.src; ghost.className = 'pet-entity ghost-trail';
                                ghost.style.width = p.size + 'px'; ghost.style.height = p.size + 'px';
                                ghost.style.left = p.posX + 'px'; ghost.style.top = p.posY + 'px'; ghost.style.transform = p.el.style.transform;
                                document.body.appendChild(ghost);
                                setTimeout(() => { ghost.style.opacity = '0'; setTimeout(() => ghost.remove(), 500); }, 50);
                                p.posX += p.isFacingRight ? 200 : -200; p.roamTimer = 30;
                            } 
                            else if (action < 0.3) { p.velX = -3 * spdMult; p.isFacingRight = false; p.roamTimer = Math.random() * 100 + 50; }
                            else if (action < 0.6) { p.velX = 3 * spdMult; p.isFacingRight = true; p.roamTimer = Math.random() * 100 + 50; }
                            else if (action < 0.8) {
                                if (p.mode.id === 'Cube' || p.mode.id === 'Ball') p.velY = p.spiderFlipped ? 15 : -15;
                                else if (p.mode.id === 'Robot') p.velY = p.spiderFlipped ? 20 : -20; 
                                else if (p.mode.id === 'UFO') p.velY = p.spiderFlipped ? 10 : -10;
                                else if (p.mode.id === 'Spider' || p.mode.id === 'Swing') p.spiderFlipped = !p.spiderFlipped; 
                                p.roamTimer = 40;
                            } else { p.velX = 0; p.roamTimer = Math.random() * 100 + 50; }
                        } else if (p.mode.id === 'UFO' && action < 0.05) { p.velY = p.spiderFlipped ? 10 : -10; }
                    }
                }

                if (!p.isDeleted) {
                    if (p.velX > 0 && !p.isDragging && !isLaserMode && (!teaItem || p.isMythic) && !isMagnetizing && !(itPet && p.isIt)) p.isFacingRight = true;
                    if (p.velX < 0 && !p.isDragging && !isLaserMode && (!teaItem || p.isMythic) && !isMagnetizing && !(itPet && p.isIt)) p.isFacingRight = false;

                    if (itPet && p.isIt && !p.isDragging) {
                        if (p.velX > 0) p.isFacingRight = true;
                        if (p.velX < 0) p.isFacingRight = false;
                    }

                    p.el.style.left = p.posX + 'px'; p.el.style.top = p.posY + 'px';
                    
                    if(!isMagnetizing) {
                        p.badge.style.left = (p.posX - 10) + 'px'; p.badge.style.top = (p.posY - 35) + 'px';
                        p.bubble.style.left = (p.posX - (75 - p.size/2)) + 'px'; p.bubble.style.top = (p.posY - 50) + 'px';

                        let flipScale = p.isFacingRight ? 'scaleX(1)' : 'scaleX(-1)';
                        let spiderScale = p.spiderFlipped ? ' scaleY(-1)' : '';
                        
                        if (p.mode.id === 'Ball' && Math.abs(p.velX) > 0.5 && !p.isDragging) {
                            p.rotation += p.velX * 3 * dt; p.el.style.transform = `rotate(${p.rotation}deg)`;
                        } else if (p.mode.id === 'Ship' || p.mode.id === 'Jetpack') {
                            let tilt = p.velY * 2; if (!p.isFacingRight) tilt *= -1; p.el.style.transform = `${flipScale} rotate(${tilt}deg)`;
                        } else if (p.mode.id === 'Wave') {
                            let tilt = p.velY > 0 ? 35 : -35; if (!p.isFacingRight) tilt *= -1; p.el.style.transform = `${flipScale} rotate(${tilt}deg)`;
                        } else {
                            p.el.style.transform = flipScale + spiderScale;
                        }
                    }
                }
            });

            pets = pets.filter(p => !p.isDeleted);
            if (isMagnetizing && pets.length === 0 && spikesList.length === 0) { isMagnetizing = false; trashBin.classList.remove('magnet-active'); }

            requestAnimationFrame(engineLoop);
        }

        spawnPet();
        requestAnimationFrame(engineLoop);
    </script>
    <script src="js/context-menu.js"></script>
    <script src="js/core.js"></script>
    <script src="/js/emoji-replacer.js"></script>
</body>
</html>
