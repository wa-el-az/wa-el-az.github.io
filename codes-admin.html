<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael — Codes Admin</title>
    <link rel="icon" type="image/png" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        body { padding: 60px 20px; }
        .container { position: relative; z-index: 10; max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: var(--muted); }
        .code-list { max-height: 200px; overflow-y: auto; background: rgba(0,0,0,.18); border-radius: 12px; padding: 10px; border: 1px solid rgba(255,255,255,.1); }
        .code-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,.05); }
        .code-item:last-child { border-bottom: none; }
        .bypasses-box { background: rgba(0,0,0,.3); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 15px; margin-top: 20px; }
        .bypasses-box h3 { margin: 0 0 10px; font-size: 16px; color: #4ade80; }
        .bypasses-box ul { margin: 0; padding-left: 20px; color: var(--muted); font-size: 14px; line-height: 1.6; }
        .bypasses-box li strong { color: #fff; }

        @media (max-width: 768px) { 
            .container { grid-template-columns: 1fr; margin-top: 40px; } 
        }
    </style>
</head>
<body>
    <div class="bg-left"></div>
    <div class="bg-right"></div>
    <a class="navBtn" href="admin">Back to Hub</a>

    <div class="container card">
        <div>
            <h1 style="margin-top: 0;">Add Code</h1>
            <form id="addCodeForm">
                <label>New Code</label>
                <input type="text" id="newCode" required autocomplete="off" style="text-transform: uppercase;">
                
                <label>Action Type</label>
                <select id="actionType" required>
                    <option value="redirect">Redirect to URL</option>
                    <option value="popup">Pop-up Message</option>
                </select>
                
                <div id="urlField">
                    <label>Target URL</label>
                    <input type="url" id="targetUrl" placeholder="https://...">
                </div>
                
                <div id="msgField" style="display: none;">
                    <label>Popup Message</label>
                    <input type="text" id="popupMsg" placeholder="Secret unlocked!">
                </div>
                
                <button type="submit" class="btn">Add to List</button>
            </form>

            <div style="background: rgba(0,0,0,.25); padding: 15px; border-radius: 12px; margin-top: 20px; border: 1px solid rgba(255,255,255,.1);">
                <button class="btn" id="pushBtn" style="background: #4ade80;">Push to GitHub</button>
                <p id="apiMsg" style="margin-top: 10px; font-weight: bold; font-size: 14px; text-align: center;"></p>
            </div>
        </div>

        <div>
            <h2 style="margin-top: 0;">Current Codes</h2>
            <div class="code-list" id="codeList"></div>

            <div class="bypasses-box">
                <h3>System Bypasses</h3>
                <ul>
                    <li><strong>ADMIN</strong>: Admin Hub</li>
                    <li><strong>MESSAGE</strong>: Contact Form</li>
                    <li><strong>TEA</strong>: Moroccan Tea</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        let db = {};
        let fileSha = null;

        document.getElementById('actionType').addEventListener('change', function(e) {
            const isRedirect = e.target.value === 'redirect';
            document.getElementById('urlField').style.display = isRedirect ? 'block' : 'none';
            document.getElementById('msgField').style.display = isRedirect ? 'none' : 'block';
            document.getElementById('targetUrl').required = isRedirect;
            document.getElementById('popupMsg').required = !isRedirect;
        });

        window.onload = async () => {
            if (!localStorage.getItem('gh_token')) {
                window.location.href = "admin";
                return;
            }
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/codes.json`);
                if (res.ok) {
                    const data = await res.json();
                    fileSha = data.sha;
                    db = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                }
            } catch (e) {
                // Ignore error if file is missing
            }
            updateUI();
        };

        document.getElementById('addCodeForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const code = document.getElementById('newCode').value.trim().toUpperCase();
            const type = document.getElementById('actionType').value;
            
            if (type === 'redirect') {
                db[code] = { type: type, url: document.getElementById('targetUrl').value.trim() };
            } else {
                db[code] = { type: type, message: document.getElementById('popupMsg').value.trim() };
            }

            document.getElementById('addCodeForm').reset();
            document.getElementById('actionType').dispatchEvent(new Event('change'));
            updateUI();
        });

        function deleteCode(code) {
            delete db[code];
            updateUI();
        }

        function updateUI() {
            const listDiv = document.getElementById('codeList');
            listDiv.innerHTML = '';
            
            if (Object.keys(db).length === 0) {
                listDiv.innerHTML = '<p style="text-align:center; color:#aaa;">No codes in database.</p>';
                return;
            }

            for (const [code, data] of Object.entries(db)) {
                listDiv.innerHTML += `
                    <div class="code-item">
                        <div>
                            <strong style="color:#fff;">${code}</strong><br>
                            <span style="font-size:12px; color:#aaa;">${data.type}</span>
                        </div>
                        <button class="btn-danger" onclick="deleteCode('${code}')">Delete</button>
                    </div>`;
            }
        }

        document.getElementById('pushBtn').addEventListener('click', async () => {
            const msg = document.getElementById('apiMsg');
            msg.style.color = "#fff";
            msg.innerText = "Pushing...";

            const payload = {
                message: "Updated codes",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2))))
            };
            if (fileSha) payload.sha = fileSha;

            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/codes.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${CONFIG.GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    const data = await res.json();
                    fileSha = data.content.sha;
                    msg.style.color = "#4ade80";
                    msg.innerText = "✓ Codes Updated Live!";
                } else {
                    throw new Error("API Error");
                }
            } catch (e) {
                msg.style.color = "#ff6b6b";
                msg.innerText = "✗ Failed to update.";
            }
        });
    </script>
</body>
</html>
