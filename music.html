<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael — Media Player</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        body { padding: 80px 5vw; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .player-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            text-align: center;
            position: relative;
            z-index: 10;
            animation: fadePageIn 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .record-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            border-radius: 50%;
            position: relative;
            padding: 10px;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .record-container::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 30px; height: 30px;
            background: #0b0b0b;
            border-radius: 50%;
            border: 2px solid #333;
            z-index: 5;
        }

        #track-cover {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            animation: spin 8s linear infinite;
            animation-play-state: paused;
            transition: 0.3s;
        }

        #track-cover.playing {
            animation-play-state: running;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .track-info h2 { 
            margin: 0 0 5px; 
            font-size: 24px; 
            letter-spacing: -0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-info p { 
            margin: 0 0 25px; 
            color: #4ade80; 
            font-weight: 500; 
            font-size: 14px; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
        }

        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            background: linear-gradient(to right, #fff var(--progress, 0%), rgba(255,255,255,0.1) var(--progress, 0%));
            height: 6px;
            border-radius: 99px;
            outline: none;
            padding: 0;
            margin: 0;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            transition: 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .ctrl-btn {
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 0.7;
        }
        
        .ctrl-btn:hover { opacity: 1; transform: scale(1.1); }
        .ctrl-btn svg { width: 28px; height: 28px; }

        .play-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #fff;
            color: #111;
            opacity: 1;
            box-shadow: 0 10px 20px rgba(255,255,255,0.2);
        }
        .play-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 15px 25px rgba(255,255,255,0.3);
        }
        .play-btn svg { width: 28px; height: 28px; fill: currentColor; }

        .play-icon-centered {
            transform: translateX(2px);
        }

        .navBtn { display: inline-flex; align-items: center; gap: 6px; z-index: 50; }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="index"><i data-lucide="home"></i> Home</a>

    <div class="player-card">
        <div class="record-container">
            <img id="track-cover" src="assets/morocco.png" alt="Album Cover">
        </div>
        
        <div class="track-info">
            <h2 id="track-title">Scanning System...</h2>
            <p id="track-artist">Checking for files</p>
        </div>

        <div class="progress-wrapper">
            <span id="curr-time">0:00</span>
            <input type="range" id="progress-bar" min="0" max="100" value="0" style="--progress: 0%;">
            <span id="total-time">0:00</span>
        </div>

        <div class="controls">
            <button class="ctrl-btn" id="prev-btn"><i data-lucide="skip-back"></i></button>
            <button class="ctrl-btn play-btn" id="play-btn"><i data-lucide="play" class="play-icon-centered"></i></button>
            <button class="ctrl-btn" id="next-btn"><i data-lucide="skip-forward"></i></button>
        </div>

        <audio id="audio-player"></audio>
    </div>

    <script src="js/config.js"></script>
    <script>
        let playlist = [];
        let trackIndex = 0;
        let isPlaying = false;

        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const title = document.getElementById('track-title');
        const artist = document.getElementById('track-artist');
        const cover = document.getElementById('track-cover');
        const progressBar = document.getElementById('progress-bar');
        const currTimeDisp = document.getElementById('curr-time');
        const totalTimeDisp = document.getElementById('total-time');

        async function loadPlaylist() {
            try {
                if (typeof CONFIG === 'undefined' || !CONFIG.REPO_PATH) {
                    throw new Error("Configuration not loaded.");
                }

                const response = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/music`, {
                    headers: { 'Authorization': `Bearer ${CONFIG.GITHUB_TOKEN}` }
                });

                if (!response.ok) throw new Error("Folder /music not found.");

                const files = await response.json();
                
                playlist = files
                    .filter(f => f.name.toLowerCase().endsWith('.mp3') || f.name.toLowerCase().endsWith('.m4a'))
                    .map(f => ({
                        title: f.name.replace(/\.[^/.]+$/, "").replace(/_/g, " "), // Fallback title
                        artist: "Unknown Artist", // Fallback artist
                        src: f.path, 
                        cover: "assets/morocco.png" // Fallback cover
                    }));

                if (playlist.length === 0) throw new Error("No audio files found.");

                loadTrack(0);

            } catch(e) {
                console.warn(e.message);
                playlist = [
                    {
                        title: "No Music Found",
                        artist: "Push .mp3 files to GitHub",
                        src: "",
                        cover: "assets/icon.svg"
                    }
                ];
                loadTrack(0);
                title.style.color = "#ff6b6b"; 
            }
        }

        function loadTrack(index) {
            if (playlist.length === 0) return;
            const track = playlist[index];
            audio.src = track.src;
            
            // 1. Set fallback data immediately
            title.innerText = track.title;
            artist.innerText = track.artist;
            cover.src = track.cover;
            cover.style.filter = 'none';
            cover.style.background = 'transparent';

            // 2. Extract genuine ID3 Metadata (Title, Artist, Cover Art)
            if (window.jsmediatags && track.src) {
                jsmediatags.read(track.src, {
                    onSuccess: function(tag) {
                        if (trackIndex !== index) return;

                        const tags = tag.tags;
                        
                        if (tags.title) title.innerText = tags.title;
                        if (tags.artist) artist.innerText = tags.artist;

                        if (tags.picture) {
                            try {
                                const byteArray = new Uint8Array(tags.picture.data);
                                const blob = new Blob([byteArray], { type: tags.picture.format });
                                cover.src = URL.createObjectURL(blob);
                            } catch (e) {
                                console.warn("Failed to parse cover art", e);
                            }
                        }
                    },
                    onError: function(error) {
                        console.log("No metadata found in this file.", error);
                    }
                });
            }
        }

        function playTrack() {
            if (!audio.src || audio.src.endsWith(window.location.pathname)) return;
            audio.play();
            isPlaying = true;
            playBtn.innerHTML = '<i data-lucide="pause"></i>';
            cover.classList.add('playing');
            lucide.createIcons();
        }

        function pauseTrack() {
            audio.pause();
            isPlaying = false;
            playBtn.innerHTML = '<i data-lucide="play" class="play-icon-centered"></i>';
            cover.classList.remove('playing');
            lucide.createIcons();
        }

        playBtn.addEventListener('click', () => isPlaying ? pauseTrack() : playTrack());
        
        prevBtn.addEventListener('click', () => {
            if (playlist.length === 0) return;
            trackIndex = (trackIndex - 1 + playlist.length) % playlist.length;
            loadTrack(trackIndex);
            if (isPlaying) playTrack();
        });

        nextBtn.addEventListener('click', () => {
            if (playlist.length === 0) return;
            trackIndex = (trackIndex + 1) % playlist.length;
            loadTrack(trackIndex);
            if (isPlaying) playTrack();
        });

        audio.addEventListener('ended', () => nextBtn.click());

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progressBar.value = progressPercent;
                progressBar.style.setProperty('--progress', progressPercent + '%');
                
                let currentMins = Math.floor(audio.currentTime / 60);
                let currentSecs = Math.floor(audio.currentTime % 60);
                if (currentSecs < 10) currentSecs = `0${currentSecs}`;
                currTimeDisp.innerText = `${currentMins}:${currentSecs}`;
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            let durationMins = Math.floor(audio.duration / 60);
            let durationSecs = Math.floor(audio.duration % 60);
            if (durationSecs < 10) durationSecs = `0${durationSecs}`;
            totalTimeDisp.innerText = `${durationMins}:${durationSecs}`;
        });

        progressBar.addEventListener('input', () => {
            if (audio.duration) {
                audio.currentTime = (progressBar.value / 100) * audio.duration;
                progressBar.style.setProperty('--progress', progressBar.value + '%');
            }
        });

        const backBtn = document.getElementById('dynamicBackBtn');
        if (document.referrer.toLowerCase().includes('shortcuts')) {
            backBtn.href = 'shortcuts';
            backBtn.innerHTML = '<i data-lucide="zap"></i> Shortcuts';
        }
        
        loadPlaylist().then(() => lucide.createIcons());
    </script>
    <script src="js/context-menu.js"></script>
    <script src="js/core.js"></script>
    <script src="/js/emoji-replacer.js"></script>
</body>
</html>
