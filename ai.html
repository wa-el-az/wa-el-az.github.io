<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>Wael — AI Assistant</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        body { 
            padding: 20px 5vw; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }
        
        .chat-app { 
            width: 100%; 
            max-width: 800px; 
            height: 85vh; 
            display: flex; 
            flex-direction: column; 
            padding: 0; 
            overflow: hidden;
        }

        /* App Header */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 25px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 20px;
        }
        .header-title img { width: 32px; height: 32px; filter: drop-shadow(0 0 8px rgba(74, 222, 128, 0.4)); }
        .status-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 10px #4ade80; display: inline-block; margin-right: 6px; }

        /* Chat History Area */
        .chat-history {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Message Bubbles */
        .msg-row { display: flex; width: 100%; }
        .msg-row.user { justify-content: flex-end; }
        .msg-row.ai { justify-content: flex-start; }

        .bubble {
            max-width: 75%;
            padding: 14px 20px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .user .bubble {
            background: rgba(74, 222, 128, 0.15);
            border: 1px solid rgba(74, 222, 128, 0.3);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .ai .bubble {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #f5f7fa;
            border-bottom-left-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ai-avatar-small { width: 20px; height: 20px; opacity: 0.8; }
        .ai-header { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: bold; color: #4ade80; text-transform: uppercase; letter-spacing: 1px; }

        /* Input Area */
        .chat-input-area {
            padding: 20px 25px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input-area input {
            margin-bottom: 0;
            flex: 1;
            padding: 16px 20px;
            border-radius: 99px;
            font-size: 16px;
        }

        .send-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #fff;
            color: #111;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }
        .send-btn:hover { transform: scale(1.05); background: #4ade80; box-shadow: 0 4px 20px rgba(74, 222, 128, 0.4); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #555; box-shadow: none; transform: none; }

        /* Typing Animation */
        .typing-dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #4ade80;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Markdown Formatting Inside Chat Bubbles */
        .msg-content { width: 100%; overflow-x: hidden; }
        .msg-content p { margin: 0 0 10px 0; }
        .msg-content p:last-child { margin: 0; }
        
        /* Inline Code */
        .msg-content code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13.5px;
            color: #4ade80;
        }

        /* Large Code Blocks */
        .msg-content pre {
            background: #1e1e1e !important; 
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 10px 0;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .msg-content pre code {
            background: transparent;
            padding: 0;
            color: inherit;
            font-size: 13px;
        }

        /* Lists and Links */
        .msg-content ul, .msg-content ol { margin: 5px 0 10px 20px; padding: 0; }
        .msg-content li { margin-bottom: 4px; }
        .msg-content a { color: #4ade80; text-decoration: none; }
        .msg-content a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    <a class="navBtn" id="dynamicBackBtn" href="index"><i data-lucide="arrow-left"></i> Back</a>
    
    <div class="card chat-app">
        <div class="chat-header">
            <div class="header-title">
                <img src="assets/icon.svg" alt="wAI">
                wAI
            </div>
            <div style="font-size: 13px; color: var(--text-muted);"><span class="status-dot"></span>System Online</div>
        </div>

        <div class="chat-history custom-scrollbar" id="chatHistory">
            <div class="msg-row ai">
                <div class="bubble">
                    <div class="ai-header"><img src="assets/icon.svg" class="ai-avatar-small"> wAI</div>
                    <div class="msg-content">Hi, I am wAI. How can I help you?</div>
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Message wAI..." autocomplete="off">
            <button class="send-btn" id="sendBtn" title="Send Message">
                <i data-lucide="send" style="margin-left: -2px;"></i>
            </button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/core.js"></script>
    <script>
        lucide.createIcons();
        
        const chatHistory = document.getElementById('chatHistory');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // Configure Markdown Engine
        marked.setOptions({
            breaks: true, 
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            }
        });

        // Allow pressing Enter to send
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
        sendBtn.addEventListener('click', handleSend);

        // 1. Context Engine
        function getWaelOSContext() {
            const timeString = new Date().toLocaleTimeString();
            const teaScore = localStorage.getItem('tea_local_score') || 0;
            const achievements = JSON.parse(localStorage.getItem('wael_achievements')) || [];
            const activeUser = localStorage.getItem('active_user') || "Guest";
            
            return `
[SYSTEM AWARENESS DATA]
Current OS Time: ${timeString}
Active User Logged In: ${activeUser}
Achievements Unlocked: ${achievements.length}/15
Moroccan Tea Score: ${teaScore}

[INSTRUCTIONS]
You are the native AI assistant built deeply into WaelOS. Your name is "wAI".
If the user asks about their stats, time, or identity, strictly use the [SYSTEM AWARENESS DATA] above to surprise them.
Keep your answers highly technical, slightly sarcastic, but very helpful. 
You MUST use Markdown for formatting. Use bold text for emphasis, bullet points for lists, and code blocks for any technical explanations.
            `;
        }

        // 2. Upgraded UI Appender
        function appendMessage(sender, text) {
            const row = document.createElement('div');
            row.className = `msg-row ${sender}`;
            
            if (sender === 'ai') {
                if (text === 'loading') {
                    row.innerHTML = `
                        <div class="bubble">
                            <div class="ai-header"><img src="assets/icon.svg" class="ai-avatar-small"> wAI</div>
                            <div class="typing-dots"><span></span><span></span><span></span></div>
                        </div>`;
                } else {
                    row.innerHTML = `
                        <div class="bubble">
                            <div class="ai-header"><img src="assets/icon.svg" class="ai-avatar-small"> wAI</div>
                            <div class="msg-content"></div>
                        </div>`;
                    
                    row.querySelector('.msg-content').innerHTML = marked.parse(text);
                }
            } else {
                row.innerHTML = `<div class="bubble"></div>`;
                row.querySelector('.bubble').innerText = text;
            }
            
            chatHistory.appendChild(row);
            
            setTimeout(() => {
                chatHistory.scrollTop = chatHistory.scrollHeight;
            }, 10);
            
            return row;
        }

        // 3. API Communication
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            
            sendBtn.disabled = true;
            userInput.disabled = true;
            const loadingRow = appendMessage('ai', 'loading');

            const fullPrompt = `${getWaelOSContext()}\n\nUser Message: ${text}`;
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${CONFIG.GEMINI_API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: fullPrompt }] }]
                    })
                });

                if (!response.ok) throw new Error("API Connection Failed");

                const data = await response.json();
                loadingRow.remove(); 

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    appendMessage('ai', data.candidates[0].content.parts[0].text);
                } else {
                    appendMessage('ai', "Error processing the response matrix.");
                }

            } catch (error) {
                loadingRow.remove();
                appendMessage('ai', "**SYSTEM ERROR:** Failed to establish uplink with Gemini servers. Check console or API key.");
                console.error(error);
            } finally {
                sendBtn.disabled = false;
                userInput.disabled = false;
                userInput.focus();
            }
        }
    </script>
</body>
</html>
