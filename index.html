<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wael — Landing</title>
<link rel="icon" type="image/png" href="1000003608.png" />

<style>
:root{
  --left-bg:#063826;
  --right-bg:#5b0b0b;
  --text:#f5f7fa;
  --muted:rgba(255,255,255,.78);
  --radius:999px;
}

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:#0b0b0b;
  color:var(--text);
}

/* Layout */
.wrap{
  min-height:100vh;
  position:relative;
  overflow:hidden;
}

/* Panels */
.left,.right{
  position:absolute;
  top:0;
  bottom:0;
}

.left{
  left:0;
  width:58%;
  background:linear-gradient(135deg,#052e21 0%,#063826 60%,#052b1f 100%);
  padding:110px 7vw;
  display:flex;
  align-items:center;
  z-index:2;
}

.right{
  right:0;
  width:52%;
  background:linear-gradient(135deg,#4a0707 0%,#5b0b0b 60%,#360606 100%);
  z-index:1;
}

/* Diagonal split (desktop) */
.right::before{
  content:"";
  position:absolute;
  left:-140px;
  top:-10%;
  width:280px;
  height:120%;
  background:inherit;
  transform:skewX(-14deg);
  box-shadow:-20px 0 50px rgba(0,0,0,.35);
}

/* Redeem button pinned to top-right corner */
.redeem{
  position:absolute;
  top:20px;
  right:20px;
  z-index:10;
  padding:12px 22px;
  border-radius:var(--radius);
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(10px);
  color:#fff;
  font-weight:700;
  text-decoration:none;
  transition:.2s ease;
}
.redeem:hover{ background:rgba(255,255,255,.2); }

/* Content */
.content{
  max-width:560px;
  animation:fadeUp .8s ease both;
}

.hello{
  font-size:26px;
  margin:0 0 16px;
  color:var(--muted);
}

/* Typewriter Title Styles */
.title{
  margin:0;
  font-size:clamp(40px,5vw,72px);
  line-height:1.1;
  /* Keep a minimum height so the button below doesn't jump up and down on mobile */
  min-height: 2.2em; 
}
@media (min-width: 861px) {
  .title { min-height: 1.2em; }
}

.cursor {
  display: inline-block;
  width: 4px;
  height: 0.9em;
  background-color: var(--text);
  margin-left: 6px;
  vertical-align: middle;
  animation: blink 1s step-end infinite;
}
@keyframes blink {
  50% { opacity: 0; }
}

.cta{
  display:inline-flex;
  margin-top:24px;
  padding:16px 28px;
  border-radius:var(--radius);
  background:#fff;
  color:#111;
  font-weight:800;
  text-decoration:none;
  min-width:230px;
  justify-content:center;
  transition:.2s ease;
}
.cta:hover{ transform:translateY(-2px); }

/* Centered hero image */
.heroImg{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Morocco card (with subtle floating animation) */
.heroImg .frame{
  width:420px;
  height:420px;
  max-width:80%;
  max-height:80%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  border-radius:28px;
  backdrop-filter:blur(14px);
  box-shadow:0 25px 70px rgba(0,0,0,.45);
  animation:
    fadeIn .9s ease .2s both,
    float 6s ease-in-out infinite;
}

.heroImg img{
  max-width:75%;
  max-height:75%;
  object-fit:contain;
  display:block;
  filter:drop-shadow(0 30px 60px rgba(0,0,0,.55));
}

/* Animations */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(15px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes fadeIn{
  from{opacity:0;transform:scale(.95);}
  to{opacity:1;transform:scale(1);}
}
@keyframes float{
  0%{ transform: translateY(0px); }
  50%{ transform: translateY(-14px); }
  100%{ transform: translateY(0px); }
}

/* Respect reduced motion */
@media (prefers-reduced-motion: reduce){
  .content{ animation:none !important; }
  .heroImg .frame{ animation:none !important; }
  .cta, .redeem{ transition:none !important; }
  .cursor { animation: none !important; }
}

/* Mobile */
@media (max-width:860px){
  .left,.right{
    position:relative;
    width:100%;
  }
  .right{
    height:50vh;
  }
  .right::before{
    display:none; 
  }
  .left{
    text-align:center;
    justify-content:center;
    padding:120px 7vw 60px;
  }
  .content{
    margin:0 auto;
  }
  .heroImg{
    position:relative;
    height:50vh;
  }
  .redeem{
    top:15px;
    right:15px;
  }
}
</style>
</head>

<body>

<main class="wrap">

  <a class="redeem" href="redeem.html">Redeem</a>

  <section class="left">
    <div class="content">
      <p class="hello">Hi,</p>
      
      <h1 class="title">
        <span id="typewriter-text">I am Wael.</span><span class="cursor"></span>
      </h1>
      
      <a class="cta" href="about.html">About me</a>
    </div>
  </section>

  <section class="right" aria-hidden="true">
    <div class="heroImg">
      <div class="frame">
        <img
          src="https://static.wikitide.net/ballsdexwiki/e/e4/Morocco.png"
          alt="Morocco"
        />
      </div>
    </div>
  </section>

</main>

<script>
  const phrases = [
    "I am Wael.",
    "I am a Moroccan.",
    "I am a tech enthusiast."
  ];
  
  let phraseIndex = 0;
  // Start with the first phrase fully typed out
  let charIndex = phrases[0].length; 
  let isDeleting = true;

  const typeNode = document.getElementById('typewriter-text');

  function typeEffect() {
    const currentPhrase = phrases[phraseIndex];
    
    if (isDeleting) {
      charIndex--; // Erase a character
    } else {
      charIndex++; // Type a character
    }

    typeNode.textContent = currentPhrase.substring(0, charIndex);

    // Adjust typing speeds
    let typingSpeed = isDeleting ? 40 : 80;

    // Logic for pausing at the ends
    if (!isDeleting && charIndex === currentPhrase.length) {
      typingSpeed = 2500; // Pause when a phrase is fully typed
      isDeleting = true;
    } else if (isDeleting && charIndex === 0) {
      isDeleting = false;
      phraseIndex = (phraseIndex + 1) % phrases.length; // Move to next phrase
      typingSpeed = 500; // Pause before starting the next phrase
    }

    setTimeout(typeEffect, typingSpeed);
  }

  // Wait 2.5 seconds before starting the deletion of the first phrase
  setTimeout(typeEffect, 2500);
</script>

</body>
</html>
