<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael</title>
    <link rel="preload" as="image" href="assets/morocco.png" />
    <link rel="preload" as="image" href="/assets/morocco_flag_emoji_ios.png" />
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .wrap { position: relative; }
        .hero-container { position: sticky; top: 0; min-height: 100vh; width: 100%; overflow: hidden; }
        .left, .right { position: absolute; top: 0; bottom: 0; }
        .left { left: 0; width: 58%; background: var(--bg-left-grad); padding: 110px 7vw; display: flex; align-items: center; z-index: 1; }
        .right { right: 0; width: 52%; background: var(--bg-right-grad); z-index: 2; }
        .right::before { content: ""; position: absolute; left: -140px; top: -10%; width: 280px; height: 120%; background: inherit; transform: skewX(-14deg); box-shadow: -20px 0 50px rgba(0,0,0,.35); }
        .redeem { position: absolute; top: 20px; right: 20px; z-index: 30; padding: 12px 22px; border-radius: 999px; background: var(--nav-bg); border: 1px solid var(--nav-border); backdrop-filter: blur(10px); color: var(--nav-text); font-weight: 700; text-decoration: none; transition: 0.2s ease; display: flex; align-items: center; gap: 6px; }
        .redeem:hover { background: rgba(255,255,255,.2); }
        
        /* FIX: Lock the container height and use flex to pin the button */
        .content { 
            max-width: 560px; 
            animation: fadeUp 0.8s ease both; 
            position: relative; 
            z-index: 10; 
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            height: 280px; /* Locked height so it never resizes */
        }
        
        .hello { font-size: 26px; margin: 0 0 16px; color: var(--text-muted); }
        .title { margin: 0; font-size: clamp(40px, 5vw, 72px); line-height: 1.1; }
        .cursor { display: inline-block; width: 4px; height: 0.9em; background-color: var(--text-main); margin-left: 6px; vertical-align: middle; animation: blink 1s step-end infinite; }
        
        @keyframes blink { 50% { opacity: 0; } }
        
        .cta { 
            display: inline-flex; 
            margin-top: auto; /* Anchors the button permanently to the bottom of the 280px box */
            padding: 16px 28px; 
            border-radius: 999px; 
            background: var(--btn-bg); 
            color: var(--btn-text); 
            font-weight: 800; 
            text-decoration: none; 
            min-width: 230px; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            transition: 0.2s ease; 
        }
        .cta:hover { transform: translateY(-2px); }
        
        .heroImg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
        .heroImg .frame { width: 420px; height: 420px; max-width: 80%; max-height: 80%; display: flex; align-items: center; justify-content: center; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 28px; backdrop-filter: blur(14px); box-shadow: 0 25px 70px rgba(0,0,0,.45); animation: fadeIn 0.9s ease 0.2s both, floatLoop 6s ease-in-out infinite; position: relative; }
        
        /* --- Animated Status Badge --- */
        .status-badge { position: absolute; top: -15px; left: -20px; background: rgba(0,0,0,.7); border: 1px solid rgba(255,255,255,.2); padding: 10px 18px; border-radius: 99px; backdrop-filter: blur(12px); color: #fff; font-size: 14px; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,.4); display: flex; align-items: center; gap: 8px; z-index: 20; }
        
        .status-badge::before { 
            content: ""; 
            display: inline-block; 
            width: 10px; 
            height: 10px; 
            background: #4ade80; 
            border-radius: 50%; 
            box-shadow: 0 0 10px #4ade80; 
            animation: pulse-green 2s infinite; 
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        .heroImg img { max-width: 75%; max-height: 75%; object-fit: contain; display: block; filter: drop-shadow(0 30px 60px rgba(0,0,0,.55)); }
        .description-section { min-height: 60vh; display: flex; align-items: center; justify-content: center; padding: 80px 5vw; background: #2b0404; text-align: center; position: relative; z-index: 5; }
        .desc-text { font-size: clamp(32px, 5vw, 56px); font-weight: 800; line-height: 1.3; color: var(--text-main); max-width: 900px; letter-spacing: -0.5px; }
        .desc-text span { display: block; color: var(--text-muted); font-size: clamp(20px, 3vw, 32px); margin-top: 15px; font-weight: 500; }
        .shortcut-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; margin-top: 30px; padding: 12px 24px; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.3); color: #fff; border-radius: 99px; text-decoration: none; font-size: 18px; font-weight: bold; transition: 0.2s; backdrop-filter: blur(5px); }
        .shortcut-btn:hover { background: rgba(255,255,255,.2); transform: translateY(-2px); }
        .footer-section { background: #110101; padding: 60px 20px; text-align: center; border-top: 1px solid rgba(255,255,255,.05); position: relative; z-index: 5; }
        .footer-text { color: rgba(255,255,255,.5); font-size: 16px; line-height: 1.8; margin: 0; }
        .footer-text strong { color: rgba(255,255,255,.85); font-size: 18px; }
        
        .lucide { width: 1.2em; height: 1.2em; vertical-align: -0.125em; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* --- Boot Sequence Overlay --- */
        #boot-overlay {
            position: fixed;
            inset: 0;
            background: #0b0b0b;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.8s;
        }

        #boot-logo {
            width: 80px;
            height: 80px;
            animation: spinPulse 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        @keyframes spinPulse {
            0% { transform: scale(0.8) rotate(0deg); opacity: 0.5; }
            50% { transform: scale(1.1) rotate(180deg); opacity: 1; }
            100% { transform: scale(0.8) rotate(360deg); opacity: 0.5; }
        }

        /* --- System Specs Card --- */
        .desc-content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            width: 100%;
        }

        .system-specs-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 480px;
            text-align: left;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .system-specs-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .specs-title {
            color: #fff;
            font-size: 20px;
            margin: 0 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
            font-weight: 700;
        }

        .specs-title i { color: #4ade80; }

        .specs-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .specs-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            font-size: 16px;
        }

        .specs-list li i {
            color: #fff;
            opacity: 0.6;
            width: 18px;
            height: 18px;
        }

        .specs-list li strong {
            color: #fff;
            font-weight: 500;
            min-width: 90px;
        }

        @media (max-width: 860px) { 
            .hero-container { position: relative; display: flex; flex-direction: column; } 
            .left, .right { position: relative; width: 100%; z-index: 1; } 
            .right { height: 50vh; } 
            .right::before { display: none; } 
            .left { text-align: center; justify-content: center; padding: 120px 7vw 60px; } 
            .content { margin: 0 auto; align-items: center; } /* Centers the button on mobile */
            .heroImg { position: relative; height: 50vh; } 
            .redeem { top: 15px; right: 15px; } 
            .status-badge { top: 10px; left: 50%; transform: translateX(-50%); font-size: 12px; } 
        }
        @media (min-width: 861px) {
            .one-line-text {
                white-space: nowrap;
                display: inline-block;
                color: #fff;
            }
        }

        /* On mobile, we let it wrap naturally so it doesn't go off-screen */
        @media (max-width: 860px) {
            .one-line-text {
                white-space: normal;
                display: block;
                color: #fff;
            }
        }
    </style>
    
    <script>
        if (localStorage.getItem('waelos_booted')) {
            document.documentElement.classList.add('skip-boot');
        }
    </script>
    <style>
        html.skip-boot #boot-overlay {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="boot-overlay">
        <img src="assets/icon.svg" id="boot-logo" alt="Booting..." />
    </div>

    <main class="wrap">
        <div id="hero" class="hero-container">
            <a class="redeem" href="redeem"><i data-lucide="gift"></i> Redeem</a>
            <section class="left">
                <div class="content">
                    <p class="hello">Hi,</p>
                    <h1 class="title"><span id="typewriter-text">I am Wael.</span><span class="cursor"></span></h1>
                    <a class="cta" href="projects"><i data-lucide="layers"></i> Projects</a>
                </div>
            </section>
            <section class="right" aria-hidden="true">
                <div class="heroImg">
                    <div class="frame">
                        <div class="status-badge" id="liveStatus">Loading status...</div>
                        <img src="assets/morocco.png" alt="Morocco" style="pointer-events: none;" />
                    </div>
                </div>
            </section>
        </div>
        <section class="description-section">
            <div class="desc-content-wrapper">
                <div class="desc-text">
                    A proud <br>
                    Moroccan <img src="/assets/morocco_flag_emoji_ios.png" alt="Morocco flag" class="ma-flag"> who likes tea.
                    <span>Wael Amrani Zerrifi.</span>
                </div>

                <div class="system-specs-card">
                    <h3 class="specs-title"><i data-lucide="info"></i> Info</h3>
                    <ul class="specs-list">
                        <li><i data-lucide="shield-check"></i> <strong>Admin:</strong> Wael Amrani Zerrifi</li>
                        <li><i data-lucide="cake"></i> <strong>Birthday:</strong> 3rd March</li>
                        <li><i data-lucide="map-pin"></i> <strong>Country:</strong> Morocco</li>
                        <li><i data-lucide="terminal"></i> <strong>Version:</strong> 2.1 (210326)</li>
                    </ul>
                </div>

                <a href="shortcuts" class="shortcut-btn"><i data-lucide="zap"></i> Shortcuts</a>
            </div>
        </section>
        <footer class="footer-section">
            <p class="footer-text"><strong>Credits:</strong><br>By Wael Amrani Zerrifi<br><span style="display: inline-flex; align-items: center; gap: 4px;"><i data-lucide="copyright" style="width: 14px; height: 14px;"></i> Copyrights 2026</span></p>
        </footer>
    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const bootOverlay = document.getElementById('boot-overlay');
            
            if (!localStorage.getItem('waelos_booted')) {
                setTimeout(() => {
                    bootOverlay.style.opacity = '0';
                    bootOverlay.style.visibility = 'hidden';
                    localStorage.setItem('waelos_booted', 'true');
                }, 1500);
            }
        });

        window.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            try { 
                const res = await fetch('json/status.json'); 
                if (res.ok) { 
                    const data = await res.json(); 
                    document.getElementById('liveStatus').innerText = data.status || "Online"; 
                } 
            } catch (e) { 
                document.getElementById('liveStatus').innerText = "Online"; 
            }
        });

        const hero = document.getElementById('hero'); 
        window.addEventListener('scroll', () => { 
            let opacity = 1 - (window.scrollY / (window.innerHeight * 0.8)); 
            if (opacity < 0) opacity = 0; 
            hero.style.opacity = opacity; 
        });

        const phrases = ["I am Wael.", "I am a Moroccan.", "I am a tech enthusiast.", "I like tea."]; 
        let pIdx = 0; 
        let cIdx = phrases[0].length; 
        let del = true; 
        const typeNode = document.getElementById('typewriter-text');

        function typeEffect() { 
            const cur = phrases[pIdx]; 
            if (del) cIdx--; 
            else cIdx++; 
            
            typeNode.textContent = cur.substring(0, cIdx); 
            let speed = del ? 40 : 80; 
            
            if (!del && cIdx === cur.length) { 
                speed = 2500; 
                del = true; 
            } else if (del && cIdx === 0) { 
                del = false; 
                pIdx = (pIdx + 1) % phrases.length; 
                speed = 500; 
            } 
            setTimeout(typeEffect, speed); 
        }
        setTimeout(typeEffect, 2500);
    </script>
    <script src="js/context-menu.js"></script>
    <script src="js/core.js"></script>
    <script src="/js/emoji-replacer.js"></script>
</body>
</html>
