<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael</title>
    <link rel="icon" type="image/png" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .wrap { position: relative; }
        .hero-container { position: sticky; top: 0; min-height: 100vh; width: 100%; overflow: hidden; }
        .left, .right { position: absolute; top: 0; bottom: 0; }
        .left { left: 0; width: 58%; background: linear-gradient(135deg, #052e21 0%, #063826 60%, #052b1f 100%); padding: 110px 7vw; display: flex; align-items: center; z-index: 1; }
        .right { right: 0; width: 52%; background: linear-gradient(135deg, #4a0707 0%, #5b0b0b 60%, #360606 100%); z-index: 2; }
        .right::before { content: ""; position: absolute; left: -140px; top: -10%; width: 280px; height: 120%; background: inherit; transform: skewX(-14deg); box-shadow: -20px 0 50px rgba(0,0,0,.35); }
        .redeem { position: absolute; top: 20px; right: 20px; z-index: 30; padding: 12px 22px; border-radius: 999px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25); backdrop-filter: blur(10px); color: #fff; font-weight: 700; text-decoration: none; transition: 0.2s ease; }
        .redeem:hover { background: rgba(255,255,255,.2); }
        .content { max-width: 560px; animation: fadeUp 0.8s ease both; position: relative; z-index: 10; }
        .hello { font-size: 26px; margin: 0 0 16px; color: var(--muted); }
        .title { margin: 0; font-size: clamp(40px, 5vw, 72px); line-height: 1.1; min-height: 2.4em; }
        .cursor { display: inline-block; width: 4px; height: 0.9em; background-color: var(--text); margin-left: 6px; vertical-align: middle; animation: blink 1s step-end infinite; }
        
        @keyframes blink { 50% { opacity: 0; } }
        
        .cta { display: inline-flex; margin-top: 24px; padding: 16px 28px; border-radius: 999px; background: #fff; color: #111; font-weight: 800; text-decoration: none; min-width: 230px; justify-content: center; transition: 0.2s ease; }
        .cta:hover { transform: translateY(-2px); }
        .heroImg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
        .heroImg .frame { width: 420px; height: 420px; max-width: 80%; max-height: 80%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-radius: 28px; backdrop-filter: blur(14px); box-shadow: 0 25px 70px rgba(0,0,0,.45); animation: fadeIn 0.9s ease 0.2s both, float 6s ease-in-out infinite; position: relative; }
        .status-badge { position: absolute; top: -15px; left: -20px; background: rgba(0,0,0,.7); border: 1px solid rgba(255,255,255,.2); padding: 10px 18px; border-radius: 99px; backdrop-filter: blur(12px); color: #fff; font-size: 14px; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,.4); display: flex; align-items: center; gap: 8px; z-index: 20; }
        .status-badge::before { content: ""; display: inline-block; width: 10px; height: 10px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 10px #4ade80; }
        .heroImg img { max-width: 75%; max-height: 75%; object-fit: contain; display: block; filter: drop-shadow(0 30px 60px rgba(0,0,0,.55)); }
        .description-section { min-height: 60vh; display: flex; align-items: center; justify-content: center; padding: 80px 5vw; background: #2b0404; text-align: center; position: relative; z-index: 5; }
        .desc-text { font-size: clamp(32px, 5vw, 56px); font-weight: 800; line-height: 1.3; color: var(--text); max-width: 900px; letter-spacing: -0.5px; }
        .desc-text span { display: block; color: var(--muted); font-size: clamp(20px, 3vw, 32px); margin-top: 15px; font-weight: 500; }
        .shortcut-btn { display: inline-block; margin-top: 30px; padding: 12px 24px; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.3); color: #fff; border-radius: 99px; text-decoration: none; font-size: 18px; font-weight: bold; transition: 0.2s; backdrop-filter: blur(5px); }
        .shortcut-btn:hover { background: rgba(255,255,255,.2); transform: translateY(-2px); }
        .footer-section { background: #110101; padding: 60px 20px; text-align: center; border-top: 1px solid rgba(255,255,255,.05); position: relative; z-index: 5; }
        .footer-text { color: rgba(255,255,255,.5); font-size: 16px; line-height: 1.8; margin: 0; }
        .footer-text strong { color: rgba(255,255,255,.85); font-size: 18px; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-14px); } 100% { transform: translateY(0px); } }

        @media (max-width: 860px) { 
            .hero-container { position: relative; display: flex; flex-direction: column; } 
            .left, .right { position: relative; width: 100%; z-index: 1; } 
            .right { height: 50vh; } 
            .right::before { display: none; } 
            .left { text-align: center; justify-content: center; padding: 120px 7vw 60px; } 
            .content { margin: 0 auto; } 
            .heroImg { position: relative; height: 50vh; } 
            .redeem { top: 15px; right: 15px; } 
            .status-badge { top: 10px; left: 50%; transform: translateX(-50%); font-size: 12px; } 
            .title { min-height: 3.3em; } 
        }
    </style>
</head>
<body>
    <main class="wrap">
        <div id="hero" class="hero-container">
            <a class="redeem" href="redeem">Redeem</a>
            <section class="left">
                <div class="content">
                    <p class="hello">Hi,</p>
                    <h1 class="title"><span id="typewriter-text">I am Wael.</span><span class="cursor"></span></h1>
                    <a class="cta" href="projects">Projects</a>
                </div>
            </section>
            <section class="right" aria-hidden="true">
                <div class="heroImg">
                    <div class="frame">
                        <div class="status-badge" id="liveStatus">Loading status...</div>
                        <img src="https://static.wikitide.net/ballsdexwiki/e/e4/Morocco.png" alt="Morocco" />
                    </div>
                </div>
            </section>
        </div>
        <section class="description-section">
            <div class="desc-text">
                A proud Moroccan 🇲🇦 student who likes tea.
                <span>Also a Developer.</span>
                <a href="shortcuts" class="shortcut-btn">Shortcuts</a>
            </div>
        </section>
        <footer class="footer-section">
            <p class="footer-text"><strong>Credits:</strong><br>By Wael Amrani Zerrifi<br>©️ Copyrights 2026</p>
        </footer>
    </main>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            try { 
                const res = await fetch('status.json'); 
                if (res.ok) { 
                    const data = await res.json(); 
                    document.getElementById('liveStatus').innerText = data.status || "Online"; 
                } 
            } catch (e) { 
                document.getElementById('liveStatus').innerText = "Online"; 
            }
        });

        const hero = document.getElementById('hero'); 
        window.addEventListener('scroll', () => { 
            let opacity = 1 - (window.scrollY / (window.innerHeight * 0.8)); 
            if (opacity < 0) opacity = 0; 
            hero.style.opacity = opacity; 
        });

        const phrases = ["I am Wael.", "I am a Moroccan.", "I am a tech enthusiast.", "I like tea."]; 
        let pIdx = 0; 
        let cIdx = phrases[0].length; 
        let del = true; 
        const typeNode = document.getElementById('typewriter-text');

        function typeEffect() { 
            const cur = phrases[pIdx]; 
            if (del) cIdx--; 
            else cIdx++; 
            
            typeNode.textContent = cur.substring(0, cIdx); 
            let speed = del ? 40 : 80; 
            
            if (!del && cIdx === cur.length) { 
                speed = 2500; 
                del = true; 
            } else if (del && cIdx === 0) { 
                del = false; 
                pIdx = (pIdx + 1) % phrases.length; 
                speed = 500; 
            } 
            setTimeout(typeEffect, speed); 
        }
        setTimeout(typeEffect, 2500);
    </script>
</body>
</html>
