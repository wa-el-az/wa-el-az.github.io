<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/u-term/apple-emoji-css@master/apple-emoji.css">
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>Wael — Tea Clicker</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { padding: 60px 5vw; overflow-x: hidden; }
        .container { position: relative; z-index: 10; max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .card { text-align: center; }
        
        .score-display { font-size: 56px; font-weight: 900; margin: 0; text-shadow: 0 4px 20px rgba(0,0,0,0.5); letter-spacing: -1px; }
        .exact-score { font-size: 18px; color: var(--text-muted); font-weight: 700; margin-bottom: 10px; font-family: 'JetBrains Mono', monospace; }
        .pc-info { font-size: 16px; color: #4ade80; font-weight: bold; margin-bottom: 25px; background: rgba(74, 222, 128, 0.1); display: inline-block; padding: 4px 12px; border-radius: 99px; }
        
        .tea-btn { 
            font-size: 110px; 
            background: none; 
            border: none; 
            cursor: pointer; 
            transition: transform 0.1s; 
            user-select: none; 
            outline: none; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4)); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 160px; 
            width: 100%; 
            margin: 0 auto; 
        }

        /* Tactile click animation */
        .tea-btn:active {
            transform: scale(0.85);
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8));
        }
        
        .floating-text { position: fixed; font-size: 24px; font-weight: bold; color: #fff; pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 50; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-50px) scale(1.5); } }
        
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .warning { font-size: 12px; color: #ff6b6b; margin-top: 10px; margin-bottom: 10px; font-weight: bold; }
        
        .leaderboard-list { margin-top: 20px; max-height: 250px; overflow-y: auto; text-align: left; background: rgba(0,0,0,.18); border-radius: 12px; padding: 10px; border: 1px solid rgba(255,255,255,.1); }
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,.05); font-weight: bold; align-items: center; }
        .rank-item:last-child { border-bottom: none; }
        .rank-1 { color: #ffd700; font-size: 18px; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .rank-2 { color: #c0c0c0; font-size: 17px; }
        .rank-3 { color: #cd7f32; font-size: 16px; }
        .rank-other { color: #fff; }
        .lb-score { font-family: 'JetBrains Mono', monospace; font-size: 14px; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 6px; }
        
        #apiMsg { margin-top: 10px; font-size: 14px; font-weight: bold; }
        #syncControls { display: none; }
        #loggedInAs { color: #4ade80; font-weight: bold; font-size: 18px; margin-bottom: 15px; display: none;}
        
        .navBtn { display: inline-flex; align-items: center; gap: 6px; z-index: 50; }
        .lucide { width: 1.2em; height: 1.2em; vertical-align: -0.125em; }
        
        @media (max-width: 860px) { .container { grid-template-columns: 1fr; margin-top: 40px; } }
    </style>
<style>
/* Morocco flag replacement */
.ma-flag{
  width: 1em;
  height: 1em;
  object-fit: contain;
  display: inline-block;
  vertical-align: -0.14em;
  transition: transform 160ms ease, filter 160ms ease;
  transform-origin: center;
}

.ma-flag:hover{
  transform: translateY(-1px) scale(1.14);
  filter: drop-shadow(0 2px 8px rgba(255,255,255,0.35));
}

.custom-emoji-inline.ma-flag{
  margin: 0 0.08em;
}

.tea-flag{
  width: 140px;
  height: 140px;
  vertical-align: middle;
  filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
}

.tea-flag:hover{
  transform: scale(1.04);
  filter: drop-shadow(0 18px 28px rgba(0,0,0,0.65));
}

.achieve-flag{
  width: 36px;
  height: 36px;
  vertical-align: middle;
}
</style>
</head>
<body>
    <div class="bg-left"></div><div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="index"><i data-lucide="home"></i> Home</a>
    
    <div class="container">
        <div class="card">
            <h1>Moroccan Tea</h1>
            <p class="sub">Click to brew!</p>
            
            <div class="score-display" id="scoreDisplay">0</div>
            <div class="exact-score" id="exactScoreDisplay">(0 clicks)</div>
            <div class="pc-info" id="pcDisplay">+1 per click</div>
            
            <button class="tea-btn" id="teaBtn">🍵</button>
        </div>
        
        <div class="card">
            <h2 style="margin-top:0;">Leaderboard</h2>
            <div id="loginControls">
                <p class="warning">⚠️ DO NOT use real passwords!</p>
                <div class="input-row">
                    <input type="text" id="usernameInput" placeholder="Username" autocomplete="off" maxlength="15">
                    <input type="password" id="passwordInput" placeholder="Password">
                </div>
                <button class="btn" id="loginBtn">Login / Create Account</button>
            </div>
            <div id="loggedInAs"></div>
            <div id="syncControls">
                <button class="btn" id="syncBtn" style="background: #4ade80; color: #111;">Sync Current Score</button>
            </div>
            <p id="apiMsg"></p>
            <div class="leaderboard-list" id="lbList">
                <p style="text-align:center; color:#aaa;">Loading ranks...</p>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/achievements.js"></script>
    <script>
        // Dynamic Back Button Logic
        window.addEventListener('DOMContentLoaded', () => {
            const backBtn = document.getElementById('dynamicBackBtn');
            const referrer = document.referrer.toLowerCase();
            
            if (referrer.includes('shortcuts')) {
                backBtn.href = 'shortcuts';
                backBtn.innerHTML = '<i data-lucide="zap"></i> Shortcuts';
            } else if (referrer.includes('redeem')) {
                backBtn.href = 'redeem';
                backBtn.innerHTML = '<i data-lucide="ticket"></i> Redeem';
            } else {
                backBtn.href = 'index';
                backBtn.innerHTML = '<i data-lucide="home"></i> Home';
            }
            lucide.createIcons();
        });

        let score = parseInt(localStorage.getItem('tea_local_score')) || parseInt(localStorage.getItem('tea_score')) || 0;
        let pointsPerClick = 1; 
        let currentEmojiHTML = "🍵";
        let floatEmoji = "🍵";
        let globalLB = {};
        let fileSha = null;
        let loggedInUser = null;

        // The formatting engine for K, M, B, T
        function formatNumber(num) {
            if (num < 1000) return num.toString();
            const suffixes = ["", "K", "M", "B", "T", "Qa"];
            const suffixNum = Math.floor(Math.log10(num) / 3);
            let shortValue = (num / Math.pow(1000, suffixNum)).toFixed(2);
            // Remove trailing .00 for cleaner display
            shortValue = shortValue.replace(/\.00$/, '');
            return shortValue + suffixes[suffixNum];
        }

        function updateGameUI() {
            // Massive new tier system
            if (score < 10) { pointsPerClick = 1; currentEmojiHTML = "🍵"; floatEmoji = "🍵"; }
            else if (score < 100) { pointsPerClick = 2; currentEmojiHTML = "☕"; floatEmoji = "☕"; }
            else if (score < 1000) { pointsPerClick = 5; currentEmojiHTML = "🧋"; floatEmoji = "🧋"; }
            else if (score < 5000) { pointsPerClick = 15; currentEmojiHTML = "🧉"; floatEmoji = "🧉"; }
            else if (score < 25000) { pointsPerClick = 50; currentEmojiHTML = "🫖"; floatEmoji = "🫖"; }
            else if (score < 100000) { pointsPerClick = 250; currentEmojiHTML = "🏺"; floatEmoji = "🏺"; }
            else if (score < 500000) { pointsPerClick = 1000; currentEmojiHTML = "🐫"; floatEmoji = "🐫"; }
            else if (score < 2500000) { pointsPerClick = 5000; currentEmojiHTML = "🕌"; floatEmoji = "🕌"; }
            else if (score < 10000000) { pointsPerClick = 25000; currentEmojiHTML = "👑"; floatEmoji = "👑"; }
            else if (score < 50000000) { pointsPerClick = 100000; currentEmojiHTML = "💎"; floatEmoji = "💎"; }
            else if (score < 250000000) { pointsPerClick = 500000; currentEmojiHTML = "<img src="/assets/morocco_flag_emoji_ios.png" alt="Morocco flag" class="ma-flag">"; floatEmoji = "<img src="/assets/morocco_flag_emoji_ios.png" alt="Morocco flag" class="ma-flag">"; }
            else if (score < 1000000000) { 
                pointsPerClick = 2500000; 
                currentEmojiHTML = `<img src="https://png.pngtree.com/png-vector/20250207/ourmid/pngtree-refreshing-moroccan-mint-tea-in-an-engraved-glass-on-a-decorative-png-image_15409953.png" style="width: 140px; height: 140px; object-fit: contain; pointer-events: none; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));" alt="Legendary Mint Tea">`;
                floatEmoji = "✨"; 
            } else { 
                // 1 Billion+ God Tier
                pointsPerClick = 15000000; 
                currentEmojiHTML = `<img src="https://png.pngtree.com/png-vector/20250207/ourmid/pngtree-refreshing-moroccan-mint-tea-in-an-engraved-glass-on-a-decorative-png-image_15409953.png" style="width: 150px; height: 150px; object-fit: contain; pointer-events: none; filter: drop-shadow(0 0 35px #ffd700) drop-shadow(0 15px 25px rgba(0,0,0,0.8));" alt="Golden Mint Tea">`;
                floatEmoji = "🌟"; 
            }

            // Display formatted big number (e.g. 1.5M)
            document.getElementById('scoreDisplay').innerText = formatNumber(score);
            
            // Keep exact number with commas below it so you never lose track!
            if (score >= 1000) {
                document.getElementById('exactScoreDisplay').innerText = `(${score.toLocaleString()} clicks)`;
                document.getElementById('exactScoreDisplay').style.display = 'block';
            } else {
                document.getElementById('exactScoreDisplay').style.display = 'none';
            }

            document.getElementById('pcDisplay').innerText = `+${formatNumber(pointsPerClick)} per click`;
            document.getElementById('teaBtn').innerHTML = currentEmojiHTML;
            
            localStorage.setItem('tea_local_score', score);
        }

        updateGameUI();
        loadLeaderboard();

        document.getElementById('teaBtn').addEventListener('click', (e) => {
            score += pointsPerClick;
            
            const isWael = localStorage.getItem('active_user') === 'Wael';
            if (isWael) {
                localStorage.setItem('tea_score', score);
            }

            updateGameUI();
            
            if (score === 1) window.unlockAchievement('tea_first');
            if (score >= 500) window.unlockAchievement('tea_500');
            if (score >= 10000) window.unlockAchievement('tea_10k');

            const floater = document.createElement('div');
            floater.className = 'floating-text';
            floater.innerHTML = `+${formatNumber(pointsPerClick)} ${floatEmoji}`;
            const offsetX = (Math.random() - 0.5) * 40;
            floater.style.left = `${e.clientX + offsetX}px`;
            floater.style.top = `${e.clientY - 20}px`;
            document.body.appendChild(floater);
            setTimeout(() => floater.remove(), 1000);
        });

        async function loadLeaderboard() {
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/json/leaderboard.json`, { headers: { 'Authorization': `Bearer ${CONFIG.GITHUB_TOKEN}` } });
                if (res.ok) {
                    const data = await res.json();
                    fileSha = data.sha;
                    globalLB = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    for (let key in globalLB) {
                        if (typeof globalLB[key] === 'number') {
                            globalLB[key] = { score: globalLB[key], pass: "1234" };
                        }
                    }
                    renderLeaderboard();
                    checkAutoLogin(); 
                } else { 
                    document.getElementById('lbList').innerHTML = '<p style="text-align:center;">No scores yet!</p>'; 
                }
            } catch (e) { }
        }

        function renderLeaderboard() {
            const listDiv = document.getElementById('lbList'); 
            listDiv.innerHTML = '';
            
            const sortedArr = Object.entries(globalLB).sort((a, b) => b[1].score - a[1].score).slice(0, 25);
            if (sortedArr.length === 0) return listDiv.innerHTML = '<p style="text-align:center; color:#aaa;">No scores yet!</p>';

            sortedArr.forEach((user, index) => {
                const rankClass = index === 0 ? 'rank-1' : (index === 1 ? 'rank-2' : (index === 2 ? 'rank-3' : 'rank-other'));
                const prefix = index === 0 ? '🥇' : (index === 1 ? '🥈' : (index === 2 ? '🥉' : `${index + 1}.`));
                // Leaderboard now shows K/M abbreviations but keeps the exact number as a hover title!
                listDiv.innerHTML += `
                    <div class="rank-item ${rankClass}" title="Exact Score: ${user[1].score.toLocaleString()}">
                        <span>${prefix} ${user[0]}</span>
                        <span class="lb-score">${formatNumber(user[1].score)}</span>
                    </div>`;
            });
        }

        function checkAutoLogin() {
            const savedUser = localStorage.getItem('tea_user');
            const savedPass = localStorage.getItem('tea_pass');
            const msg = document.getElementById('apiMsg');
            
            if (savedUser && savedPass && globalLB[savedUser] && globalLB[savedUser].pass === savedPass) {
                if (globalLB[savedUser].score > score) {
                    score = globalLB[savedUser].score;
                }
                localStorage.setItem('tea_score', score);
                updateGameUI();
                setLoggedInState(savedUser);
                msg.style.color = "#4ade80"; 
                msg.innerText = `✓ Auto-logged in as ${savedUser}`;
            }
        }

        document.getElementById('loginBtn').addEventListener('click', () => {
            const user = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();
            const msg = document.getElementById('apiMsg');
            
            if (!user || !pass) { msg.style.color = "#ff6b6b"; msg.innerText = "Please enter both fields!"; return; }

            if (globalLB[user]) {
                if (globalLB[user].pass === pass) {
                    localStorage.setItem('tea_user', user);
                    localStorage.setItem('tea_pass', pass);
                    
                    if (globalLB[user].score > score) {
                        score = globalLB[user].score;
                    }
                    localStorage.setItem('tea_score', score);
                    updateGameUI();
                    setLoggedInState(user);
                    msg.style.color = "#4ade80"; msg.innerText = "✓ Welcome back! Profile loaded.";
                } else {
                    msg.style.color = "#ff6b6b"; msg.innerText = "✗ Incorrect password!";
                }
            } else {
                globalLB[user] = { score: score, pass: pass };
                
                localStorage.setItem('tea_user', user);
                localStorage.setItem('tea_pass', pass);
                
                setLoggedInState(user);
                msg.style.color = "#4ade80"; msg.innerText = "✓ Account Created! Click Sync to save to DB.";
            }
        });

        function setLoggedInState(username) {
            loggedInUser = username;
            document.getElementById('loginControls').style.display = 'none';
            document.getElementById('syncControls').style.display = 'block';
            document.getElementById('loggedInAs').style.display = 'block';
            document.getElementById('loggedInAs').innerText = `Logged in as: ${username}`;
        }

        document.getElementById('syncBtn').addEventListener('click', async () => {
            const msg = document.getElementById('apiMsg');
            const btn = document.getElementById('syncBtn');
            btn.disabled = true; btn.innerText = "Syncing..."; msg.innerText = "";

            globalLB[loggedInUser].score = score;

            const payload = {
                message: `Score sync: ${loggedInUser}`,
                content: btoa(unescape(encodeURIComponent(JSON.stringify(globalLB, null, 2))))
            };
            if (fileSha) payload.sha = fileSha;

            try {
                const push = await fetch(`https://api.github.com/repos/${CONFIG.REPO_PATH}/contents/json/leaderboard.json`, {
                    method: 'PUT', headers: { 'Authorization': `Bearer ${CONFIG.GITHUB_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                if (push.ok) {
                    const result = await push.json();
                    fileSha = result.content.sha;
                    msg.style.color = "#4ade80"; msg.innerText = "✓ Score Synced to Global Leaderboard!";
                    window.unlockAchievement('tea_sync');
                    renderLeaderboard();
                } else throw new Error();
            } catch (err) {
                msg.style.color = "#ff6b6b"; msg.innerText = "✗ Sync failed. Try again.";
            }
            btn.disabled = false; btn.innerText = "Sync Current Score";
        });
    </script>
    <script src="js/context-menu.js"></script>
</body>
</html>
