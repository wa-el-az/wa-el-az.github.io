<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/u-term/apple-emoji-css@master/apple-emoji.css">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael — 404 Not Found</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .wrap { min-height: 100vh; position: relative; overflow: hidden; }
        .left, .right { position: absolute; top: 0; bottom: 0; }
        .left { left: 0; width: 58%; background: linear-gradient(135deg, #052e21 0%, #063826 60%, #052b1f 100%); padding: 110px 7vw; display: flex; align-items: center; z-index: 2; }
        .right { right: 0; width: 52%; background: linear-gradient(135deg, #4a0707 0%, #5b0b0b 60%, #360606 100%); z-index: 1; }
        .right::before { content: ""; position: absolute; left: -140px; top: -10%; width: 280px; height: 120%; background: inherit; transform: skewX(-14deg); box-shadow: -20px 0 50px rgba(0,0,0,.35); }
        
        .content { max-width: 560px; animation: fadeUp 0.8s ease both; }
        .kicker { font-size: 26px; margin: 0 0 12px; color: var(--muted); text-transform: lowercase; }
        .title { margin: 0; font-size: clamp(44px, 5vw, 72px); line-height: 1.05; }
        .cta { display: inline-flex; margin-top: 34px; padding: 16px 28px; border-radius: 999px; background: #fff; color: #111; font-weight: 800; text-decoration: none; min-width: 230px; justify-content: center; transition: 0.2s ease; }
        .cta:hover { transform: translateY(-2px); }
        
        .heroImg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
        .heroImg .frame { width: 420px; height: 420px; max-width: 80%; max-height: 80%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-radius: 28px; backdrop-filter: blur(14px); box-shadow: 0 25px 70px rgba(0,0,0,.45); animation: fadeIn 0.9s ease 0.2s both, float 6s ease-in-out infinite; overflow: hidden; }
        .heroImg img { max-width: 85%; max-height: 85%; object-fit: contain; display: block; filter: drop-shadow(0 30px 60px rgba(0,0,0,.55)); border-radius: 20px; }
        
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-14px); } }

        @media (prefers-reduced-motion: reduce) {
            .content, .heroImg .frame { animation: none !important; }
            .cta { transition: none !important; }
        }

        @media (max-width: 860px) {
            .left, .right { position: relative; width: 100%; }
            .right { height: 50vh; }
            .right::before { display: none; }
            .left { text-align: center; justify-content: center; padding: 120px 7vw 60px; }
            .content { margin: 0 auto; }
            .heroImg { position: relative; height: 50vh; }
        }
    </style>
</head>
<body>
    <main class="wrap">
        <section class="left">
            <div class="content">
                <p class="kicker">error</p>
                <h1 class="title">404: not found</h1>
                <a class="cta" href="index">Return to safety</a>
            </div>
        </section>

        <section class="right" aria-hidden="true">
            <div class="heroImg">
                <div class="frame">
                    <img src="https://static.wikiforge.net/polandballwikigrid/6/62/Moroccan_Night.png" alt="Moroccan Night" />
                </div>
            </div>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/achievements.js"></script>
    <script>
        window.unlockAchievement('exp_404');
    </script>
</body>
</html>
