<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael — Projects</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { padding: 100px 5vw; }
        .header, .grid, #loading { position: relative; z-index: 10; }
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { margin: 0; font-size: clamp(40px, 5vw, 64px); }
        .header p { color: var(--muted); font-size: 18px; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; max-width: 1000px; margin: 0 auto; }
        .card-p { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-radius: 24px; padding: 25px; backdrop-filter: blur(14px); box-shadow: 0 25px 70px rgba(0,0,0,.22); display: flex; flex-direction: column; }
        .card-p h2 { margin: 0 0 10px; font-size: 22px; }
        .card-p p { color: var(--muted); line-height: 1.5; margin: 0 0 20px; flex-grow: 1; }
        .card-link { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px; border-radius: 12px; background: #fff; color: #111; font-weight: 800; text-decoration: none; text-align: center; transition: transform 0.2s ease; }
        .card-link:hover { transform: translateY(-2px); }
        #loading { display: flex; align-items: center; justify-content: center; gap: 8px; text-align: center; color: var(--muted); font-size: 18px; }
        .navBtn { display: inline-flex; align-items: center; gap: 6px; z-index: 50; }
        .lucide { width: 1.2em; height: 1.2em; vertical-align: -0.125em; }
    </style>
</head>
<body>
    <div class="bg-left"></div>
    <div class="bg-right"></div>
    
    <a class="navBtn" id="dynamicBackBtn" href="index"><i data-lucide="home"></i> Home</a>

    <div class="header">
        <p style="text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin: 0 0 5px; font-size: 14px; font-weight: 700;">Portfolio</p>
        <h1>My projects</h1>
        <p>Things I've built.</p>
    </div>

    <div id="loading"><i data-lucide="loader-2" class="lucide-spin"></i> Loading projects...</div>
    <div class="grid" id="projectGrid"></div>

    <script src="js/config.js"></script>
    <script src="js/achievements.js"></script>
    <script>
        // Dynamic Back Button Logic
        window.addEventListener('DOMContentLoaded', () => {
            const backBtn = document.getElementById('dynamicBackBtn');
            const referrer = document.referrer.toLowerCase();
            
            if (referrer.includes('shortcuts')) {
                backBtn.href = 'shortcuts';
                backBtn.innerHTML = '<i data-lucide="zap"></i> Shortcuts';
            } else if (referrer.includes('redeem')) {
                backBtn.href = 'redeem';
                backBtn.innerHTML = '<i data-lucide="ticket"></i> Redeem';
            } else {
                backBtn.href = 'index';
                backBtn.innerHTML = '<i data-lucide="home"></i> Home';
            }
            lucide.createIcons();
        });

        window.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('projectGrid');
            const loading = document.getElementById('loading');
            
            try {
                const response = await fetch('json/projects.json');
                if (!response.ok) throw new Error("File not found");
                
                const projects = await response.json();
                loading.style.display = 'none';

                if (Object.keys(projects).length === 0) {
                    grid.innerHTML = '<p style="text-align:center; color:#aaa; grid-column: 1/-1;">No projects added yet!</p>';
                    return;
                }

                for (const [id, data] of Object.entries(projects)) {
                    const card = document.createElement('div');
                    card.className = 'card-p';
                    card.innerHTML = `
                        <h2>${data.title}</h2>
                        <p>${data.description}</p>
                        ${data.link ? `<a class="card-link" href="${data.link}" target="_blank" onclick="window.unlockAchievement('exp_proj')"><i data-lucide="external-link"></i> View Project</a>` : ''}
                    `;
                    grid.appendChild(card);
                }
                lucide.createIcons();
            } catch (e) {
                loading.innerHTML = `<i data-lucide="alert-circle"></i> No projects found yet. Log into the Admin Hub to add some!`;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
