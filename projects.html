<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/u-term/apple-emoji-css@master/apple-emoji.css">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wael — Projects</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        body { padding: 100px 5vw; }
        .header, .grid, #loading { position: relative; z-index: 10; }
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { margin: 0; font-size: clamp(40px, 5vw, 64px); }
        .header p { color: var(--muted); font-size: 18px; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; max-width: 1000px; margin: 0 auto; }
        .card-p { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-radius: 24px; padding: 25px; backdrop-filter: blur(14px); box-shadow: 0 25px 70px rgba(0,0,0,.22); display: flex; flex-direction: column; }
        .card-p h2 { margin: 0 0 10px; font-size: 22px; }
        .card-p p { color: var(--muted); line-height: 1.5; margin: 0 0 20px; flex-grow: 1; }
        .card-link { display: inline-block; padding: 12px 20px; border-radius: 12px; background: #fff; color: #111; font-weight: 800; text-decoration: none; text-align: center; transition: transform 0.2s ease; }
        .card-link:hover { transform: translateY(-2px); }
        #loading { text-align: center; color: var(--muted); font-size: 18px; }
    </style>
</head>
<body>
    <div class="bg-left"></div>
    <div class="bg-right"></div>
    <a class="navBtn" href="index">Home</a>

    <div class="header">
        <p style="text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin: 0 0 5px; font-size: 14px; font-weight: 700;">Portfolio</p>
        <h1>My projects</h1>
        <p>Things I've built.</p>
    </div>

    <div id="loading">Loading projects...</div>
    <div class="grid" id="projectGrid"></div>

    <script src="js/config.js"></script>
    <script src="js/achievements.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('projectGrid');
            const loading = document.getElementById('loading');
            
            try {
                const response = await fetch('projects.json');
                if (!response.ok) throw new Error("File not found");
                
                const projects = await response.json();
                loading.style.display = 'none';

                if (Object.keys(projects).length === 0) {
                    grid.innerHTML = '<p style="text-align:center; color:#aaa; grid-column: 1/-1;">No projects added yet!</p>';
                    return;
                }

                for (const [id, data] of Object.entries(projects)) {
                    const card = document.createElement('div');
                    card.className = 'card-p';
                    card.innerHTML = `
                        <h2>${data.title}</h2>
                        <p>${data.description}</p>
                        ${data.link ? `<a class="card-link" href="${data.link}" target="_blank" onclick="window.unlockAchievement('exp_proj')">View Project</a>` : ''}
                    `;
                    grid.appendChild(card);
                }
            } catch (e) {
                loading.innerText = "No projects found yet. Log into the Admin Hub to add some!";
            }
        });
    </script>
</body>
</html>
