<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Wael — Projects</title>
<link rel="icon" type="image/png" href="1000003608.png" />

<style>
:root{
  --left-bg:#063826; --right-bg:#5b0b0b;
  --text:#f5f7fa; --muted:rgba(255,255,255,.78);
  --radius:999px; --card:rgba(255,255,255,.08); --card-border:rgba(255,255,255,.15);
}
*{box-sizing:border-box;}
body{
  margin:0; min-height:100vh; font-family:system-ui,-apple-system,sans-serif;
  background:linear-gradient(135deg,#052e21 0%,#063826 40%,#5b0b0b 60%,#360606 100%);
  color:var(--text); padding: 100px 5vw;
}

.navBtn{
  position:absolute; top:20px; right:20px; z-index:10; padding:12px 22px;
  border-radius:var(--radius); background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.25); backdrop-filter:blur(10px);
  color:#fff; font-weight:700; text-decoration:none;
}

.header { text-align: center; margin-bottom: 50px; }
.header h1 { margin: 0; font-size: clamp(40px, 5vw, 64px); }
.header p { color: var(--muted); font-size: 18px; margin-top: 10px; }

.grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 25px; max-width: 1000px; margin: 0 auto;
}

.card {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 24px; padding: 25px; backdrop-filter: blur(14px);
  box-shadow: 0 25px 70px rgba(0,0,0,.22); display: flex; flex-direction: column;
}

.card h2 { margin: 0 0 10px; font-size: 22px; }
.card p { color: var(--muted); line-height: 1.5; margin: 0 0 20px; flex-grow: 1; }

.card-link {
  display: inline-block; padding: 12px 20px; border-radius: 12px;
  background: #fff; color: #111; font-weight: 800; text-decoration: none;
  text-align: center; transition: transform 0.2s ease;
}
.card-link:hover { transform: translateY(-2px); }

#loading { text-align: center; color: var(--muted); font-size: 18px; }
</style>
</head>
<body>

<a class="navBtn" href="index.html">Home</a>

<div class="header">
  <p style="text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin: 0 0 5px; font-size: 14px; font-weight: 700;">Portfolio</p>
  <h1>My projects</h1>
  <p>Things I've built using Python, Windows mods, and more.</p>
</div>

<div id="loading">Loading projects...</div>
<div class="grid" id="projectGrid"></div>

<script>
  window.addEventListener('DOMContentLoaded', async () => {
    const grid = document.getElementById('projectGrid');
    const loading = document.getElementById('loading');
    
    try {
      const response = await fetch('projects.json');
      if (!response.ok) throw new Error("File not found");
      
      const projects = await response.json();
      loading.style.display = 'none';

      if (Object.keys(projects).length === 0) {
        grid.innerHTML = '<p style="text-align:center; color:#aaa; grid-column: 1/-1;">No projects added yet!</p>';
        return;
      }

      for (const [id, data] of Object.entries(projects)) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h2>${data.title}</h2>
          <p>${data.description}</p>
          ${data.link ? `<a class="card-link" href="${data.link}" target="_blank">View Project</a>` : ''}
        `;
        grid.appendChild(card);
      }
    } catch (e) {
      loading.innerText = "No projects found yet. Type PROJECTS-EDIT in the redeem page to add some!";
    }
  });
</script>

</body>
</html>
